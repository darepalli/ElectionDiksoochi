<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="India Election Compass" />
  <title>Election Compass</title>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />

  <style>
    :root {
      --back-bar-h: 36px;
    }

    /* Thin wrapper styles – OEC renders everything else */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }

    /* Back-to-hub bar */
    .back-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 9999;
      background: rgba(192, 57, 43, 0.95);
      padding: calc(6px + env(safe-area-inset-top, 0px)) 1rem 6px;
      display: flex;
      align-items: center;
      gap: 1rem;
      min-height: 36px;
      backdrop-filter: blur(2px);
    }
    .back-bar a {
      color: #fff;
      text-decoration: none;
      font-size: .86rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 4px;
      min-height: 34px;
    }
    .back-bar a:hover { text-decoration: underline; }
    .back-bar .sep { color: rgba(255,255,255,.5); }
    .back-bar .current-label {
      font-size: .82rem;
      color: rgba(255,255,255,.85);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .back-bar .spacer {
      flex: 1;
    }

    .language-switch {
      display: inline-flex;
      align-items: center;
      border: 1px solid rgba(255,255,255,.45);
      border-radius: 8px;
      overflow: hidden;
      min-height: 34px;
      background: rgba(255,255,255,.08);
    }

    .lang-btn {
      border: 0;
      background: transparent;
      color: rgba(255,255,255,.88);
      font-size: 0.75rem;
      font-weight: 700;
      padding: 0.32rem 0.5rem;
      min-height: 34px;
      min-width: 44px;
      cursor: pointer;
    }

    .lang-btn + .lang-btn {
      border-left: 1px solid rgba(255,255,255,.28);
    }

    .lang-btn.is-active {
      color: #fff;
      background: rgba(255,255,255,.22);
    }

    .feedback-trigger {
      border: 1px solid rgba(255,255,255,.45);
      background: rgba(255,255,255,.12);
      color: #fff;
      border-radius: 7px;
      padding: 0.35rem 0.6rem;
      font-size: 0.76rem;
      font-weight: 700;
      cursor: pointer;
      min-height: 34px;
    }

    .feedback-trigger:hover {
      background: rgba(255,255,255,.2);
    }

    /* Push OEC content below the back-bar */
    #open-election-compass {
      padding-top: calc(var(--back-bar-h, 36px) + 4px);
      min-height: 100vh;
    }

    /* Error state */
    .error-page {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 1rem;
      color: #374151;
      text-align: center;
      padding: 2rem;
    }
    .error-page h1 { font-size: 1.5rem; color: #c0392b; }
    .error-page p  { max-width: 480px; color: #6b7280; }
    .error-page a  { color: #c0392b; font-weight: 600; }

    /* Source citation shown inline inside compare explanation bubbles */
    .oec-source-link {
      display: inline-block;
      margin-top: 0.6rem;
      padding: 0.35rem 0.65rem;
      font-size: 0.76rem;
      font-weight: 600;
      color: #2563eb;
      border: 1px solid #bfdbfe;
      border-radius: 4px;
      text-decoration: none;
      background: #eff6ff;
    }
    .oec-source-link:hover {
      background: #dbeafe;
      text-decoration: underline;
    }

    .oec-source-inline {
      margin-top: 0.55rem;
      font-size: 0.78rem;
      line-height: 1.35;
      color: #475569;
      word-break: break-word;
    }

    .oec-candidate-profile {
      margin-top: 0.45rem;
      font-size: 0.76rem;
      line-height: 1.3;
      display: block;
      position: relative;
      z-index: 2;
      pointer-events: auto;
    }

    .oec-party-symbol {
      display: inline-block;
      margin-right: 0.45rem;
      font-weight: 700;
      color: #334155;
    }

    .oec-candidate-links {
      display: inline-flex;
      gap: 0.55rem;
      flex-wrap: wrap;
      align-items: center;
    }

    .oec-profile-panel {
      position: fixed;
      right: 12px;
      top: calc(var(--back-bar-h, 56px) + 12px);
      width: min(360px, calc(100vw - 24px));
      max-height: calc(100vh - var(--back-bar-h, 56px) - 24px);
      overflow: auto;
      z-index: 11400;
      background: #ffffff;
      border: 1px solid #dbeafe;
      border-radius: 10px;
      box-shadow: 0 12px 26px rgba(15, 23, 42, 0.16);
      padding: 0.7rem 0.75rem;
    }

    .oec-profile-panel.is-collapsed {
      width: auto;
      max-height: none;
      overflow: visible;
      padding-bottom: 0.6rem;
    }

    .oec-profile-panel__header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
      margin-bottom: 0.55rem;
    }

    .oec-profile-toggle {
      border: 1px solid #bfdbfe;
      background: #eff6ff;
      color: #1d4ed8;
      border-radius: 6px;
      padding: 0.18rem 0.5rem;
      font-size: 0.72rem;
      font-weight: 700;
      cursor: pointer;
    }

    .oec-profile-toggle:hover {
      background: #dbeafe;
    }

    .oec-profile-panel__title {
      margin: 0;
      color: #0f172a;
      font-size: 0.92rem;
      font-weight: 800;
    }

    .oec-profile-panel__body {
      display: block;
    }

    .oec-profile-panel.is-collapsed .oec-profile-panel__body {
      display: none;
    }

    .oec-profile-panel__list {
      display: grid;
      gap: 0.45rem;
    }

    .oec-profile-panel__item {
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      background: #f8fafc;
      padding: 0.45rem 0.5rem;
    }

    .oec-profile-panel__name {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      color: #1f2937;
      font-size: 0.8rem;
      font-weight: 700;
      line-height: 1.25;
      margin-bottom: 0.35rem;
    }

    .oec-profile-panel__actions {
      display: inline-flex;
      gap: 0.4rem;
      flex-wrap: wrap;
    }

    .oec-profile-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 1.72rem;
      padding: 0.2rem 0.52rem;
      border-radius: 6px;
      border: 1px solid #bfdbfe;
      background: #eff6ff;
      color: #1d4ed8;
      text-decoration: none;
      font-size: 0.74rem;
      font-weight: 700;
    }

    .oec-profile-btn:hover {
      background: #dbeafe;
      text-decoration: underline;
    }

    .oec-profile-btn.is-disabled {
      background: #f3f4f6;
      border-color: #d1d5db;
      color: #6b7280;
    }

    .oec-candidate-profile a {
      color: #0f766e;
      text-decoration: none;
      font-weight: 600;
      border-bottom: 1px dotted #0f766e;
    }

    .oec-candidate-profile a:hover {
      text-decoration: underline;
    }

    .oec-debug-panel {
      position: fixed;
      right: 12px;
      bottom: 12px;
      z-index: 12000;
      width: min(420px, calc(100vw - 24px));
      max-height: 45vh;
      overflow: auto;
      background: rgba(17, 24, 39, 0.95);
      color: #d1fae5;
      border: 1px solid #065f46;
      border-radius: 8px;
      padding: 0.6rem 0.75rem;
      font-size: 0.72rem;
      line-height: 1.35;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      white-space: pre-wrap;
    }

    .oec-debug-controls {
      display: flex;
      gap: 0.45rem;
      margin-bottom: 0.55rem;
      flex-wrap: wrap;
    }

    .oec-debug-btn {
      border: 1px solid #10b981;
      background: #022c22;
      color: #a7f3d0;
      border-radius: 6px;
      padding: 0.2rem 0.45rem;
      cursor: pointer;
      font-size: 0.7rem;
      font-family: inherit;
    }

    .oec-debug-log {
      white-space: pre-wrap;
    }

    .feedback-modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.5);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 13000;
      padding: 1rem;
    }

    .feedback-modal.is-open {
      display: flex;
    }

    .feedback-card {
      width: min(560px, 96vw);
      background: #fff;
      border-radius: 12px;
      border: 1px solid #e5e7eb;
      box-shadow: 0 18px 60px rgba(0,0,0,.25);
      padding: 1rem;
    }

    .feedback-title {
      font-size: 1rem;
      font-weight: 800;
      color: #111827;
      margin-bottom: .3rem;
    }

    .feedback-note {
      font-size: .79rem;
      color: #4b5563;
      margin-bottom: .6rem;
    }

    .feedback-field {
      width: 100%;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      padding: .55rem .65rem;
      font-size: .85rem;
      font-family: inherit;
      margin-bottom: .45rem;
    }

    .feedback-field--textarea {
      min-height: 110px;
      resize: vertical;
    }

    .feedback-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: .5rem;
      font-size: .74rem;
      color: #6b7280;
      margin-bottom: .75rem;
    }

    .feedback-actions {
      display: flex;
      justify-content: flex-end;
      gap: .5rem;
    }

    .feedback-btn {
      border: 1px solid #d1d5db;
      background: #fff;
      color: #111827;
      border-radius: 7px;
      padding: .45rem .75rem;
      font-size: .8rem;
      font-weight: 700;
      cursor: pointer;
    }

    .feedback-btn--primary {
      border-color: #2563eb;
      background: #2563eb;
      color: #fff;
    }

    .feedback-btn--primary:disabled {
      background: #93c5fd;
      border-color: #93c5fd;
      cursor: not-allowed;
    }

    @media (max-width: 768px) {
      .back-bar {
        gap: 0.45rem;
        padding-left: 0.65rem;
        padding-right: 0.65rem;
      }

      .back-bar .sep {
        display: none;
      }

      .back-bar a {
        font-size: 0.78rem;
      }

      .back-bar .current-label {
        font-size: 0.75rem;
        max-width: 58vw;
      }

      .feedback-trigger {
        font-size: .72rem;
        padding: .3rem .55rem;
      }

      .lang-btn {
        font-size: 0.71rem;
        min-width: 42px;
        padding: 0.28rem 0.42rem;
      }

      .oec-source-inline {
        font-size: 0.76rem;
      }

      .oec-source-link {
        font-size: 0.72rem;
      }

      .oec-profile-panel {
        right: 8px;
        width: calc(100vw - 16px);
        max-height: 46vh;
      }

      .oec-profile-panel.is-collapsed {
        width: calc(100vw - 16px);
      }

      .oec-debug-panel {
        right: 8px;
        left: 8px;
        bottom: 8px;
        width: auto;
        max-height: 38vh;
        padding: 0.5rem 0.55rem;
      }
    }

    @media (max-width: 480px) {
      .back-bar {
        align-items: flex-start;
        flex-direction: column;
        gap: 2px;
      }

      .back-bar .spacer {
        display: none;
      }

      .back-bar a,
      .back-bar .current-label {
        line-height: 1.2;
      }

      .back-bar .current-label {
        max-width: 94vw;
        white-space: normal;
      }

      .oec-debug-btn {
        font-size: 0.68rem;
        padding: 0.2rem 0.4rem;
      }

      .feedback-card {
        padding: .85rem;
      }

      .feedback-meta {
        flex-direction: column;
        align-items: flex-start;
      }

      .feedback-actions {
        width: 100%;
      }

      .feedback-btn {
        flex: 1;
      }
    }
  </style>
</head>
<body>

  <!-- Back navigation bar -->
  <div class="back-bar">
    <a href="index.html">← All Elections</a>
    <span class="sep">|</span>
    <span class="current-label" id="back-label">Election Compass</span>
    <span class="spacer"></span>
    <div class="language-switch" role="group" aria-label="Language selector">
      <button type="button" class="lang-btn" data-lang="en" id="lang-en">EN</button>
      <button type="button" class="lang-btn" data-lang="ta" id="lang-ta">தமிழ்</button>
    </div>
    <button type="button" class="feedback-trigger" id="feedback-open">Feedback</button>
  </div>

  <div class="feedback-modal" id="feedback-modal" aria-hidden="true">
    <div class="feedback-card" role="dialog" aria-modal="true" aria-labelledby="feedback-title">
      <div class="feedback-title" id="feedback-title">Send Feedback</div>
      <p class="feedback-note">Feedback will open as a public GitHub issue in this project. Please avoid personal or sensitive information.</p>
      <select class="feedback-field" id="feedback-type" aria-label="Feedback type">
        <option value="General">General</option>
        <option value="Source Correction">Source Correction</option>
        <option value="Bug">Bug</option>
        <option value="Mobile UX">Mobile UX</option>
      </select>
      <textarea class="feedback-field feedback-field--textarea" id="feedback-text" maxlength="300" placeholder="Write feedback (max 300 characters)..."></textarea>
      <div class="feedback-meta">
        <span>Max 300 chars</span>
        <span id="feedback-count">0 / 300</span>
      </div>
      <div class="feedback-actions">
        <button type="button" class="feedback-btn" id="feedback-cancel">Cancel</button>
        <button type="button" class="feedback-btn feedback-btn--primary" id="feedback-submit" disabled>Post to Repo</button>
      </div>
    </div>
  </div>

  <!--
    OEC mount point.
    Usage:  compass.html?config=elections/tn/2026-state/config.json

    Sequence (per OEC docs):
      1. Inline script (below) runs synchronously → validates ?config= param,
         sets the load-url attribute on <open-election-compass> and updates page title.
      2. OEC library (defer) runs after HTML is fully parsed → reads load-url,
         fetches the JSON and mounts the component.
  -->
  <div id="open-election-compass">
    <!-- Vue mounts here (el:"#open-election-compass"); OEC reads load-url from the component prop -->
    <open-election-compass id="oec-el"></open-election-compass>
  </div>

  <script>
    (function () {
      var SAFE_CONFIG_RE = /^elections\/[a-z]{2,}\/[a-z0-9._/-]+\/config\.json$/;

      function getParam(name) {
        if (window.URLSearchParams) {
          return new URLSearchParams(window.location.search).get(name) || '';
        }
        var match = new RegExp('[?&]' + name + '=([^&#]*)').exec(window.location.search);
        return match ? decodeURIComponent(match[1].replace(/\+/g, ' ')) : '';
      }

      var configPath = getParam('config');
      var oecEl      = document.getElementById('oec-el');
      var wrapper    = document.getElementById('open-election-compass');
      var backBar    = document.querySelector('.back-bar');
      var langButtons = Array.prototype.slice.call(document.querySelectorAll('.lang-btn'));

      function normalizeLang(value) {
        var raw = String(value || '').toLowerCase();
        return raw.indexOf('ta') === 0 ? 'ta' : 'en';
      }

      function getSelectedLang() {
        var queryLangRaw = getParam('lang');
        if (queryLangRaw) return normalizeLang(queryLangRaw);
        try {
          var storedLang = window.localStorage.getItem('oec-lang');
          if (storedLang) return normalizeLang(storedLang);
        } catch (e) {}
        return 'en';
      }

      function setLangUi(lang) {
        langButtons.forEach(function (btn) {
          var active = btn.getAttribute('data-lang') === lang;
          btn.classList.toggle('is-active', active);
          btn.setAttribute('aria-pressed', active ? 'true' : 'false');
        });
      }

      function persistLang(lang) {
        try { window.localStorage.setItem('oec-lang', lang); } catch (e) {}
        try {
          var url = new URL(window.location.href);
          url.searchParams.set('lang', lang);
          window.history.replaceState({}, '', url.toString());
        } catch (e) {}
      }

      function setOecLanguage(lang) {
        if (!oecEl) return;
        // OEC supports a dedicated `language` prop; keep both attribute and property in sync.
        oecEl.setAttribute('language', lang);
        try { oecEl.language = lang; } catch (e) {}
      }

      function forceOecRemount(lang) {
        try {
          var url = new URL(window.location.href);
          url.searchParams.set('lang', lang);
          // Bust bfcache-style restores so OEC always re-initializes from scratch.
          url.searchParams.set('_oec_remount', String(Date.now()));
          window.location.assign(url.toString());
          return;
        } catch (e) {}
        // Fallback if URL API is unavailable.
        window.location.reload();
      }

      function deepMerge(target, source) {
        if (!source || typeof source !== 'object') return target;
        if (!target || typeof target !== 'object') target = {};
        Object.keys(source).forEach(function (key) {
          var srcVal = source[key];
          var tgtVal = target[key];
          if (srcVal && typeof srcVal === 'object' && !Array.isArray(srcVal)) {
            target[key] = deepMerge(tgtVal && typeof tgtVal === 'object' && !Array.isArray(tgtVal) ? tgtVal : {}, srcVal);
          } else {
            target[key] = srcVal;
          }
        });
        return target;
      }

      function getTamilOecOverwrites() {
        return {
          algorithm: {
            options: {
              'strongly-approve': {
                button: 'மிகவும் ஒப்புதல்',
                'button-aria': 'இந்த தீர்மானத்தை மிகவும் ஒப்புதல் அளிக்க இங்கே சொடுக்கவும்'
              },
              approve: {
                button: 'ஒப்புதல்',
                'button-aria': 'இந்த தீர்மானத்தை ஒப்புதல் அளிக்க இங்கே சொடுக்கவும்'
              },
              partly: {
                button: 'பகுதியாக ஒப்புதல்',
                'button-aria': 'இந்த தீர்மானத்துக்கு பகுதியாக ஒப்புதல் அளிக்க இங்கே சொடுக்கவும்'
              },
              neutral: {
                button: 'நடுநிலை',
                'button-aria': 'இந்த தீர்மானத்தில் நடுநிலையாக இருக்க இங்கே சொடுக்கவும்'
              },
              reject: {
                button: 'எதிர்ப்பு',
                'button-aria': 'இந்த தீர்மானத்தை நிராகரிக்க இங்கே சொடுக்கவும்'
              },
              'strongly-reject': {
                button: 'கடுமையான எதிர்ப்பு',
                'button-aria': 'இந்த தீர்மானத்தை கடுமையாக நிராகரிக்க இங்கே சொடுக்கவும்'
              }
            }
          },
          views: {
            home: {
              theses: {
                'important-button': {
                  important: 'எனக்கு முக்கியம்'
                },
                'skip-button': {
                  skip: 'தெரியாது'
                }
              }
            }
          }
        };
      }

      function injectTamilOverwrites(config) {
        if (!config || !Array.isArray(config.languages)) return config;
        for (var i = 0; i < config.languages.length; i++) {
          var lang = config.languages[i];
          if (lang && String(lang.code).toLowerCase() === 'ta') {
            lang.overwrites = deepMerge(lang.overwrites || {}, getTamilOecOverwrites());
          }
        }
        return config;
      }

      function ensureOecConfigTag(configObj) {
        var existing = document.getElementById('oec-config-data');
        if (existing && existing.parentNode) existing.parentNode.removeChild(existing);
        var script = document.createElement('script');
        script.id = 'oec-config-data';
        script.type = 'application/json';
        script.text = JSON.stringify(configObj);
        document.body.appendChild(script);
        oecEl.setAttribute('load-tag', '#oec-config-data');
      }

      function ensureOecScriptLoaded() {
        if (document.getElementById('oec-runtime-script')) return;
        var s = document.createElement('script');
        s.id = 'oec-runtime-script';
        s.src = 'assets/open-election-compass.umd.min.js';
        s.defer = true;
        document.body.appendChild(s);
      }

      function isLangButtonTextMatch(text, lang) {
        var t = String(text || '').toLowerCase().replace(/\s+/g, ' ').trim();
        if (!t) return false;
        if (lang === 'ta') {
          return t.indexOf('தமிழ்') >= 0 || t === 'ta' || t === 'tam';
        }
        return t.indexOf('english') >= 0 || t === 'en';
      }

      function tryApplyLanguageInOec(lang) {
        var nodes = document.querySelectorAll('#open-election-compass button, #open-election-compass [role="button"], #open-election-compass [class*="lang"]');
        for (var i = 0; i < nodes.length; i++) {
          var node = nodes[i];
          var txt = (node.textContent || '').replace(/\s+/g, ' ').trim();
          if (!txt) continue;
          if (isLangButtonTextMatch(txt, lang)) {
            node.click();
            return true;
          }
        }
        return false;
      }

      var TA_UI_LABELS = [
        { re: /^strongly approve$/, ta: 'மிகவும் ஒப்புதல்' },
        { re: /^approve$/, ta: 'ஒப்புதல்' },
        { re: /^partly$/, ta: 'பகுதியாக ஒப்புதல்' },
        { re: /^neutral$/, ta: 'நடுநிலை' },

      ];

      function normalizeUiLabel(s) {
        return String(s || '').replace(/\s+/g, ' ').trim().toLowerCase();
      }

      function getTamilUiLabel(s) {
        var normalized = normalizeUiLabel(s);
        for (var i = 0; i < TA_UI_LABELS.length; i++) {
          if (TA_UI_LABELS[i].re.test(normalized)) {
            return TA_UI_LABELS[i].ta;
          }
        }
        return '';
      }

      function applyTamilUiLabelTranslations(root) {
        if (selectedLang !== 'ta') return;
        var scope = root || document;
        var nodes = scope.querySelectorAll('#open-election-compass button, #open-election-compass [role="button"], #open-election-compass a, #open-election-compass [aria-label], #open-election-compass [title]');
        for (var i = 0; i < nodes.length; i++) {
          var node = nodes[i];

          var text = (node.textContent || '').replace(/\s+/g, ' ').trim();
          var translatedText = getTamilUiLabel(text);
          if (translatedText) {
            node.textContent = translatedText;
          }

          var ariaLabel = node.getAttribute('aria-label');
          if (ariaLabel) {
            var translatedAria = getTamilUiLabel(ariaLabel);
            if (translatedAria) node.setAttribute('aria-label', translatedAria);
          }

          var title = node.getAttribute('title');
          if (title) {
            var translatedTitle = getTamilUiLabel(title);
            if (translatedTitle) node.setAttribute('title', translatedTitle);
          }
        }
      }

      function syncBackBarHeight () {
        if (!backBar) return;
        var h = Math.max(36, Math.ceil(backBar.getBoundingClientRect().height));
        document.documentElement.style.setProperty('--back-bar-h', h + 'px');
      }

      if (!configPath || !SAFE_CONFIG_RE.test(configPath)) {
        wrapper.innerHTML =
          '<div class="error-page">'
          + '<h1>No Election Selected</h1>'
          + '<p>Please choose an election from the hub to launch the compass.</p>'
          + '<a href="index.html">\u2190 Back to India Election Compass</a>'
          + '</div>';
        return;

      var parts = configPath.split('/');
      var state = (parts[1] || '').toUpperCase();
      var level = (parts[2] || '').replace(/-/g, ' ').replace(/\b\w/g, function(c){ return c.toUpperCase(); });

      document.getElementById('back-label').textContent = label;
      document.title = label + ' | India Election Compass';

      setLangUi(selectedLang);
      persistLang(selectedLang);

      langButtons.forEach(function (btn) {
        btn.addEventListener('click', function () {
          selectedLang = normalizeLang(btn.getAttribute('data-lang'));
          setLangUi(selectedLang);
          persistLang(selectedLang);
          setOecLanguage(selectedLang);
          forceOecRemount(selectedLang);
        });
      });

      var langApplyAttempts = 0;
      var langTimer = window.setInterval(function () {
        langApplyAttempts++;
        if (tryApplyLanguageInOec(selectedLang) || langApplyAttempts > 30) {
          window.clearInterval(langTimer);
        }
      }, 350);

      applyTamilUiLabelTranslations(document);
      if (window.MutationObserver) {
        var oecRootNode = document.getElementById('open-election-compass');
        if (oecRootNode) {
          var uiLabelObserver = new MutationObserver(function () {
            applyTamilUiLabelTranslations(document);
          });
          uiLabelObserver.observe(oecRootNode, {
            subtree: true,
            childList: true,
            characterData: true,
            attributes: true,
            attributeFilter: ['aria-label', 'title']
          });
        }
      }

      syncBackBarHeight();
      window.addEventListener('resize', syncBackBarHeight);

      // Always set load-url for internal scripts that read this value.
      oecEl.setAttribute('load-url', configPath);
      setOecLanguage(selectedLang);

      // Load config first, inject Tamil UI overrides, then start OEC.
      fetch(configPath)
        .then(function (r) {
          if (!r.ok) throw new Error('Failed to load config: ' + r.status);
          return r.json();
        })
        .then(function (cfg) {
          ensureOecConfigTag(injectTamilOverwrites(cfg));
          ensureOecScriptLoaded();
        })
        .catch(function () {
          // Fallback to plain load-url mode if config fetch fails.
          ensureOecScriptLoaded();
        });
    }());
  </script>

  <script>
    (function () {
      var owner = 'darepalli';
      var repo = 'ElectionDiksoochi';
      var params = new URLSearchParams(window.location.search);
      var configPath = params.get('config') || '';
      var pageContext = configPath || window.location.pathname;

      var modal = document.getElementById('feedback-modal');
      var openBtn = document.getElementById('feedback-open');
      var cancelBtn = document.getElementById('feedback-cancel');
      var submitBtn = document.getElementById('feedback-submit');
      var textEl = document.getElementById('feedback-text');
      var typeEl = document.getElementById('feedback-type');
      var countEl = document.getElementById('feedback-count');

      if (!modal || !openBtn || !cancelBtn || !submitBtn || !textEl || !typeEl || !countEl) return;

      function openModal () {
        modal.classList.add('is-open');
        modal.setAttribute('aria-hidden', 'false');
        setTimeout(function () { textEl.focus(); }, 10);
      }

      function closeModal () {
        modal.classList.remove('is-open');
        modal.setAttribute('aria-hidden', 'true');
      }

      function refreshCount () {
        var len = textEl.value.length;
        countEl.textContent = len + ' / 300';
        submitBtn.disabled = len === 0;
      }

      function buildIssueUrl () {
        var kind = typeEl.value || 'General';
        var feedback = textEl.value.trim();
        var title = '[Feedback][' + kind + '] ' + pageContext;
        var body = [
          '### Feedback',
          feedback,
          '',
          '### Context',
          '- Page: ' + pageContext,
          '- URL: ' + window.location.href,
          '- User Agent: ' + navigator.userAgent,
          '- Timestamp: ' + new Date().toISOString(),
          '',
          '_Submitted via in-app feedback form._'
        ].join('\n');

        var issueUrl = 'https://github.com/' + owner + '/' + repo + '/issues/new';
        issueUrl += '?labels=' + encodeURIComponent('feedback,' + kind.toLowerCase().replace(/\s+/g, '-'));
        issueUrl += '&title=' + encodeURIComponent(title);
        issueUrl += '&body=' + encodeURIComponent(body);
        return issueUrl;
      }

      openBtn.addEventListener('click', openModal);
      cancelBtn.addEventListener('click', closeModal);
      modal.addEventListener('click', function (e) {
        if (e.target === modal) closeModal();
      });
      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape' && modal.classList.contains('is-open')) closeModal();
      });

      textEl.addEventListener('input', refreshCount);
      submitBtn.addEventListener('click', function () {
        var text = textEl.value.trim();
        if (!text) return;
        window.open(buildIssueUrl(), '_blank', 'noopener');
        closeModal();
      });

      refreshCount();
    }());
  </script>

  <script>

    (function () {

      var debugPanel = null;

      function debugLog (line) {
        if (!debugMode) return;

        debugLines.push('[' + stamp + '] ' + line);
        if (debugLines.length > 40) debugLines.shift();
        if (debugLogEl) debugLogEl.textContent = debugLines.join('\n');
        try { console.log('[OEC-SOURCE-DEBUG]', line); } catch (e) {}

      function isVisible (el) {
        if (!el) return false;
        var r = el.getBoundingClientRect();
        return r.width > 0 && r.height > 0;
      }

      function describeEl (el) {
        var tag = (el.tagName || '').toLowerCase();
        var cls = (el.className && String(el.className).trim()) || '';
        var txt = (el.textContent || '').trim().replace(/\s+/g, ' ').substring(0, 40);
        return tag + (cls ? '.' + cls.split(' ').slice(0, 2).join('.') : '') + (txt ? ' [' + txt + ']' : '');
      }

      function pickRandomSelection () {
        var compareCandidates = Array.prototype.slice.call(document.querySelectorAll('.compare-section button, .compare-section [role="button"], .compare-section [class*="thesis"], .compare-section .chat-bubble'));
        var fallbackCandidates = Array.prototype.slice.call(document.querySelectorAll('#open-election-compass button, #open-election-compass [role="button"], #open-election-compass [class*="thesis"], #open-election-compass .party-item__button'));
        var candidates = (compareCandidates.length ? compareCandidates : fallbackCandidates)
          .filter(function (el) {
            if (!isVisible(el)) return false;
            if (el.closest('.oec-debug-panel')) return false;
            if (el.closest('.oec-source-inline')) return false;
            return true;
          });

        if (!candidates.length) {
          debugLog('random selection: no clickable candidates found');
          return;
        }

        var chosen = candidates[Math.floor(Math.random() * candidates.length)];
        debugLog('random selection click -> ' + describeEl(chosen));
        chosen.click();
      }

      if (debugMode) {
        debugPanel = document.createElement('div');
        debugPanel.className = 'oec-debug-panel';
        debugPanel.innerHTML =
          '<div class="oec-debug-controls">'
          + '<button type="button" class="oec-debug-btn" id="oec-debug-random">Random Selection</button>'
          + '<button type="button" class="oec-debug-btn" id="oec-debug-clear">Clear Log</button>'
          + '</div>'
          + '<div class="oec-debug-log" id="oec-debug-log">Source debug active...</div>';
        document.body.appendChild(debugPanel);
        debugLogEl = debugPanel.querySelector('#oec-debug-log');
        debugPanel.querySelector('#oec-debug-random').addEventListener('click', pickRandomSelection);
        debugPanel.querySelector('#oec-debug-clear').addEventListener('click', function () {
          debugLines = [];
          if (debugLogEl) debugLogEl.textContent = 'Log cleared.';
        });
      }

      function normalizeText (text) {
        return String(text || '')
          .toLowerCase()
          .replace(/[\u200B-\u200D\uFEFF]/g, '')
          .replace(/\s+/g, ' ')
          .replace(/[^0-9a-z\u00C0-\uFFFF\s]/g, '')
          .trim();
      }

      function addExplanationSource (text, src) {
        if (!text || !src) return;
        var full = normalizeText(text);
        if (!full) return;
        srcMap[full] = src;
        if (full.length > 80) srcMap[full.substring(0, 80)] = src;
      }

      function getSourceLabel (url) {
        var raw = String(url || '').toLowerCase();
        if (!raw) return 'Source Link';

        if (raw.indexOf('manifesto') >= 0 || raw.indexOf('nyay') >= 0) {
          return 'Party Manifesto';
        }
        if (raw.indexOf('/speech') >= 0 || raw.indexOf('/speeches') >= 0) {
          return 'Party Speech';
        }
        if (raw.indexOf('/ideology') >= 0 || raw.indexOf('/election-corner') >= 0 || raw.indexOf('/polic') >= 0) {
          return 'Party Policy Page';
        }

        try {
          var host = new URL(url).hostname.replace(/^www\./, '');
          if (host) return 'Party Website (' + host + ')';
        } catch (e) {}

        return 'Party Website';
      }

      function escapeHtml(text) {
        return String(text || '')
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

          var aliasSource = {};
          theses.forEach(function (thesis) {
            parties.forEach(function (party) {
              if (aliasSource[party.alias]) return;
              var pos = thesis.positions && thesis.positions[party.alias];
              if (pos && pos.source) aliasSource[party.alias] = pos.source;
            });
          });

          parties.forEach(function (party) {
            var src = aliasSource[party.alias] || '';
            if (!src) return;
            langs.forEach(function (code) {
              var shortName = party.short && party.short[code];
              var longName = party.name && party.name[code];
              if (shortName) partySourceMap[normalizeText(shortName)] = src;
              if (longName) partySourceMap[normalizeText(longName)] = src;
            });
          });
          debugLog('party fallback keys=' + Object.keys(partySourceMap).length);

          // Build candidate profile map from optional parties[].profile links.
          parties.forEach(function (party) {
            var profileUrl = '';
            if (party.profile && typeof party.profile === 'string') {
              profileUrl = party.profile;
            } else if (party.profile && typeof party.profile === 'object') {
              profileUrl = party.profile[uiLang] || party.profile.en || party.profile.ta || '';
            }

            var partyTag = '';
            var enName = (party.name && party.name.en) ? String(party.name.en) : '';
            if (enName && /\(([^\)]+)\)/.test(enName)) {
              partyTag = RegExp.$1.trim().toUpperCase();
            }
            if (!partyTag && party.alias) {
              var alias = String(party.alias);
              if (/^cand-([a-z0-9()]+)$/i.test(alias)) {
                partyTag = RegExp.$1.toUpperCase();
              }
            }

            var meta = PARTY_META[partyTag] || null;
            var partyWiki = meta ? meta.wiki : '';
            var symbolText = meta ? meta.symbol : '';

            if (!profileUrl && !partyWiki) return;

            var keys = [];
            langs.forEach(function (code) {
              var shortName = party.short && party.short[code];
              var longName = party.name && party.name[code];
              if (shortName) keys.push(normalizeText(shortName));
              if (longName) keys.push(normalizeText(longName));
            });
            if (party.alias) keys.push(normalizeText(party.alias));

            partyProfileEntries.push({
              url: profileUrl,
              partyUrl: partyWiki,
              symbol: symbolText,
              keys: keys.filter(Boolean)
            });

            var displayName = '';
            if (party.short && party.short[uiLang]) displayName = party.short[uiLang];
            else if (party.name && party.name[uiLang]) displayName = party.name[uiLang];
            else if (party.short && party.short.en) displayName = party.short.en;
            else if (party.name && party.name.en) displayName = party.name.en;
            else displayName = party.alias || 'Candidate';

            candidateLinkItems.push({
              name: displayName,
              symbol: symbolText,
              profileUrl: profileUrl,
              partyUrl: partyWiki
            });
          });
          debugLog('candidate profile entries=' + partyProfileEntries.length);
          renderCandidateProfilePanel();

          theses.forEach(function (thesis) {
            parties.forEach(function (party) {
              var pos = thesis.positions && thesis.positions[party.alias];
              if (!pos || !pos.source) return;
              langs.forEach(function (code) {
                var text = pos.explanation && pos.explanation[code];
                addExplanationSource(text, pos.source);
              });
            });
          });
          debugLog('explanation source keys=' + Object.keys(srcMap).length);

          var container = document.getElementById('open-election-compass');
          if (!container) return;

          function injectLinks () {
            var bubbles = container.querySelectorAll('.chat-bubble');
            if (!bubbles.length && debugMode) {
              debugLog('scan: bubbles=0');
            }

            bubbles.forEach(function (bubble) {
              var bubbleEl = bubble.querySelector('.chat-bubble__bubble') || bubble.querySelector('[class*="chat-bubble__bubble"]');
              if (!bubbleEl) return;

              // Keep source block idempotent to avoid observer feedback loops.
              var existingInfo = bubbleEl.querySelector('.oec-source-inline');

              var bubbleText = normalizeText(bubbleEl.textContent);
              var src = srcMap[bubbleText] || srcMap[bubbleText.substring(0, 80)] || '';
              var matchKind = src ? 'explanation-exact' : 'none';

              // Fuzzy match when the UI truncates or slightly alters punctuation.
              if (!src && bubbleText) {
                for (var k in srcMap) {
                  if (k.length < 30) continue;
                  if (bubbleText.indexOf(k) === 0 || k.indexOf(bubbleText) === 0) {
                    src = srcMap[k];
                    matchKind = 'explanation-fuzzy';
                    break;
                  }
                }
              }

              // Fallback by party label in bubble footer/header.
              if (!src) {
                var partyEl = bubble.querySelector('.chat-bubble__party');
                if (partyEl) {
                  var partyKey = normalizeText(partyEl.textContent);
                  src = partySourceMap[partyKey] || '';
                  if (src) matchKind = 'party-fallback';
                }
              }

              var info = existingInfo || document.createElement('div');
              info.className = 'oec-source-inline';

              if (src) {
                info.textContent = 'Source: ';
                var a = info.querySelector('a.oec-source-link') || document.createElement('a');
                a.href = src;
                a.target = '_blank';
                a.rel = 'noopener noreferrer';
                a.className = 'oec-source-link';
                a.textContent = getSourceLabel(src);
                if (!a.parentElement) info.appendChild(a);
              } else {
                info.textContent = 'Source: not added yet.';
              }

              if (!existingInfo) bubbleEl.appendChild(info);
              debugLog('bubble processed: match=' + matchKind + ', text=' + bubbleText.substring(0, 64));
            });
          }

          function findProfileEntryForText(text) {
            var norm = normalizeText(text);
            if (!norm) return null;
            for (var i = 0; i < partyProfileEntries.length; i++) {
              var entry = partyProfileEntries[i];
              for (var j = 0; j < entry.keys.length; j++) {
                var key = entry.keys[j];
                if (!key) continue;
                if (norm.indexOf(key) >= 0 || key.indexOf(norm) >= 0) {
                  return entry;
                }
              }
            }
            return null;
          }

          function injectCandidateProfileLinks () {
            if (!partyProfileEntries.length) return;

            var candidates = container.querySelectorAll(
              'button, [role="button"], label, .party-item, [class*="party-item"], .base-button, [class*="party"]'
            );

            candidates.forEach(function (el) {
              if (!el || el.closest('.oec-candidate-profile')) return;
              var rawText = (el.textContent || '').replace(/\s+/g, ' ').trim();
              if (!rawText || rawText.length < 3) return;

              var entry = findProfileEntryForText(rawText);
              if (!entry) return;

              // Find a stable insertion anchor near the selectable control.
              var anchor = el;
              var partyBlock = el.closest('.party-item') || el.closest('[class*="party-item"]') || el.closest('[class*="party"]');
              if (partyBlock) anchor = partyBlock;

              var anchorKey = normalizeText((anchor.textContent || '').replace(/\s+/g, ' ').trim());
              if (!anchorKey) return;

              var existing = Array.prototype.slice.call(container.querySelectorAll('.oec-candidate-profile'))
                .some(function (n) { return n.getAttribute('data-profile-key') === anchorKey; });
              if (existing) return;

              var insertParent = anchor.parentElement;
              var insertAfter = anchor;
              if (!insertParent) return;

              // Keep link outside labels to avoid toggling checkboxes.
              if (insertAfter.tagName && insertAfter.tagName.toLowerCase() === 'label' && insertAfter.parentElement) {
                insertParent = insertAfter.parentElement;
              }

              var holder = document.createElement('div');
              holder.className = 'oec-candidate-profile';
              holder.setAttribute('data-profile-key', anchorKey);

              if (entry.symbol) {
                var symbol = document.createElement('span');
                symbol.className = 'oec-party-symbol';
                symbol.textContent = entry.symbol;
                holder.appendChild(symbol);
              }

              var links = document.createElement('span');
              links.className = 'oec-candidate-links';

              var link = document.createElement('a');
              link.textContent = uiLang === 'ta' ? 'சுயவிவரம்' : 'Profile';

              if (entry.url) {
                link.href = entry.url;
                link.target = '_blank';
                link.rel = 'noopener noreferrer';
              } else {
                link.href = '#';
              }

              // Prevent link interactions from toggling party selection.
              ['click', 'mousedown', 'mouseup', 'touchstart', 'touchend', 'pointerdown', 'pointerup'].forEach(function (evt) {
                link.addEventListener(evt, function (e) {
                  e.stopPropagation();
                });
              });

              if (!entry.url) {
                link.classList.add('is-disabled');
                link.addEventListener('click', function (e) {
                  e.preventDefault();
                  window.alert(getProfileUnavailableMessage());
                });
              }

              links.appendChild(link);

              if (entry.partyUrl) {
                var partyLink = document.createElement('a');
                partyLink.href = entry.partyUrl;
                partyLink.target = '_blank';
                partyLink.rel = 'noopener noreferrer';
                partyLink.textContent = uiLang === 'ta' ? 'கட்சி' : 'Party';
                ['click', 'mousedown', 'mouseup', 'touchstart', 'touchend', 'pointerdown', 'pointerup'].forEach(function (evt) {
                  partyLink.addEventListener(evt, function (e) {
                    e.stopPropagation();
                  });
                });
                links.appendChild(partyLink);
              }

              holder.appendChild(links);
              if (insertAfter.nextSibling) {
                insertParent.insertBefore(holder, insertAfter.nextSibling);
              } else {
                insertParent.appendChild(holder);
              }
            });
          }

          var observer = null;
          var injectScheduled = false;
          var isInjecting = false;

          function runInjectors() {
            if (isInjecting) return;
            isInjecting = true;
            if (observer) observer.disconnect();
            try {
              injectLinks();
              injectCandidateProfileLinks();
            } finally {
              if (observer) observer.observe(container, { childList: true, subtree: true });
              isInjecting = false;
            }
          }

          function scheduleInjectors() {
            if (injectScheduled) return;
            injectScheduled = true;
            window.requestAnimationFrame(function () {
              injectScheduled = false;
              runInjectors();
            });
          }

          observer = new MutationObserver(function () {
            scheduleInjectors();
          });
          observer.observe(container, { childList: true, subtree: true });
          runInjectors(); // catch anything already rendered

          // OEC updates some UI states asynchronously; periodic refresh keeps source labels in sync.
          setInterval(function () {
            scheduleInjectors();
          }, 2400);
        })
        .catch(function () { /* silently ignore – sources are optional */ });
    }());
  </script>

</body>
</html>
