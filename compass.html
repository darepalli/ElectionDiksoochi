      }

      function getAllianceMetaForParty(party, partyTag) {
        var alias = String((party && party.alias) || '').toLowerCase();
        if (alias.indexOf('cand-dmk') === 0 || alias === 'dmk' || alias === 'dmk-alliance' || partyTag === 'DMK' || partyTag === 'INC' || partyTag === 'VCK' || partyTag === 'CPI' || partyTag === 'CPI(M)' || partyTag === 'CPM' || partyTag === 'MDMK') {
          var dmkMeta = allianceDisplayMap['dmk-alliance'] || null;
          return {
            key: 'dmk',
            aliasKey: 'dmk-alliance',
            label: dmkMeta && dmkMeta.label ? dmkMeta.label : (uiLang === 'ta' ? 'திமுக கூட்டணி' : 'DMK Alliance'),
            membersText: dmkMeta && dmkMeta.membersText ? dmkMeta.membersText : ''
          };
        }
        if (alias.indexOf('cand-aiadmk') === 0 || alias === 'aiadmk' || alias === 'aiadmk-alliance' || partyTag === 'AIADMK' || partyTag === 'ADMK' || partyTag === 'DMDK' || partyTag === 'PMK') {
          var aiadmkMeta = allianceDisplayMap['aiadmk-alliance'] || null;
          return {
            key: 'aiadmk',
            aliasKey: 'aiadmk-alliance',
            label: aiadmkMeta && aiadmkMeta.label ? aiadmkMeta.label : (uiLang === 'ta' ? 'அதிமுக கூட்டணி' : 'AIADMK Alliance'),
            membersText: aiadmkMeta && aiadmkMeta.membersText ? aiadmkMeta.membersText : ''
          };
        }
        if (alias.indexOf('cand-bjp') === 0 || alias === 'bjp' || alias === 'bjp-alliance' || partyTag === 'BJP') {
          var bjpMeta = allianceDisplayMap['bjp-alliance'] || null;
          return {
            key: 'bjp',
            aliasKey: 'bjp-alliance',
            label: bjpMeta && bjpMeta.label ? bjpMeta.label : (uiLang === 'ta' ? 'பாஜக கூட்டணி' : 'BJP Alliance'),
            membersText: bjpMeta && bjpMeta.membersText ? bjpMeta.membersText : ''
          };
        }
        if (alias === 'tvk' || partyTag === 'TVK') {
          var tvkMeta = allianceDisplayMap['tvk'] || null;
          return {
            key: 'ind',
            aliasKey: 'tvk',
            label: tvkMeta && tvkMeta.label ? tvkMeta.label : 'TVK',
            membersText: tvkMeta && tvkMeta.membersText ? tvkMeta.membersText : ''
          };
        }
        if (alias.indexOf('cand-ind') === 0 || partyTag === 'IND' || partyTag === 'INDEPENDENT') {
          return {
            key: 'ind',
            aliasKey: 'ind',
            label: uiLang === 'ta' ? 'சுயேட்சை / பிற' : 'Independent / Other',
            membersText: ''
          };
        }

        return {
          key: 'ind',
          aliasKey: 'ind',
          label: uiLang === 'ta' ? 'பிற' : 'Other',
          membersText: ''
        };
      }

      function renderCandidateProfilePanel () {
        if (!candidateLinkItems.length) return;
        var groupCollapsedState = readCollapsedGroupState();

        var panel = document.getElementById('oec-profile-panel');
        if (!panel) {
          panel = document.createElement('aside');
          panel.id = 'oec-profile-panel';
          panel.className = 'oec-profile-panel';
          document.body.appendChild(panel);
        }

        if (window.localStorage) {
          var savedState = window.localStorage.getItem('oec-profile-panel-collapsed');
          profilePanelCollapsed = savedState === '1';
        }

        if (profilePanelCollapsed) panel.classList.add('is-collapsed');
        else panel.classList.remove('is-collapsed');

        var title = uiLang === 'ta' ? 'கட்சிகள் & இணைப்புகள்' : 'Parties & Links';
        var toggleText = profilePanelCollapsed
          ? (uiLang === 'ta' ? 'விரி' : 'Expand')
          : (uiLang === 'ta' ? 'சுருக்கு' : 'Collapse');
        var positionsText = uiLang === 'ta' ? 'கட்சி நிலைப்பாடுகள்' : 'Party Positions';
        var positionsHref = '#';
        try {
          var u = new URL(window.location.href);
          var safeConfigPath = getConfigPathForQuery(configPath);
          if (safeConfigPath) u.searchParams.set('config', safeConfigPath);
          u.searchParams.set('partypositions', '1');
          u.searchParams.set('viewmode', 'tabular');
          u.searchParams.delete('randomresults');
          positionsHref = u.toString();
        } catch (e) {}

        var html = '<div class="oec-profile-panel__header">';
        html += '<h4 class="oec-profile-panel__title">' + escapeHtml(title) + '</h4>';
        html += '<a class="oec-profile-link-btn" href="' + escapeHtml(positionsHref) + '">' + escapeHtml(positionsText) + '</a>';
        html += '<button type="button" class="oec-profile-toggle" id="oec-profile-toggle">' + escapeHtml(toggleText) + '</button>';
        html += '</div>';
        html += '<div class="oec-profile-panel__body">';
        var allianceOrder = ['dmk', 'aiadmk', 'bjp', 'ind'];
        var groups = {};
        candidateLinkItems.forEach(function (item) {
          if (!groups[item.allianceKey]) {
            groups[item.allianceKey] = {
              key: item.allianceKey,
              aliasKey: item.allianceAliasKey || item.allianceKey,
              label: item.allianceLabel,
              membersText: item.allianceMembers || '',
              items: []
            };
          }
          if (!groups[item.allianceKey].aliasKey && item.allianceAliasKey) {
            groups[item.allianceKey].aliasKey = item.allianceAliasKey;
          }
          if (!groups[item.allianceKey].membersText && item.allianceMembers) {
            groups[item.allianceKey].membersText = item.allianceMembers;
          }
          groups[item.allianceKey].items.push(item);
        });

        allianceOrder.forEach(function (allianceKey) {
          var group = groups[allianceKey];
          if (!group || !group.items.length) return;
          var isGroupCollapsed = !!groupCollapsedState[group.key];
          var groupSeatRows = getAllianceSeatRows(group.aliasKey);
          var groupHeaderSymbol = (groupSeatRows[0] && groupSeatRows[0].symbol) ? groupSeatRows[0].symbol : '';
          var groupToggleText = isGroupCollapsed
            ? (uiLang === 'ta' ? 'விரி' : 'Expand')
            : (uiLang === 'ta' ? 'சுருக்கு' : 'Collapse');

          html += '<section class="oec-profile-panel__group" data-alliance="' + escapeHtml(group.key) + '">';
          html += '<div class="oec-profile-panel__group-head">';
          html += '<h5 class="oec-profile-panel__group-title">';
          if (groupHeaderSymbol) {
            html += '<span class="oec-alliance-header-symbol">' + escapeHtml(groupHeaderSymbol) + '</span>';
          } else {
            html += '<span class="oec-alliance-dot" data-alliance="' + escapeHtml(group.key) + '"></span>';
          }
          html += '<span>' + escapeHtml(group.label) + '</span>';
          html += '</h5>';
          html += '<button type="button" class="oec-group-toggle" data-group-key="' + escapeHtml(group.key) + '">' + escapeHtml(groupToggleText) + '</button>';
          html += '</div>';
          html += '<div class="oec-profile-panel__group-body' + (isGroupCollapsed ? ' is-collapsed' : '') + '">';
          if (group.membersText) {
            html += '<p class="oec-profile-panel__group-members">' + escapeHtml(group.membersText) + '</p>';
          }
          html += renderAllianceSeatRows(group.aliasKey);
          html += '</div></section>';
        });

        html += '</div>';
        panel.innerHTML = html;

        var toggleBtn = panel.querySelector('#oec-profile-toggle');
        if (toggleBtn) {
          toggleBtn.addEventListener('click', function () {
            profilePanelCollapsed = !profilePanelCollapsed;
            if (profilePanelCollapsed) panel.classList.add('is-collapsed');
            else panel.classList.remove('is-collapsed');
            if (window.localStorage) {
              window.localStorage.setItem('oec-profile-panel-collapsed', profilePanelCollapsed ? '1' : '0');
            }
            toggleBtn.textContent = profilePanelCollapsed
              ? (uiLang === 'ta' ? 'விரி' : 'Expand')
              : (uiLang === 'ta' ? 'சுருக்கு' : 'Collapse');
          });
        }

        var groupToggles = panel.querySelectorAll('.oec-group-toggle');
        groupToggles.forEach(function (btn) {
          btn.addEventListener('click', function () {
            var key = btn.getAttribute('data-group-key') || '';
            if (!key) return;
            var body = btn.closest('.oec-profile-panel__group') && btn.closest('.oec-profile-panel__group').querySelector('.oec-profile-panel__group-body');
            if (!body) return;
            var collapsed = body.classList.toggle('is-collapsed');
            groupCollapsedState[key] = collapsed;
            persistCollapsedGroupState(groupCollapsedState);
            btn.textContent = collapsed
              ? (uiLang === 'ta' ? 'விரி' : 'Expand')
              : (uiLang === 'ta' ? 'சுருக்கு' : 'Collapse');
          });
        });
      }

      var noCacheToken = String(Date.now());
      var noCacheConfigUrl = withNoCache(configPath, noCacheToken);

      fetch(noCacheConfigUrl, { cache: 'no-store' })
        .then(function (r) { return r.ok ? r.json() : Promise.reject(r.status); })
        .then(function (cfg) {
          var parties = cfg.parties || [];
          var theses  = cfg.theses  || [];
          var langs   = (cfg.languages || []).map(function (l) { return l.code; });
          allianceDisplayMap = {};

          var partyByAlias = {};
          parties.forEach(function (party) {
            if (party && party.alias) partyByAlias[String(party.alias)] = party;
          });

          var allianceMetaCfg = cfg.allianceMetadata || {};
          Object.keys(allianceMetaCfg).forEach(function (aliasKey) {
            var meta = allianceMetaCfg[aliasKey] || {};
            var members = (meta.displayMembers && (meta.displayMembers[uiLang] || meta.displayMembers.en || meta.displayMembers.ta)) || [];
            var membersText = Array.isArray(members) ? members.join(', ') : '';
            var party = partyByAlias[aliasKey] || null;
            var label = '';
            if (party) {
              label = (party.short && (party.short[uiLang] || party.short.en || party.short.ta)) ||
                (party.name && (party.name[uiLang] || party.name.en || party.name.ta)) || '';
            }
            allianceDisplayMap[aliasKey] = {
              label: label,
              membersText: membersText
            };
          });
          debugLog('config loaded: theses=' + theses.length + ', parties=' + parties.length);

          // Build a default source map per party alias for fallback matching.
          var aliasSource = {};
          theses.forEach(function (thesis) {
            parties.forEach(function (party) {
              if (aliasSource[party.alias]) return;
              var pos = thesis.positions && thesis.positions[party.alias];
              if (pos && pos.source) aliasSource[party.alias] = pos.source;
            });
          });

          parties.forEach(function (party) {
            var src = aliasSource[party.alias] || '';
            if (!src) return;
            langs.forEach(function (code) {
              var shortName = party.short && party.short[code];
              var longName = party.name && party.name[code];
              if (shortName) partySourceMap[normalizeText(shortName)] = src;
              if (longName) partySourceMap[normalizeText(longName)] = src;
              if (shortName) partyAliasByDisplayKey[normalizeText(shortName)] = party.alias;
              if (longName) partyAliasByDisplayKey[normalizeText(longName)] = party.alias;
            });
            if (party.alias) partyAliasByDisplayKey[normalizeText(party.alias)] = party.alias;
          });
          debugLog('party fallback keys=' + Object.keys(partySourceMap).length);

          // Build candidate profile map from optional parties[].profile links.
          parties.forEach(function (party) {
            var profileUrl = '';
            if (party.profile && typeof party.profile === 'string') {
              profileUrl = party.profile;
            } else if (party.profile && typeof party.profile === 'object') {
              profileUrl = party.profile[uiLang] || party.profile.en || party.profile.ta || '';
            }

            var partyTag = '';
            var enName = (party.name && party.name.en) ? String(party.name.en) : '';
            if (enName && /\(([^\)]+)\)/.test(enName)) {
              partyTag = RegExp.$1.trim().toUpperCase();
            }
            if (!partyTag && party.alias) {
              var alias = String(party.alias);
              if (/^cand-([a-z0-9()]+)$/i.test(alias)) {
                partyTag = RegExp.$1.toUpperCase();
              } else if (alias === 'dmk-alliance') {
                partyTag = 'DMK';
              } else if (alias === 'aiadmk-alliance') {
                partyTag = 'AIADMK';
              } else if (alias === 'bjp-alliance') {
                partyTag = 'BJP';
              } else if (alias === 'tvk') {
                partyTag = 'TVK';
              }
            }

            var meta = PARTY_META[partyTag] || null;
            var partyWiki = meta ? meta.wiki : '';
            var symbolText = meta ? meta.symbol : '';

            if (!profileUrl && !partyWiki) return;

            var keys = [];
            langs.forEach(function (code) {
              var shortName = party.short && party.short[code];
              var longName = party.name && party.name[code];
              if (shortName) keys.push(normalizeText(shortName));
              if (longName) keys.push(normalizeText(longName));
            });
            if (party.alias) keys.push(normalizeText(party.alias));

            partyProfileEntries.push({
              url: profileUrl,
              partyUrl: partyWiki,
              symbol: symbolText,
              keys: keys.filter(Boolean)
            });

            var displayName = '';
            if (party.short && party.short[uiLang]) displayName = party.short[uiLang];
            else if (party.name && party.name[uiLang]) displayName = party.name[uiLang];
            else if (party.short && party.short.en) displayName = party.short.en;
            else if (party.name && party.name.en) displayName = party.name.en;
            else displayName = party.alias || 'Candidate';

            var allianceMeta = getAllianceMetaForParty(party, partyTag);

            candidateLinkItems.push({
              name: displayName,
              symbol: symbolText,
              profileUrl: profileUrl,
              partyUrl: partyWiki,
              allianceKey: allianceMeta.key,
              allianceAliasKey: allianceMeta.aliasKey,
              allianceLabel: allianceMeta.label,
              allianceMembers: allianceMeta.membersText || ''
            });
          });
          debugLog('candidate profile entries=' + partyProfileEntries.length);
          renderCandidateProfilePanel();

          theses.forEach(function (thesis) {
            parties.forEach(function (party) {
              var pos = thesis.positions && thesis.positions[party.alias];
              if (!pos) return;
              var thesisTitleEn = (thesis.title && thesis.title.en) ? String(thesis.title.en) : '';
              langs.forEach(function (code) {
                var text = pos.explanation && pos.explanation[code];
                addExplanationSource(text, pos.source || '');
                addExplanationMeta(text, {
                  partyAlias: party.alias || '',
                  thesisTitleEn: thesisTitleEn,
                  position: pos.position || 'neutral',
                  source: pos.source || '',
                  explanationRaw: (pos.explanation && (pos.explanation.en || pos.explanation.ta || text)) || ''
                });
              });
            });
          });
          debugLog('explanation source keys=' + Object.keys(srcMap).length);

          var container = document.getElementById('open-election-compass');
          if (!container) return;

          var legacyExcerptsData = null;
          var baseConfigPath = stripQueryAndHash(configPath);
          var legacyPath = baseConfigPath.replace(/config\.json$/i, 'legacy-party-excerpts.json');
          var legacyLoadPromise = fetch(withNoCache(legacyPath, noCacheToken), { cache: 'no-store' })
            .then(function (r) { return r.ok ? r.json() : null; })
            .catch(function () { return null; })
            .then(function (legacyExcerpts) {
              legacyExcerptsData = legacyExcerpts || null;
              return legacyExcerptsData;
            });

          if (isLocalhost && randomResultsMode) {
            legacyLoadPromise.then(function (legacyExcerpts) {
              var rendered = renderRandomResultsPage(container, cfg, legacyExcerpts || null);
              if (rendered) debugLog('random results mode rendered');
            });
            return;
          }

          if (partyPositionsMode) {
            legacyLoadPromise.then(function (legacyExcerpts) {
              var rendered = renderPartyPositionsPage(container, cfg, legacyExcerpts || null);
              if (rendered) debugLog('party positions mode rendered');
            });
            return;
          }

          function injectLinks () {
            var bubbles = container.querySelectorAll('.chat-bubble');
            if (!bubbles.length && debugMode) {
              debugLog('scan: bubbles=0');
            }

            bubbles.forEach(function (bubble) {
              var bubbleEl = bubble.querySelector('.chat-bubble__bubble') || bubble.querySelector('[class*="chat-bubble__bubble"]');
              if (!bubbleEl) return;

              // Keep source block idempotent to avoid observer feedback loops.
              var existingInfo = bubbleEl.querySelector('.oec-source-inline');
              var existingDetails = bubbleEl.querySelector('.oec-live-party-details');

              var bubbleText = normalizeText(bubbleEl.textContent);
              var partyAliasHint = getPartyAliasFromBubble(bubble);
              var explanationMeta = findExplanationMeta(bubbleText, partyAliasHint);
              var src = srcMap[bubbleText] || srcMap[bubbleText.substring(0, 80)] || '';
              var matchKind = src ? 'explanation-exact' : 'none';

              // Fuzzy match when the UI truncates or slightly alters punctuation.
              if (!src && bubbleText) {
                for (var k in srcMap) {
                  if (k.length < 30) continue;
                  if (bubbleText.indexOf(k) === 0 || k.indexOf(bubbleText) === 0) {
                    src = srcMap[k];
                    matchKind = 'explanation-fuzzy';
                    break;
                  }
                }
              }

              // Fallback by party label in bubble footer/header.
              if (!src) {
                var partyEl = bubble.querySelector('.chat-bubble__party');
                if (partyEl) {
                  var partyKey = normalizeText(partyEl.textContent);
                  src = partySourceMap[partyKey] || '';
                  if (src) matchKind = 'party-fallback';
                }
              }

              if (!src && explanationMeta && explanationMeta.source) {
                src = explanationMeta.source;
                matchKind = 'meta-fallback';
              }

              var info = existingInfo || document.createElement('div');
              info.className = 'oec-source-inline';

              if (src) {
                info.textContent = 'Source: ';
                var a = info.querySelector('a.oec-source-link') || document.createElement('a');
                a.href = src;
                a.target = '_blank';
                a.rel = 'noopener noreferrer';
                a.className = 'oec-source-link';
                a.textContent = getSourceLabel(src);
                if (!a.parentElement) info.appendChild(a);
              } else {
                info.textContent = 'Source: not added yet.';
              }

              if (!existingInfo) bubbleEl.appendChild(info);

              if (explanationMeta && explanationMeta.partyAlias) {
                var detailHtml = '';
                var subpartyPositions = getAllianceSubpartyPositions(
                  explanationMeta.partyAlias,
                  explanationMeta.position,
                  explanationMeta.explanationRaw,
                  explanationMeta.thesisTitleEn,
                  legacyExcerptsData
                );

                if (subpartyPositions.length > 1) {
                  var uniq = {};
                  subpartyPositions.forEach(function (sp) { uniq[sp.position] = true; });
                  if (Object.keys(uniq).length > 1) {
                    detailHtml += '<span class="oec-live-party-details__excerpt">'
                      + escapeHtml(uiLang === 'ta' ? 'இந்த கூட்டணியில் கட்சிகள் வேறுபட்ட நிலைப்பாடுகளை கொண்டுள்ளன.' : 'Parties in this alliance hold different positions on this issue.')
                      + '</span>';
                  }
                }

                subpartyPositions.forEach(function (item) {
                  var subLabel = getPositionLabel(item.position);
                  detailHtml += '<span class="oec-live-party-details__line">' + escapeHtml(item.party + ': ' + subLabel) + '</span>';
                  if (item.excerpt) {
                    detailHtml += '<span class="oec-live-party-details__excerpt">"' + escapeHtml(item.excerpt) + '"</span>';
                  }
                });

                if (detailHtml) {
                  var details = existingDetails || document.createElement('div');
                  details.className = 'oec-live-party-details';
                  details.innerHTML = detailHtml;
                  if (!existingDetails) bubbleEl.appendChild(details);
                } else if (existingDetails && existingDetails.parentElement) {
                  existingDetails.parentElement.removeChild(existingDetails);
                }
              } else if (existingDetails && existingDetails.parentElement) {
                existingDetails.parentElement.removeChild(existingDetails);
              }

              debugLog('bubble processed: match=' + matchKind + ', text=' + bubbleText.substring(0, 64));
            });
          }

          function findProfileEntryForText(text) {
            var norm = normalizeText(text);
            if (!norm) return null;
            for (var i = 0; i < partyProfileEntries.length; i++) {
              var entry = partyProfileEntries[i];
              for (var j = 0; j < entry.keys.length; j++) {
                var key = entry.keys[j];
                if (!key) continue;
                if (norm.indexOf(key) >= 0 || key.indexOf(norm) >= 0) {
                  return entry;
                }
              }
            }
            return null;
          }

          function injectCandidateProfileLinks () {
            if (!partyProfileEntries.length) return;

            var candidates = container.querySelectorAll(
              'button, [role="button"], label, .party-item, [class*="party-item"], .base-button, [class*="party"]'
            );

            candidates.forEach(function (el) {
              if (!el || el.closest('.oec-candidate-profile')) return;
              var rawText = (el.textContent || '').replace(/\s+/g, ' ').trim();
              if (!rawText || rawText.length < 3) return;

              var entry = findProfileEntryForText(rawText);
              if (!entry) return;

              // Find a stable insertion anchor near the selectable control.
              var anchor = el;
              var partyBlock = el.closest('.party-item') || el.closest('[class*="party-item"]') || el.closest('[class*="party"]');
              if (partyBlock) anchor = partyBlock;

              var anchorKey = normalizeText((anchor.textContent || '').replace(/\s+/g, ' ').trim());
              if (!anchorKey) return;

              var existing = Array.prototype.slice.call(container.querySelectorAll('.oec-candidate-profile'))
                .some(function (n) { return n.getAttribute('data-profile-key') === anchorKey; });
              if (existing) return;

              var insertParent = anchor.parentElement;
              var insertAfter = anchor;
              if (!insertParent) return;

              // Keep link outside labels to avoid toggling checkboxes.
              if (insertAfter.tagName && insertAfter.tagName.toLowerCase() === 'label' && insertAfter.parentElement) {
                insertParent = insertAfter.parentElement;
              }

              var holder = document.createElement('div');
              holder.className = 'oec-candidate-profile';
              holder.setAttribute('data-profile-key', anchorKey);

              if (entry.symbol) {
                var symbol = document.createElement('span');
                symbol.className = 'oec-party-symbol';
                symbol.textContent = entry.symbol;
                holder.appendChild(symbol);
              }

              var links = document.createElement('span');
              links.className = 'oec-candidate-links';

              var link = document.createElement('a');
              link.textContent = uiLang === 'ta' ? 'சுயவிவரம்' : 'Profile';

              if (entry.url) {
                link.href = entry.url;
                link.target = '_blank';
                link.rel = 'noopener noreferrer';
              } else {
                link.href = '#';
              }

              // Prevent link interactions from toggling party selection.
              ['click', 'mousedown', 'mouseup', 'touchstart', 'touchend', 'pointerdown', 'pointerup'].forEach(function (evt) {
                link.addEventListener(evt, function (e) {
                  e.stopPropagation();
                });
              });

              if (!entry.url) {
                link.classList.add('is-disabled');
                link.addEventListener('click', function (e) {
                  e.preventDefault();
                  window.alert(getProfileUnavailableMessage());
                });
              }

              links.appendChild(link);

              if (entry.partyUrl) {
                var partyLink = document.createElement('a');
                partyLink.href = entry.partyUrl;
                partyLink.target = '_blank';
                partyLink.rel = 'noopener noreferrer';
                partyLink.textContent = uiLang === 'ta' ? 'கட்சி' : 'Party';
                ['click', 'mousedown', 'mouseup', 'touchstart', 'touchend', 'pointerdown', 'pointerup'].forEach(function (evt) {
                  partyLink.addEventListener(evt, function (e) {
                    e.stopPropagation();
                  });
                });
                links.appendChild(partyLink);
              }

              holder.appendChild(links);
              if (insertAfter.nextSibling) {
                insertParent.insertBefore(holder, insertAfter.nextSibling);
              } else {
                insertParent.appendChild(holder);
              }
            });
          }

          var observer = null;
          var injectScheduled = false;
          var isInjecting = false;

          function runInjectors() {
            if (isInjecting) return;
            isInjecting = true;
            if (observer) observer.disconnect();
            try {
              injectLinks();
              injectCandidateProfileLinks();
            } finally {
              if (observer) observer.observe(container, { childList: true, subtree: true });
              isInjecting = false;
            }
          }

          function scheduleInjectors() {
            if (injectScheduled) return;
            injectScheduled = true;
            window.requestAnimationFrame(function () {
              injectScheduled = false;
              runInjectors();
            });
          }

          observer = new MutationObserver(function () {
            scheduleInjectors();
          });
          observer.observe(container, { childList: true, subtree: true });

          container.addEventListener('click', function (e) {
            var target = e.target;
            if (!target || !target.closest) return;
            var control = target.closest('button, [role="button"], label, .party-item__button, input[type="radio"], input[type="checkbox"]');
            if (!control) return;

            var txt = getControlText(control);
            if (!isStanceText(txt)) return;

            var token = getUserResponseTokenFromText(txt);
            if (!token) return;

            var marker = getStepMarker(container);
            if (!marker) return;
            var key = normalizeText(marker);
            if (!key) return;

            userResponseByThesisKey[key] = token;
          }, true);

          runInjectors(); // catch anything already rendered

          legacyLoadPromise.then(function () {
            scheduleInjectors();
          });

          // OEC updates some UI states asynchronously; periodic refresh keeps source labels in sync.
          setInterval(function () {
            scheduleInjectors();
          }, 2400);
        })
        .catch(function () { /* silently ignore – sources are optional */ });
    }());
  </script>

</body>
</html>
