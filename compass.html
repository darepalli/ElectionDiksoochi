<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="India Election Compass" />
  <title>Election Compass</title>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />

  <style>
    :root {
      --back-bar-h: 36px;
    }

    /* Thin wrapper styles â€“ OEC renders everything else */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }

    /* Back-to-hub bar */
    .back-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 9999;
      background: rgba(192, 57, 43, 0.95);
      padding: calc(6px + env(safe-area-inset-top, 0px)) 1rem 6px;
      display: flex;
      align-items: center;
      gap: 1rem;
      min-height: 36px;
      backdrop-filter: blur(2px);
    }
    .back-bar a {
      color: #fff;
      text-decoration: none;
      font-size: .86rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 4px;
      min-height: 34px;
    }
    .back-bar a:hover { text-decoration: underline; }
    .back-bar .sep { color: rgba(255,255,255,.5); }
    .back-bar .current-label {
      font-size: .82rem;
      color: rgba(255,255,255,.85);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .back-bar .spacer {
      flex: 1;
    }

    .language-switch {
      display: inline-flex;
      align-items: center;
      border: 1px solid rgba(255,255,255,.45);
      border-radius: 8px;
      overflow: hidden;
      min-height: 34px;
      background: rgba(255,255,255,.08);
    }

    .lang-btn {
      border: 0;
      background: transparent;
      color: rgba(255,255,255,.88);
      font-size: 0.75rem;
      font-weight: 700;
      padding: 0.32rem 0.5rem;
      min-height: 34px;
      min-width: 44px;
      cursor: pointer;
    }

    .lang-btn + .lang-btn {
      border-left: 1px solid rgba(255,255,255,.28);
    }

    .lang-btn.is-active {
      color: #fff;
      background: rgba(255,255,255,.22);
    }

    .feedback-trigger {
      border: 1px solid rgba(255,255,255,.45);
      background: rgba(255,255,255,.12);
      color: #fff;
      border-radius: 7px;
      padding: 0.35rem 0.6rem;
      font-size: 0.76rem;
      font-weight: 700;
      cursor: pointer;
      min-height: 34px;
    }

    .feedback-trigger:hover {
      background: rgba(255,255,255,.2);
    }

    .party-links-wrap {
      position: relative;
    }

    .party-links-trigger {
      border: 1px solid rgba(255,255,255,.45);
      background: rgba(255,255,255,.12);
      color: #fff;
      border-radius: 7px;
      padding: 0.35rem 0.6rem;
      font-size: 0.76rem;
      font-weight: 700;
      cursor: pointer;
      min-height: 34px;
      display: none;
    }

    .party-links-trigger.is-visible {
      display: inline-flex;
      align-items: center;
    }

    .party-links-trigger:hover {
      background: rgba(255,255,255,.2);
    }

    .party-links-menu {
      position: absolute;
      right: 0;
      top: calc(100% + 6px);
      width: min(360px, calc(100vw - 20px));
      max-height: 58vh;
      overflow: auto;
      z-index: 12000;
      border: 1px solid #dbeafe;
      border-radius: 10px;
      background: #ffffff;
      box-shadow: 0 12px 26px rgba(15, 23, 42, 0.18);
      padding: 0.55rem 0.6rem;
      display: none;
    }

    .party-links-menu.is-open {
      display: block;
    }

    .party-links-menu .oec-alliance-seat-link {
      font-size: 0.56rem;
      font-weight: 700;
      color: #1e3a8a;
      border-bottom-color: #60a5fa;
    }

    .party-links-menu .oec-alliance-seat-link:hover {
      color: #1e40af;
    }

    /* Push OEC content below the back-bar */
    #open-election-compass {
      padding-top: calc(var(--back-bar-h, 36px) + 4px);
      min-height: 100vh;
    }

    /* Error state */
    .error-page {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 1rem;
      color: #374151;
      text-align: center;
      padding: 2rem;
    }
    .error-page h1 { font-size: 1.5rem; color: #c0392b; }
    .error-page p  { max-width: 480px; color: #6b7280; }
    .error-page a  { color: #c0392b; font-weight: 600; }

    /* Source citation shown inline inside compare explanation bubbles */
    .oec-source-link {
      display: inline-block;
      margin-top: 0.6rem;
      padding: 0.35rem 0.65rem;
      font-size: 0.76rem;
      font-weight: 600;
      color: #2563eb;
      border: 1px solid #bfdbfe;
      border-radius: 4px;
      text-decoration: none;
      background: #eff6ff;
    }
    .oec-source-link:hover {
      background: #dbeafe;
      text-decoration: underline;
    }

    .oec-source-inline {
      margin-top: 0.55rem;
      font-size: 0.78rem;
      line-height: 1.35;
      color: #475569;
      word-break: break-word;
    }

    .oec-live-party-details {
      margin-top: 0.42rem;
      padding-top: 0.34rem;
      border-top: 1px dashed #dbe4ee;
      font-size: 0.73rem;
      color: #475569;
      line-height: 1.3;
    }

    .oec-live-party-details__line {
      display: block;
      margin-top: 0.15rem;
      font-weight: 700;
      color: #334155;
    }

    .oec-live-party-details__excerpt {
      display: block;
      margin-top: 0.1rem;
      font-size: 0.71rem;
      font-style: italic;
      color: #64748b;
    }

    .oec-candidate-profile {
      margin-top: 0.45rem;
      font-size: 0.76rem;
      line-height: 1.3;
      display: block;
      position: relative;
      z-index: 2;
      pointer-events: auto;
    }

    .oec-party-symbol {
      display: inline-block;
      margin-right: 0.45rem;
      font-weight: 700;
      color: #334155;
    }

    .oec-candidate-links {
      display: inline-flex;
      gap: 0.55rem;
      flex-wrap: wrap;
      align-items: center;
    }

    .oec-profile-panel {
      position: fixed;
      right: 12px;
      top: calc(var(--back-bar-h, 56px) + 12px);
      width: min(336px, calc(100vw - 24px));
      max-height: calc(100vh - var(--back-bar-h, 56px) - 24px);
      overflow: auto;
      z-index: 11400;
      background: #ffffff;
      border: 1px solid #dbeafe;
      border-radius: 10px;
      box-shadow: 0 12px 26px rgba(15, 23, 42, 0.16);
      padding: 0.55rem 0.6rem;
    }

    .oec-profile-panel.is-collapsed {
      width: auto;
      max-height: none;
      overflow: visible;
      padding-bottom: 0.6rem;
    }

    .oec-profile-panel__header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
      margin-bottom: 0.42rem;
    }

    .oec-profile-toggle {
      border: 1px solid #bfdbfe;
      background: #eff6ff;
      color: #1d4ed8;
      border-radius: 6px;
      padding: 0.18rem 0.5rem;
      font-size: 0.72rem;
      font-weight: 700;
      cursor: pointer;
    }

    .oec-profile-toggle:hover {
      background: #dbeafe;
    }

    .oec-profile-link-btn {
      border: 1px solid #c7d2fe;
      background: #eef2ff;
      color: #3730a3;
      border-radius: 6px;
      padding: 0.18rem 0.5rem;
      font-size: 0.72rem;
      font-weight: 700;
      text-decoration: none;
      line-height: 1.2;
      display: inline-flex;
      align-items: center;
      min-height: 1.72rem;
    }

    .oec-profile-link-btn:hover {
      background: #e0e7ff;
      text-decoration: underline;
    }

    .oec-profile-panel__title {
      margin: 0;
      color: #0f172a;
      font-size: 0.92rem;
      font-weight: 800;
    }

    .oec-profile-panel__body {
      display: block;
    }

    .oec-profile-panel.is-collapsed .oec-profile-panel__body {
      display: none;
    }

    .oec-profile-panel__list {
      display: grid;
      gap: 0.45rem;
    }

    .oec-profile-panel__item {
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      background: #f8fafc;
      padding: 0.45rem 0.5rem;
      border-left: 4px solid #cbd5e1;
    }

    .oec-profile-panel__item[data-alliance="dmk"] {
      border-left-color: #dc2626;
    }

    .oec-profile-panel__item[data-alliance="aiadmk"] {
      border-left-color: #16a34a;
    }

    .oec-profile-panel__item[data-alliance="bjp"] {
      border-left-color: #ea580c;
    }

    .oec-profile-panel__item[data-alliance="ind"] {
      border-left-color: #475569;
    }

    .oec-profile-panel__group {
      --alliance-accent: #64748b;
      --alliance-bg: #f8fafc;
      margin-bottom: 0.45rem;
      border: 1px solid color-mix(in srgb, var(--alliance-accent) 24%, #e2e8f0);
      border-radius: 8px;
      background: var(--alliance-bg);
      padding: 0.35rem 0.4rem;
    }

    .oec-profile-panel__group[data-alliance="dmk"] {
      --alliance-accent: #dc2626;
      --alliance-bg: #fef2f2;
    }

    .oec-profile-panel__group[data-alliance="aiadmk"] {
      --alliance-accent: #16a34a;
      --alliance-bg: #f0fdf4;
    }

    .oec-profile-panel__group[data-alliance="bjp"] {
      --alliance-accent: #ea580c;
      --alliance-bg: #fff7ed;
    }

    .oec-profile-panel__group[data-alliance="ind"] {
      --alliance-accent: #475569;
      --alliance-bg: #f8fafc;
    }

    .oec-profile-panel__group-title {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.72rem;
      font-weight: 800;
      color: #334155;
      margin: 0;
      text-transform: uppercase;
      letter-spacing: 0.02em;
    }

    .oec-profile-panel__group-members {
      margin: 0 0 0.28rem;
      color: #475569;
      font-size: 0.64rem;
      line-height: 1.2;
      font-weight: 600;
      overflow-x: auto;
      overflow-y: hidden;
      text-overflow: clip;
      scrollbar-width: thin;
    }

    .oec-alliance-members-line {
      display: inline-flex;
      align-items: center;
      flex-wrap: nowrap;
      gap: 0.28rem;
      white-space: nowrap;
      min-width: max-content;
    }

    .oec-alliance-member-link {
      display: inline-flex;
      align-items: center;
      white-space: nowrap;
    }

    .oec-alliance-member-sep {
      color: #94a3b8;
      font-weight: 700;
      user-select: none;
    }

    .oec-profile-panel__group-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.4rem;
      margin-bottom: 0.2rem;
    }

    .oec-profile-panel__group-body.is-collapsed {
      display: none;
    }

    .oec-group-toggle {
      border: 1px solid color-mix(in srgb, var(--alliance-accent) 35%, #cbd5e1);
      background: color-mix(in srgb, var(--alliance-accent) 8%, #ffffff);
      color: color-mix(in srgb, var(--alliance-accent) 75%, #1f2937);
      border-radius: 6px;
      padding: 0.1rem 0.32rem;
      font-size: 0.64rem;
      font-weight: 700;
      cursor: pointer;
      line-height: 1.1;
    }

    .oec-alliance-seat-list {
      display: grid;
      gap: 0.22rem;
      margin: 0.18rem 0 0;
    }

    .oec-alliance-pie-wrap {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin: 0.18rem 0 0.28rem;
    }

    .oec-alliance-pie {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      border: 1px solid #dbe4ee;
      flex: 0 0 64px;
      position: relative;
    }

    .oec-alliance-pie::after {
      content: '';
      position: absolute;
      inset: 13px;
      background: #fff;
      border-radius: 50%;
      border: 1px solid #e5e7eb;
    }

    .oec-alliance-pie-total {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.62rem;
      font-weight: 800;
      color: #334155;
      z-index: 1;
    }

    .oec-alliance-pie-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 0.12rem 0.34rem;
      min-width: 0;
      flex: 1;
      max-height: 1.7rem;
      overflow: hidden;
      align-content: flex-start;
    }

    .oec-alliance-pie-legend-item {
      display: inline-flex;
      align-items: center;
      gap: 0.24rem;
      font-size: 0.58rem;
      color: #1f2937;
      white-space: nowrap;
      line-height: 1.1;
    }

    .oec-alliance-pie-dot {
      width: 0.46rem;
      height: 0.46rem;
      border-radius: 999px;
      flex: 0 0 0.46rem;
      border: 1px solid rgba(15, 23, 42, 0.1);
    }

    .oec-alliance-source {
      margin-top: 0.1rem;
      font-size: 0.62rem;
      color: #64748b;
      line-height: 1.2;
    }

    .oec-alliance-seat-row {
      border: 1px solid color-mix(in srgb, var(--alliance-accent) 18%, #e2e8f0);
      border-radius: 6px;
      background: color-mix(in srgb, var(--alliance-accent) 4%, #ffffff);
      padding: 0.26rem 0.34rem;
    }

    .oec-alliance-seat-row__top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.28rem;
      margin-bottom: 0;
    }

    .oec-alliance-seat-row__party {
      display: inline-flex;
      align-items: center;
      gap: 0.22rem;
      font-size: 0.66rem;
      font-weight: 700;
      color: #1f2937;
    }

    .oec-alliance-seat-swatch {
      width: 0.42rem;
      height: 0.42rem;
      border-radius: 999px;
      display: inline-block;
      flex: 0 0 0.42rem;
      border: 1px solid rgba(15, 23, 42, 0.1);
    }

    .oec-alliance-seat-row__party-symbol {
      font-size: 0.72rem;
      line-height: 1;
    }

    .oec-alliance-seat-row__links {
      display: inline-flex;
      gap: 0.28rem;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .oec-alliance-seat-link {
      color: color-mix(in srgb, var(--alliance-accent) 72%, #1d4ed8);
      text-decoration: none;
      font-size: 0.62rem;
      font-weight: 700;
      border-bottom: 1px dotted color-mix(in srgb, var(--alliance-accent) 45%, #93c5fd);
    }

    .oec-alliance-seat-link:hover {
      text-decoration: underline;
    }

    .oec-alliance-seat-row__bar { display: none; }

    .oec-alliance-seat-row__fill {
      display: block;
      height: 100%;
      background: linear-gradient(
        90deg,
        color-mix(in srgb, var(--alliance-accent) 70%, #ffffff),
        var(--alliance-accent)
      );
      border-radius: 999px;
      min-width: 2px;
    }

    .oec-alliance-seat-row__meta {
      margin-top: 0.02rem;
      color: #64748b;
      font-size: 0.6rem;
      line-height: 1.2;
    }

    .oec-alliance-dot {
      width: 0.6rem;
      height: 0.6rem;
      border-radius: 999px;
      display: inline-block;
      background: #cbd5e1;
    }

    .oec-alliance-header-symbol {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 0.9rem;
      height: 0.9rem;
      font-size: 0.82rem;
      line-height: 1;
    }

    .oec-alliance-dot[data-alliance="dmk"] {
      background: #dc2626;
    }

    .oec-alliance-dot[data-alliance="aiadmk"] {
      background: #16a34a;
    }

    .oec-alliance-dot[data-alliance="bjp"] {
      background: #ea580c;
    }

    .oec-alliance-dot[data-alliance="ind"] {
      background: #475569;
    }

    .oec-profile-panel__name {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      color: #1f2937;
      font-size: 0.8rem;
      font-weight: 700;
      line-height: 1.25;
      margin-bottom: 0.35rem;
    }

    .oec-incumbent-chair {
      display: inline-block;
      margin-right: 0.24rem;
      font-size: 0.86rem;
      line-height: 1;
      vertical-align: middle;
    }

    .oec-profile-panel__name a {
      color: #1d4ed8;
      text-decoration: none;
      border-bottom: 1px dotted #93c5fd;
    }

    .oec-profile-panel__name a:hover {
      text-decoration: underline;
    }

    .oec-profile-panel__party {
      margin: 0 0 0.35rem;
      color: #475569;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.01em;
      text-transform: uppercase;
    }

    .oec-profile-panel__party a {
      color: #0f766e;
      text-decoration: none;
      border-bottom: 1px dotted #5eead4;
    }

    .oec-profile-panel__party a:hover {
      text-decoration: underline;
    }

    .oec-profile-panel__actions {
      display: inline-flex;
      gap: 0.4rem;
      flex-wrap: wrap;
    }

    .oec-profile-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 1.72rem;
      padding: 0.2rem 0.52rem;
      border-radius: 6px;
      border: 1px solid #bfdbfe;
      background: #eff6ff;
      color: #1d4ed8;
      text-decoration: none;
      font-size: 0.74rem;
      font-weight: 700;
    }

    .oec-profile-btn:hover {
      background: #dbeafe;
      text-decoration: underline;
    }

    .oec-profile-btn.is-disabled {
      background: #f3f4f6;
      border-color: #d1d5db;
      color: #6b7280;
    }

    .oec-candidate-profile a {
      color: #0f766e;
      text-decoration: none;
      font-weight: 600;
      border-bottom: 1px dotted #0f766e;
    }

    .oec-candidate-profile a:hover {
      text-decoration: underline;
    }

    .feedback-modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.5);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 13000;
      padding: 1rem;
    }

    .feedback-modal.is-open {
      display: flex;
    }

    .feedback-card {
      width: min(560px, 96vw);
      background: #fff;
      border-radius: 12px;
      border: 1px solid #e5e7eb;
      box-shadow: 0 18px 60px rgba(0,0,0,.25);
      padding: 1rem;
    }

    .feedback-title {
      font-size: 1rem;
      font-weight: 800;
      color: #111827;
      margin-bottom: .3rem;
    }

    .feedback-note {
      font-size: .79rem;
      color: #4b5563;
      margin-bottom: .6rem;
    }

    .feedback-field {
      width: 100%;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      padding: .55rem .65rem;
      font-size: .85rem;
      font-family: inherit;
      margin-bottom: .45rem;
    }

    .feedback-field--textarea {
      min-height: 110px;
      resize: vertical;
    }

    .feedback-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: .5rem;
      font-size: .74rem;
      color: #6b7280;
      margin-bottom: .75rem;
    }

    .feedback-actions {
      display: flex;
      justify-content: flex-end;
      gap: .5rem;
    }

    .feedback-btn {
      border: 1px solid #d1d5db;
      background: #fff;
      color: #111827;
      border-radius: 7px;
      padding: .45rem .75rem;
      font-size: .8rem;
      font-weight: 700;
      cursor: pointer;
    }

    .feedback-btn--primary {
      border-color: #2563eb;
      background: #2563eb;
      color: #fff;
    }

    .feedback-btn--primary:disabled {
      background: #93c5fd;
      border-color: #93c5fd;
      cursor: not-allowed;
    }

    .oec-jump-results-btn {
      position: fixed;
      right: 14px;
      bottom: 16px;
      z-index: 13200;
      border: 1px solid #1d4ed8;
      background: #1d4ed8;
      color: #fff;
      border-radius: 999px;
      padding: 0.5rem 0.9rem;
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.01em;
      cursor: pointer;
      box-shadow: 0 10px 24px rgba(29, 78, 216, 0.28);
      display: none;
    }

    .oec-jump-results-btn.is-visible {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
    }

    .area-picker-modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.55);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 13100;
      padding: 1rem;
    }

    .area-picker-modal.is-open {
      display: flex;
    }

    .area-picker-card {
      width: min(760px, 96vw);
      background: #fff;
      border-radius: 14px;
      border: 1px solid #e5e7eb;
      box-shadow: 0 18px 60px rgba(0, 0, 0, 0.22);
      padding: 1rem;
      max-height: calc(100vh - 2rem);
      max-height: calc(100dvh - 2rem);

      function applyAreaPriorityToTheses(cfg, selectedKeys) {
        if (!cfg || !Array.isArray(cfg.theses) || !Array.isArray(selectedKeys) || !selectedKeys.length) return;
        var rank = {};
        selectedKeys.forEach(function (k, idx) { rank[k] = idx; });

        var decorated = cfg.theses.map(function (thesis, index) {
          var areaKey = inferThesisAreaKey(thesis);
          return {
            thesis: thesis,
            index: index,
            areaKey: areaKey,
            picked: rank.hasOwnProperty(areaKey),
            rank: rank.hasOwnProperty(areaKey) ? rank[areaKey] : 999
          };
        });

        decorated.sort(function (a, b) {
          if (a.picked !== b.picked) return a.picked ? -1 : 1;
          if (a.rank !== b.rank) return a.rank - b.rank;
          return a.index - b.index;
        });

        cfg.theses = decorated.map(function (d) { return d.thesis; });

          if (t === 'neutral') return 'நடுநிலை';
          if (t === 'reject') return 'எதிர்ப்பு';
          if (t === 'strongly-reject') return 'கடுமையான எதிர்ப்பு';
          return 'நடுநிலை';
        }
        if (t === 'strongly-approve') return 'Strongly approve';
        if (t === 'approve') return 'Approve';
        if (t === 'partly') return 'Partly';
        if (t === 'neutral') return 'Neutral';
        if (t === 'reject') return 'Reject';
        if (t === 'strongly-reject') return 'Strongly reject';
        return 'Neutral';
      }

      function getPositionLabel(lang, position) {
        var p = String(position || '').toLowerCase().replace(/_/g, '-').trim();
        return getResponseLabel(lang, p);
      }

      function extractCandidateName(rawName) {
        var text = String(rawName || '').trim();
        if (!text) return '';
        var m = /^(.*?)(?:\s*\([^\)]+\))?$/.exec(text);
        if (m && m[1]) return m[1].trim();
        return text;
      }

      var PAGEWISE_PARTY_META = {
        'dmk-alliance': { wiki: 'https://www.tnelections.info/parties#dmk', candidate: 'DMK Alliance' },
        'aiadmk-alliance': { wiki: 'https://www.tnelections.info/parties#aiadmk', candidate: 'AIADMK Alliance' },
        'tvk': { wiki: 'https://www.tnelections.info/parties#tvk', candidate: 'TVK' }
      };

      function getPagewiseAllianceUiKey(alias) {
        var a = String(alias || '').toLowerCase();
        if (a === 'dmk-alliance') return 'dmk';
        if (a === 'aiadmk-alliance') return 'aiadmk';
        if (a === 'bjp-alliance') return 'bjp';
        return 'ind';
      }

      function normalizeSeatKey(value) {
        return String(value || '').toLowerCase().replace(/[^a-z0-9]/g, '');
      }

      function getAllianceSegmentColor(index, allianceUiKey) {
        var palettes = {
          dmk: ['#dc2626', '#ef4444', '#f97316', '#f59e0b', '#84cc16', '#22c55e', '#06b6d4'],
          aiadmk: ['#16a34a', '#22c55e', '#84cc16', '#65a30d', '#0ea5e9', '#0284c7', '#f59e0b'],
          bjp: ['#ea580c', '#f97316', '#fb923c', '#f59e0b', '#84cc16', '#22c55e', '#0ea5e9'],
          ind: ['#475569', '#64748b', '#94a3b8', '#0ea5e9', '#14b8a6', '#22c55e', '#f59e0b']
        };
        var p = palettes[allianceUiKey] || palettes.ind;
        return p[index % p.length];
      }

      function renderLinkedAllianceMembers(members, seatRows) {
        if (!Array.isArray(members) || !members.length) return '';
        var chunks = members.map(function (member, idx) {
          var label = String(member || '').trim();
          if (!label) return '';
          var itemHtml = '<span class="oec-alliance-member-link">' + escapeHtml(label) + '</span>';
          if (idx > 0) itemHtml = '<span class="oec-alliance-member-sep">•</span>' + itemHtml;
          return itemHtml;
        }).filter(Boolean);
        if (!chunks.length) return '';
        return '<span class="oec-alliance-members-line">' + chunks.join('') + '</span>';
      }

      function renderAlliancePieChart(rows, allianceUiKey) {
        if (!Array.isArray(rows) || !rows.length) return '';
        var total = 0;
        rows.forEach(function (row) { total += (Number(row.seats) || 0); });
        if (!total) return '';

        var parts = [];
        var acc = 0;
        rows.forEach(function (row, idx) {
          var seats = Number(row.seats) || 0;
          if (!seats) return;
          var color = getAllianceSegmentColor(idx, allianceUiKey);
          var pct = (seats / total) * 100;
          var start = acc;
          var end = acc + pct;
          acc = end;
          parts.push(color + ' ' + start.toFixed(3) + '% ' + end.toFixed(3) + '%');
        });

        var pieStyle = 'background: conic-gradient(' + parts.join(',') + ');';
        var html = '<div class="oec-alliance-pie-wrap">';
        html += '<div class="oec-alliance-pie" style="' + pieStyle + '"><span class="oec-alliance-pie-total">234</span></div>';
        html += '<div class="oec-alliance-pie-legend">';
        rows.forEach(function (row, idx) {
          var seats = Number(row.seats) || 0;
          if (!seats) return;
          var color = getAllianceSegmentColor(idx, allianceUiKey);
          var symbol = row.symbol ? String(row.symbol) + ' ' : '';
          var shortName = row.code || row.name || 'Party';
          var links = Array.isArray(row.links) ? row.links : [];
          var profileUrl = links.length && links[0] && links[0].url ? links[0].url : '';
          var labelText = symbol + shortName + ' ' + seats;
          html += '<div class="oec-alliance-pie-legend-item">'
            + '<span class="oec-alliance-pie-dot" style="background:' + color + '"></span>'
            + (profileUrl
              ? ('<a class="oec-alliance-seat-link" href="' + escapeHtml(profileUrl) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(labelText) + '</a>')
              : ('<span>' + escapeHtml(labelText) + '</span>'))
            + '</div>';
        });
        html += '</div>';
        html += '</div>';
        return html;
      }

      function buildPagewisePartyLinkItems(cfg) {
        var items = [];
        (cfg.parties || []).forEach(function (party) {
          var candidateUrl = '';
          if (party.candidateProfile && typeof party.candidateProfile === 'string') candidateUrl = party.candidateProfile;
          else if (party.candidateProfile && typeof party.candidateProfile === 'object') {
            candidateUrl = party.candidateProfile[selectedLang] || party.candidateProfile.en || party.candidateProfile.ta || '';
          }

          var partyUrl = '';
          if (party.partyProfile && typeof party.partyProfile === 'string') partyUrl = party.partyProfile;
          else if (party.partyProfile && typeof party.partyProfile === 'object') {
            partyUrl = party.partyProfile[selectedLang] || party.partyProfile.en || party.partyProfile.ta || '';
          }
          if (!partyUrl && party.profile && typeof party.profile === 'string') partyUrl = party.profile;
          else if (!partyUrl && party.profile && typeof party.profile === 'object') {
            partyUrl = party.profile[selectedLang] || party.profile.en || party.profile.ta || '';
          }

          var meta = PAGEWISE_PARTY_META[String(party.alias || '').toLowerCase()] || null;
          if (!partyUrl && meta && meta.wiki) partyUrl = meta.wiki;

          var displayName = getPartyDisplayName(selectedLang, party);
          var candidateName = extractCandidateName(getLocalizedValue(selectedLang, party.name, displayName));
          if (!candidateName && meta && meta.candidate) candidateName = meta.candidate;

          if (!candidateUrl && !partyUrl) {
            // Keep a row visible so users can still see alliance names even without links.
            items.push({
              displayName: displayName,
              candidateName: candidateName || displayName,
              candidateUrl: '',
              partyUrl: ''
            });
            return;
          }

          items.push({
            displayName: displayName,
            candidateName: candidateName || displayName,
            candidateUrl: candidateUrl,
            partyUrl: partyUrl
          });
        });
        return items;
      }

      function mountPagewiseProfilePanel(cfg) {
        var existing = document.getElementById('oec-pagewise-profile-panel');
        if (existing && existing.parentNode) existing.parentNode.removeChild(existing);

        var wrap = document.getElementById('party-links-wrap');
        var toggleBtn = document.getElementById('party-links-toggle');
        var menu = document.getElementById('party-links-menu');
        if (!wrap || !toggleBtn || !menu) return;

        var title = getLocalizedText(selectedLang, 'Party Links', 'கட்சி இணைப்புகள்');
        toggleBtn.textContent = title;
        toggleBtn.classList.add('is-visible');

        var html = '';
        html += '<div class="oec-profile-panel__header">';
        html += '<h4 class="oec-profile-panel__title">' + escapeHtml(title) + '</h4>';
        html += '</div>';
        html += '<div class="oec-profile-panel__body">';

        var metadata = (cfg && cfg.allianceMetadata && typeof cfg.allianceMetadata === 'object') ? cfg.allianceMetadata : {};
        var seatMap = (cfg && cfg.alliancePartnerSeats && typeof cfg.alliancePartnerSeats === 'object') ? cfg.alliancePartnerSeats : {};
        var alliances = (cfg.parties || []).filter(function (p) { return !!p && !!p.alias; });
        alliances.forEach(function (party) {
          var alias = String(party.alias || '');
          var allianceUiKey = getPagewiseAllianceUiKey(alias);
          var displayLabel = getPartyDisplayName(selectedLang, party);
          var md = metadata[alias] || {};
          var members = (md.displayMembers && (md.displayMembers[selectedLang] || md.displayMembers.en || md.displayMembers.ta)) || [];
          var membersHtml = renderLinkedAllianceMembers(members, seatMap[alias] || []);
          var seatRows = seatMap[alias] || [];
          var allianceSource = '';
          for (var sr = 0; sr < seatRows.length; sr++) {
            if (seatRows[sr] && seatRows[sr].source) {
              allianceSource = seatRows[sr].source;
              break;
            }
          }
          if (!allianceSource && md && typeof md.source === 'string') {
            allianceSource = md.source;
          }

          html += '<div class="oec-profile-panel__group" data-alliance="' + escapeHtml(allianceUiKey) + '">';
          html += '<div class="oec-profile-panel__group-head">';
          html += '<h5 class="oec-profile-panel__group-title"><span class="oec-alliance-dot" data-alliance="' + escapeHtml(allianceUiKey) + '"></span>' + escapeHtml(displayLabel) + '</h5>';
          html += '</div>';
          if (membersHtml) {
            html += '<p class="oec-profile-panel__group-members">' + membersHtml + '</p>';
          }
          if (allianceSource) {
            html += '<p class="oec-alliance-source"><a class="oec-alliance-seat-link" href="' + escapeHtml(allianceSource) + '" target="_blank" rel="noopener noreferrer">'
              + escapeHtml(getLocalizedText(selectedLang, 'Seat-share source', 'இருக்கை பகிர்வு மூலம்'))
              + '</a></p>';
          }
          html += renderAlliancePieChart(seatRows, allianceUiKey);
          html += '</div>';
        });

        html += '</div>';

        menu.innerHTML = html;

        if (!toggleBtn.dataset.bound) {
          toggleBtn.addEventListener('click', function (e) {
            e.stopPropagation();
            var open = menu.classList.toggle('is-open');
            menu.setAttribute('aria-hidden', open ? 'false' : 'true');
          });
          document.addEventListener('click', function (e) {
            if (!wrap.contains(e.target)) {
              menu.classList.remove('is-open');
              menu.setAttribute('aria-hidden', 'true');
            }
          });
          toggleBtn.dataset.bound = '1';
        }
      }

      function escapeRegExp(value) {
        return String(value || '').replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      }

      function stripAreaPrefixFromTitle(titleText) {
        var title = String(titleText || '');
        if (!title) return title;

        var patterns = [];
        AREA_DEFS.forEach(function (area) {
          if (area && area.en) patterns.push(String(area.en));
          if (area && area.ta) patterns.push(String(area.ta));
        });

        for (var i = 0; i < patterns.length; i++) {
          var label = patterns[i];
          if (!label) continue;
          var escaped = escapeRegExp(label);
          var wrappedRe = new RegExp('^\\s*\\[\\s*' + escaped + '\\s*\\]\\s*', 'i');
          var prefixRe = new RegExp('^\\s*' + escaped + '\\s*[-:|]\\s*', 'i');
          title = title.replace(wrappedRe, '');
          title = title.replace(prefixRe, '');
        }
        return title.trim();
      }

      function buildComparisonTableHtml(rows, parties, thesisStateMap, options) {
        var hideAreaPrefix = !!(options && options.hideAreaPrefix);
        if (!rows.length) {
          return '<p>' + escapeHtml(getLocalizedText(selectedLang, 'No theses available in this area.', 'இந்த பகுதியில் தீர்மானங்கள் இல்லை.')) + '</p>';
        }

        var thHeaders = parties.map(function (party) {
          return '<th>' + escapeHtml(getPartyDisplayName(selectedLang, party)) + '</th>';
        }).join('');

        var bodyRows = rows.map(function (row) {
          var title = getLocalizedValue(selectedLang, row.thesis.title, 'Thesis ' + (row.idx + 1));
          if (hideAreaPrefix) title = stripAreaPrefixFromTitle(title);
          var userState = thesisStateMap[row.id] || { response: 'neutral', important: false };
          var userLabel = getResponseLabel(selectedLang, userState.response || 'neutral');

          var partyCells = parties.map(function (party) {
            var pos = row.thesis.positions && row.thesis.positions[party.alias];
            if (!pos) return '<td><span class="pagewise-cell-stance">' + escapeHtml(getLocalizedText(selectedLang, 'No data', 'தரவு இல்லை')) + '</span></td>';

            var stance = getPositionLabel(selectedLang, pos.position);
            var explanation = getLocalizedValue(selectedLang, pos.explanation, '');
            var sourceHtml = '';
            if (pos.source) {
              sourceHtml = '<a class="pagewise-cell-source" href="' + escapeHtml(pos.source) + '" target="_blank" rel="noopener noreferrer">'
                + escapeHtml(getLocalizedText(selectedLang, 'Source', 'ஆதாரம்')) + '</a>';
            }

            return '<td>'
              + '<span class="pagewise-cell-stance">' + escapeHtml(stance) + '</span>'
              + (explanation ? '<span class="pagewise-cell-expl">' + escapeHtml(explanation) + '</span>' : '')
              + sourceHtml
              + '</td>';
          }).join('');

          return '<tr>'
            + '<td>' + escapeHtml(title) + '</td>'
            + '<td><span class="pagewise-cell-stance">' + escapeHtml(userLabel) + '</span></td>'
            + partyCells
            + '</tr>';
        }).join('');

        return ''
          + '<div class="pagewise-comparison-wrap">'
          + '<table class="pagewise-comparison-table">'
          + '<thead><tr><th>' + escapeHtml(getLocalizedText(selectedLang, 'Thesis', 'தீர்மானம்')) + '</th><th>' + escapeHtml(getLocalizedText(selectedLang, 'Your response', 'உங்கள் பதில்')) + '</th>' + thHeaders + '</tr></thead>'
          + '<tbody>' + bodyRows + '</tbody>'
          + '</table>'
          + '</div>';
      }

      function getAreaLabelByKey(lang, key) {
        for (var i = 0; i < AREA_DEFS.length; i++) {
          if (AREA_DEFS[i].key === key) return lang === 'ta' ? AREA_DEFS[i].ta : AREA_DEFS[i].en;
        }
        return key;
      }

      function getOrderedAreaKeys(theses, selectedAreas) {
        var areaSet = {};
        (theses || []).forEach(function (thesis) {
          areaSet[inferThesisAreaKey(thesis)] = true;
        });

        var selected = (selectedAreas || []).filter(Boolean);
        var out = [];
        selected.forEach(function (k) {
          if (areaSet[k] && out.indexOf(k) < 0) out.push(k);
        });
        AREA_DEFS.forEach(function (a) {
          if (areaSet[a.key] && out.indexOf(a.key) < 0) out.push(a.key);
        });
        Object.keys(areaSet).forEach(function (k) {
          if (out.indexOf(k) < 0) out.push(k);
        });
        return out;
      }

      function isConstituencyConfig(configPathValue) {
        var path = String(configPathValue || '').toLowerCase();
        return path.indexOf('/constituencies/') >= 0;
      }

      function computePagewiseScores(cfg, thesisStateMap) {
        var parties = cfg.parties || [];
        var theses = cfg.theses || [];
        return parties.map(function (party) {
          var total = 0;
          var weightTotal = 0;
          var compared = 0;
          theses.forEach(function (thesis, idx) {
            var key = 't' + idx;
            var state = thesisStateMap[key] || { response: 'neutral', important: false };
            var pos = thesis.positions && thesis.positions[party.alias];
            if (!pos) return;
            var userValue = getResponseValue(state.response);
            var partyValue = getPositionValue(pos.position);
            var similarity = 1 - (Math.abs(userValue - partyValue) / 4);
            var weight = state.important ? 2 : 1;
            total += Math.max(0, similarity) * weight;
            weightTotal += weight;
            compared += 1;
          });
          return {
            party: party,
            compared: compared,
            score: weightTotal ? Math.round((total / weightTotal) * 100) : 0
          };
        }).sort(function (a, b) { return b.score - a.score; });
      }

      function renderPageWiseCompass(cfg, selectedAreas, options) {
        var theses = cfg.theses || [];
        var parties = cfg.parties || [];
        if (!theses.length || !parties.length) return false;
        var singlePageMode = !!(options && options.singlePageMode);

        wrapper.setAttribute('data-mode', 'pagewise');
        mountPagewiseProfilePanel(cfg);

        var areaOrder = getOrderedAreaKeys(theses, selectedAreas);
        var thesesByArea = {};
        areaOrder.forEach(function (k) { thesesByArea[k] = []; });

        theses.forEach(function (thesis, idx) {
          var areaKey = inferThesisAreaKey(thesis);
          if (!thesesByArea[areaKey]) {
            thesesByArea[areaKey] = [];
            areaOrder.push(areaKey);
          }
          thesesByArea[areaKey].push({ id: 't' + idx, thesis: thesis, idx: idx, areaKey: areaKey });
        });

        var thesisStateMap = {};
        theses.forEach(function (thesis, idx) {
          var id = 't' + idx;
          var areaKey = inferThesisAreaKey(thesis);
          var isPriority = (selectedAreas || []).indexOf(areaKey) >= 0;
          thesisStateMap[id] = {
            response: isPriority ? '' : 'neutral',
            important: isPriority
          };
        });

        var pages = [{ type: 'overview', key: 'overview' }];
        if (singlePageMode) {
          pages.push({ type: 'all', key: 'all' });
        } else {
          areaOrder.forEach(function (key) {
            if ((thesesByArea[key] || []).length) pages.push({ type: 'area', key: key });
          });
        }
        pages.push({ type: 'results', key: 'results' });

        var stanceOptions = [
          { token: 'strongly-approve', en: 'Strongly approve', ta: 'மிகவும் ஒப்புதல்' },
          { token: 'approve', en: 'Approve', ta: 'ஒப்புதல்' },
          { token: 'partly', en: 'Partly', ta: 'பகுதியாக ஒப்புதல்' },
          { token: 'neutral', en: 'Neutral', ta: 'நடுநிலை' },
          { token: 'reject', en: 'Reject', ta: 'எதிர்ப்பு' },
          { token: 'strongly-reject', en: 'Strongly reject', ta: 'கடுமையான எதிர்ப்பு' }
        ];

        var currentPageIndex = 0;

        function renderOverviewPage() {
          var overviewTitle = getLocalizedText(selectedLang, 'How This Compass Works', 'இந்த காம்பஸ் எப்படி செயல்படுகிறது');
          var overviewBody = singlePageMode
            ? getLocalizedText(
              selectedLang,
              'This constituency has fewer theses, so all of them are shown together on a single page. Use Next and Previous to navigate.',
              'இந்த தொகுதியில் தீர்மானங்கள் குறைவாக உள்ளதால், அனைத்தும் ஒரே பக்கத்தில் காட்டப்படும். பக்கங்களுக்கு இடையில் செல்ல Next மற்றும் Previous ஐ பயன்படுத்தவும்.'
            )
            : getLocalizedText(
              selectedLang,
              'You will now answer area by area. Each area is shown on one page with all its theses together. Use Next and Previous to navigate pages.',
              'இப்போது நீங்கள் பகுதி வாரியாக பதிலளிப்பீர்கள். ஒவ்வொரு பகுதியும் அந்த பகுதியில் உள்ள அனைத்து தீர்மானங்களுடன் ஒரே பக்கத்தில் காட்டப்படும். பக்கங்களுக்கு இடையில் செல்ல Next மற்றும் Previous ஐ பயன்படுத்தவும்.'
            );

          var areaPills = singlePageMode ? '' : areaOrder.map(function (k) {
            var isPriority = (selectedAreas || []).indexOf(k) >= 0;
            var cls = 'pagewise-area-pill' + (isPriority ? ' is-priority' : '');
            return '<div class="' + cls + '">' + escapeHtml(getAreaLabelByKey(selectedLang, k)) + '</div>';
          }).join('');

          return ''
            + '<section class="pagewise-header">'
            + '<h2>' + escapeHtml(overviewTitle) + '</h2>'
            + '<p>' + escapeHtml(overviewBody) + '</p>'
            + (areaPills ? '<div class="pagewise-area-list">' + areaPills + '</div>' : '')
            + '</section>';
        }

        function renderAreaPage(page) {
          var areaKey = page.key;
          var rows = thesesByArea[areaKey] || [];
          var areaTitle = getAreaLabelByKey(selectedLang, areaKey);
          var cards = rows.map(function (row) {
            var title = getLocalizedValue(selectedLang, row.thesis.title, 'Thesis ' + (row.idx + 1));
            var statement = getLocalizedValue(selectedLang, row.thesis.statement, '');
            var state = thesisStateMap[row.id] || { response: '', important: false };
            var stanceHtml = stanceOptions.map(function (opt) {
              var label = selectedLang === 'ta' ? opt.ta : opt.en;
              var checked = state.response === opt.token ? ' checked' : '';
              return ''
                + '<label class="pagewise-stance">'
                + '<input type="radio" name="resp-' + row.id + '" data-thesis-id="' + row.id + '" value="' + opt.token + '"' + checked + '>'
                + '<span>' + escapeHtml(label) + '</span>'
                + '</label>';
            }).join('');

            return ''
              + '<article class="pagewise-thesis-card">'
              + '<div class="pagewise-thesis-title">' + escapeHtml(title) + '</div>'
              + '<div class="pagewise-thesis-statement">' + escapeHtml(statement) + '</div>'
              + '<label class="pagewise-important">'
              + '<input type="checkbox" data-important-id="' + row.id + '"' + (state.important ? ' checked' : '') + '>'
              + '<span>' + escapeHtml(getLocalizedText(selectedLang, 'Important to me', 'எனக்கு முக்கியம்')) + '</span>'
              + '</label>'
              + '<div class="pagewise-stance-grid">' + stanceHtml + '</div>'
              + '</article>';
          }).join('');

          return ''
            + '<section class="pagewise-header">'
            + '<h2>' + escapeHtml(areaTitle) + '</h2>'
            + '<p>' + escapeHtml(getLocalizedText(
              selectedLang,
              'Answer all theses in this area on this page. You can move back later and revise any response.',
              'இந்த பகுதியில் உள்ள அனைத்து தீர்மானங்களுக்கும் இதே பக்கத்தில் பதிலளிக்கவும். பின்னர் திரும்பி பதில்களை மாற்றலாம்.'
            )) + '</p>'
            + '</section>'
            + cards;
        }

        function renderResultsPage() {
          var scored = computePagewiseScores(cfg, thesisStateMap);
          var allRows = [];
          areaOrder.forEach(function (k) {
            var rows = thesesByArea[k] || [];
            for (var i = 0; i < rows.length; i++) allRows.push(rows[i]);
          });
          var cards = scored.map(function (row) {
            return ''
              + '<article class="pagewise-result-card">'
              + '<div class="pagewise-result-card__name">' + escapeHtml(getPartyDisplayName(selectedLang, row.party)) + '</div>'

      syncBackBarHeight();
      window.addEventListener('resize', syncBackBarHeight);

      var noCacheToken = String(Date.now());

      // Always set load-url for internal scripts that read this value.

      oecEl.setAttribute('load-url', noCacheConfigUrl);

      fetch(noCacheConfigUrl, { cache: 'no-store' })
        .then(function (r) {
          if (!r.ok) throw new Error('Failed to load config: ' + r.status);
          return r.json();

        .then(function (cfg) {

          var canUseAreaPicker = !randomResultsQuery && !partyPositionsQuery && !isConstituencyCompass;
          if (!canUseAreaPicker) return { cfg: prepared, selectedAreas: [] };
          return askAreaPrioritySelection(prepared, configPath).then(function (selectedAreas) {
            applyAreaPriorityToTheses(prepared, selectedAreas);

          });
        })
        .then(function (payload) {
          var preparedCfg = payload.cfg;
          var selectedAreas = payload.selectedAreas || [];
          var isConstituencyCompass = isConstituencyConfig(configPath);
          pageWiseController = null;
          if (pageWiseEnabled && renderPageWiseCompass(preparedCfg, selectedAreas, { singlePageMode: isConstituencyCompass })) {
            return;
          }
          wrapper.setAttribute('data-mode', 'oec');
          ensureOecConfigTag(preparedCfg);
          ensureOecScriptLoaded();
        })
        .catch(function () {
          // Fallback to plain load-url mode if config fetch fails.
          wrapper.setAttribute('data-mode', 'oec');
          ensureOecScriptLoaded();
        });
    }());

  <script>
    (function () {
      var owner = 'darepalli';
      var repo = 'ElectionDiksoochi';
      var params = new URLSearchParams(window.location.search);
      var configPath = params.get('config') || '';
      var pageContext = configPath || window.location.pathname;

      var modal = document.getElementById('feedback-modal');
      var openBtn = document.getElementById('feedback-open');
      var cancelBtn = document.getElementById('feedback-cancel');
      var submitBtn = document.getElementById('feedback-submit');
      var textEl = document.getElementById('feedback-text');
      var typeEl = document.getElementById('feedback-type');
      var countEl = document.getElementById('feedback-count');

      if (!modal || !openBtn || !cancelBtn || !submitBtn || !textEl || !typeEl || !countEl) return;

      function openModal () {
        modal.classList.add('is-open');
        modal.setAttribute('aria-hidden', 'false');
        setTimeout(function () { textEl.focus(); }, 10);
      }

      function closeModal () {
        modal.classList.remove('is-open');
        modal.setAttribute('aria-hidden', 'true');
      }

      function refreshCount () {
        var len = textEl.value.length;
        countEl.textContent = len + ' / 300';
        submitBtn.disabled = len === 0;
      }

      function buildIssueUrl () {
        var kind = typeEl.value || 'General';
        var feedback = textEl.value.trim();
        var title = '[Feedback][' + kind + '] ' + pageContext;
        var body = [
          '### Feedback',
          feedback,
          '',
          '### Context',
          '- Page: ' + pageContext,
          '- URL: ' + window.location.href,
          '- User Agent: ' + navigator.userAgent,
          '- Timestamp: ' + new Date().toISOString(),
          '',
          '_Submitted via in-app feedback form._'
        ].join('\n');

        var issueUrl = 'https://github.com/' + owner + '/' + repo + '/issues/new';
        issueUrl += '?labels=' + encodeURIComponent('feedback,' + kind.toLowerCase().replace(/\s+/g, '-'));
        issueUrl += '&title=' + encodeURIComponent(title);
        issueUrl += '&body=' + encodeURIComponent(body);
        return issueUrl;
      }

      openBtn.addEventListener('click', openModal);
      cancelBtn.addEventListener('click', closeModal);
      modal.addEventListener('click', function (e) {
        if (e.target === modal) closeModal();
      });
      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape' && modal.classList.contains('is-open')) closeModal();
      });

      textEl.addEventListener('input', refreshCount);
      submitBtn.addEventListener('click', function () {
        var text = textEl.value.trim();
        if (!text) return;
        window.open(buildIssueUrl(), '_blank', 'noopener');
        closeModal();
      });

      refreshCount();
    }());

      function extractPerPartyPositionsFromExplanation(expl) {

      function getAllianceMemberSource(alias, partyCode) {
        var rows = getAllianceSeatRows(alias);

          var row = rows[i] || {};
          var code = String(row.code || '').toUpperCase();
          var name = String(row.name || '').toUpperCase();
          if (code !== key && name !== key) continue;

          var links = Array.isArray(row.links) ? row.links : [];
          if (links.length) {

            for (var j = 0; j < links.length; j++) {
              var link = links[j] || {};
              if (!link.url) continue;
              var label = String(link.label || '').toLowerCase();

              if (label.indexOf('manifesto') >= 0 || label.indexOf('website') >= 0 || label.indexOf('wikipedia') >= 0) {

      function loadIncumbentsForCurrentConstituency() {
        var slug = getConstituencySlugFromConfigPath();
        if (!slug) return Promise.resolve();

        var metaUrl = withNoCache('elections/tn/constituencies/constituencies.json', noCacheToken);
        var bundleUrl = withNoCache('https://tnelections2026.in/data/candidates_bundle.min.js', noCacheToken);

        return fetch(metaUrl, { cache: 'no-store' })
          .then(function (res) { return res.ok ? res.json() : Promise.reject(new Error('meta fetch failed')); })
          .then(function (meta) {
            var rows = (meta && meta.constituencies) || [];
            var found = null;
            for (var i = 0; i < rows.length; i++) {
              if (String(rows[i].slug || '') === slug) {
                found = rows[i];
                break;
              }
            }
            if (!found || !found.no) return;
            var acNo = Number(found.no) || 0;
            if (!acNo) return;

            return fetch(bundleUrl, { cache: 'no-store' })
              .then(function (res) { return res.ok ? res.text() : Promise.reject(new Error('bundle fetch failed')); })
              .then(function (text) {
                var candidates = parseCandidatesBundle(text);
                var map = {};
                var incumbentRow = null;
                candidates.forEach(function (c) {
                  var sameSeat = Number(c && c.acNo) === acNo;
                  var incumbent = !!(c && (c.incumbent === true || String(c.incumbent).toLowerCase() === 'true'));
                  var name = c && c.name ? normalizeText(c.name) : '';
                  if (sameSeat && incumbent && name) {
                    map[name] = true;
                    if (!incumbentRow) incumbentRow = c;
                  }
                });
                incumbentCandidateNameMap = map;

                if (incumbentRow && incumbentRow.name) {
                  var partyCode = (incumbentRow.party && incumbentRow.party.code) ? String(incumbentRow.party.code).toUpperCase() : '';
                  var partyName = (incumbentRow.party && incumbentRow.party.name) ? String(incumbentRow.party.name) : '';
                  if (partyCode === 'ADMK') partyCode = 'AIADMK';
                  incumbentCandidateFallback = {
                    candidateName: String(incumbentRow.name).trim(),
                    partyName: partyCode || partyName || 'Party'
                  };
                } else {
                  incumbentCandidateFallback = null;
                }
              });
          })
          .catch(function () {
            incumbentCandidateNameMap = {};
            incumbentCandidateFallback = null;
          });
      }

        }
        if (raw.indexOf('/speech') >= 0 || raw.indexOf('/speeches') >= 0) {
          return 'Party Speech';
        }
        if (raw.indexOf('/ideology') >= 0 || raw.indexOf('/election-corner') >= 0 || raw.indexOf('/polic') >= 0) {
          return 'Party Policy Page';
        }

        try {
          var host = new URL(url).hostname.replace(/^www\./, '');
          if (host) return 'Party Website (' + host + ')';
        } catch (e) {}

        return 'Party Website';
      }

      function stripQueryAndHash(url) {

      function getConfigPathForQuery(url) {
        var raw = stripQueryAndHash(url);
        if (!raw) return '';

        var SAFE_CONFIG_RE = /^elections\/[a-z]{2,}\/[a-z0-9._/-]+\/config\.json$/;
        if (SAFE_CONFIG_RE.test(raw)) return raw;

        try {
          var u = new URL(raw, window.location.href);
          var p = String(u.pathname || '').replace(/\\/g, '/');
          var idx = p.toLowerCase().indexOf('/elections/');
          if (idx >= 0) {
            var rel = p.substring(idx + 1);
            if (SAFE_CONFIG_RE.test(rel)) return rel;
          }
        } catch (e) {}

        try {
          var q = new URLSearchParams(window.location.search).get('config') || '';
          q = stripQueryAndHash(q);
          if (SAFE_CONFIG_RE.test(q)) return q;
        } catch (e) {}

        return '';
      }

                if (subpartyPositions.length > 1) {
                  var uniq = {};
                  subpartyPositions.forEach(function (sp) { uniq[sp.position] = true; });
                  if (Object.keys(uniq).length > 1) {
                    detailHtml += '<span class="oec-live-party-details__excerpt">'
                      + escapeHtml(uiLang === 'ta' ? 'à®‡à®¨à¯à®¤ à®•à¯‚à®Ÿà¯à®Ÿà®£à®¿à®¯à®¿à®²à¯ à®•à®Ÿà¯à®šà®¿à®•à®³à¯ à®µà¯‡à®±à¯à®ªà®Ÿà¯à®Ÿ à®¨à®¿à®²à¯ˆà®ªà¯à®ªà®¾à®Ÿà¯à®•à®³à¯ˆ à®•à¯Šà®£à¯à®Ÿà¯à®³à¯à®³à®©.' : 'Parties in this alliance hold different positions on this issue.')
                      + '</span>';
                  }
                }

                subpartyPositions.forEach(function (item) {
                  var subLabel = getPositionLabel(item.position);
                  detailHtml += '<span class="oec-live-party-details__line">' + escapeHtml(item.party + ': ' + subLabel) + '</span>';
                  if (item.parsedExcerpt) {
                    detailHtml += '<span class="oec-live-party-details__excerpt">' + escapeHtml(uiLang === 'ta' ? ('à®•à¯‚à®Ÿà¯à®Ÿà®£à®¿ à®•à¯à®±à®¿à®ªà¯à®ªà®¿à®²à®¿à®°à¯à®¨à¯à®¤à¯: ' + item.parsedExcerpt) : ('From alliance note: ' + item.parsedExcerpt)) + '</span>';
                  }
                  if (item.excerpt) {
                    detailHtml += '<span class="oec-live-party-details__excerpt">"' + escapeHtml(item.excerpt) + '"</span>';
                  }
                  if (item.source) {
                    detailHtml += '<a class="oec-source-link" href="' + escapeHtml(item.source) + '" target="_blank" rel="noopener noreferrer">'
                      + escapeHtml(uiLang === 'ta' ? (item.party + ' à®†à®¤à®¾à®°à®®à¯') : (item.party + ' Source'))
                      + '</a>';
                  }
                });

                if (detailHtml) {
                  var details = existingDetails || document.createElement('div');
                  details.className = 'oec-live-party-details';
                  details.innerHTML = detailHtml;
                  if (!existingDetails) bubbleEl.appendChild(details);
                } else if (existingDetails && existingDetails.parentElement) {
                  existingDetails.parentElement.removeChild(existingDetails);
                }
              } else if (existingDetails && existingDetails.parentElement) {
                existingDetails.parentElement.removeChild(existingDetails);
              }

              debugLog('bubble processed: match=' + matchKind + ', text=' + bubbleText.substring(0, 64));
            });
          }

          function findProfileEntryForText(text) {
            var norm = normalizeText(text);
            if (!norm) return null;
            for (var i = 0; i < partyProfileEntries.length; i++) {
              var entry = partyProfileEntries[i];
              for (var j = 0; j < entry.keys.length; j++) {
                var key = entry.keys[j];
                if (!key) continue;
                if (norm.indexOf(key) >= 0 || key.indexOf(norm) >= 0) {
                  return entry;
                }
              }
            }
            return null;
          }

          function injectCandidateProfileLinks () {
            if (!partyProfileEntries.length) return;

            var candidates = container.querySelectorAll(
              'button, [role="button"], label, .party-item, [class*="party-item"], .base-button, [class*="party"]'
            );

            candidates.forEach(function (el) {
              if (!el || el.closest('.oec-candidate-profile')) return;
              var rawText = (el.textContent || '').replace(/\s+/g, ' ').trim();
              if (!rawText || rawText.length < 3) return;

              var entry = findProfileEntryForText(rawText);
              if (!entry) return;

              // Find a stable insertion anchor near the selectable control.
              var anchor = el;
              var partyBlock = el.closest('.party-item') || el.closest('[class*="party-item"]') || el.closest('[class*="party"]');
              if (partyBlock) anchor = partyBlock;

              var anchorKey = normalizeText((anchor.textContent || '').replace(/\s+/g, ' ').trim());
              if (!anchorKey) return;

              var existing = Array.prototype.slice.call(container.querySelectorAll('.oec-candidate-profile'))
                .some(function (n) { return n.getAttribute('data-profile-key') === anchorKey; });
              if (existing) return;

              var insertParent = anchor.parentElement;
              var insertAfter = anchor;
              if (!insertParent) return;

              // Keep link outside labels to avoid toggling checkboxes.
              if (insertAfter.tagName && insertAfter.tagName.toLowerCase() === 'label' && insertAfter.parentElement) {
                insertParent = insertAfter.parentElement;
              }

              var holder = document.createElement('div');
              holder.className = 'oec-candidate-profile';
              holder.setAttribute('data-profile-key', anchorKey);

              if (entry.symbol) {
                var symbol = document.createElement('span');
                symbol.className = 'oec-party-symbol';
                symbol.textContent = entry.symbol;
                holder.appendChild(symbol);
              }

              var links = document.createElement('span');
              links.className = 'oec-candidate-links';

              var link = document.createElement('a');
              link.textContent = uiLang === 'ta' ? 'à®šà¯à®¯à®µà®¿à®µà®°à®®à¯' : 'Profile';

              if (entry.url) {
                link.href = entry.url;
                link.target = '_blank';
                link.rel = 'noopener noreferrer';
              } else {
                link.href = '#';
              }

              // Prevent link interactions from toggling party selection.
              ['click', 'mousedown', 'mouseup', 'touchstart', 'touchend', 'pointerdown', 'pointerup'].forEach(function (evt) {
                link.addEventListener(evt, function (e) {
                  e.stopPropagation();
                });
              });

              if (!entry.url) {
                link.classList.add('is-disabled');
                link.addEventListener('click', function (e) {
                  e.preventDefault();
                  window.alert(getProfileUnavailableMessage());
                });
              }

              links.appendChild(link);

              if (entry.partyUrl) {
                var partyLink = document.createElement('a');
                partyLink.href = entry.partyUrl;
                partyLink.target = '_blank';
                partyLink.rel = 'noopener noreferrer';
                partyLink.textContent = uiLang === 'ta' ? 'à®•à®Ÿà¯à®šà®¿' : 'Party';
                ['click', 'mousedown', 'mouseup', 'touchstart', 'touchend', 'pointerdown', 'pointerup'].forEach(function (evt) {
                  partyLink.addEventListener(evt, function (e) {
                    e.stopPropagation();
                  });
                });
                links.appendChild(partyLink);
              }

              holder.appendChild(links);
              if (insertAfter.nextSibling) {
                insertParent.insertBefore(holder, insertAfter.nextSibling);
              } else {
                insertParent.appendChild(holder);
              }
            });
          }

          var observer = null;
          var injectScheduled = false;
          var isInjecting = false;

          function runInjectors() {
            if (isInjecting) return;
            isInjecting = true;
            if (observer) observer.disconnect();
            try {
              injectLinks();
              injectCandidateProfileLinks();
              applyAdaptiveThesisFlow(container);
            } finally {
              if (observer) observer.observe(container, { childList: true, subtree: true });
              isInjecting = false;
            }
          }

          function scheduleInjectors() {
            if (injectScheduled) return;
            injectScheduled = true;
            window.requestAnimationFrame(function () {
              injectScheduled = false;
              runInjectors();
            });
          }

          observer = new MutationObserver(function () {
            scheduleInjectors();
          });
          observer.observe(container, { childList: true, subtree: true });

          container.addEventListener('click', function (e) {
            var target = e.target;
            if (!target || !target.closest) return;
            var control = target.closest('button, [role="button"], label, .party-item__button, input[type="radio"], input[type="checkbox"]');
            if (!control) return;

            var txt = getControlText(control);
            if (!isStanceText(txt)) return;

            var token = getUserResponseTokenFromText(txt);
            if (!token) return;

            var marker = getStepMarker(container);
            if (!marker) return;
            var key = normalizeText(marker);
            if (!key) return;

            userResponseByThesisKey[key] = token;
            refreshJumpResultsState();
          }, true);

          runInjectors(); // catch anything already rendered

          legacyLoadPromise.then(function () {
            scheduleInjectors();
          });

          // OEC updates some UI states asynchronously; periodic refresh keeps source labels in sync.
          // Self-stopping: runs every 5 s for the first 150 s then clears itself.
          var _periodicCount = 0;
          var _periodicTimer = setInterval(function () {
            scheduleInjectors();
            if (++_periodicCount >= 30) clearInterval(_periodicTimer);
          }, 5000);
        })
        .catch(function () { /* silently ignore â€“ sources are optional */ });
    }());
  </script>
