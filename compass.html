<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="India Election Compass" />
  <title>Election Compass</title>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />

  <style>
    :root {
      --back-bar-h: 36px;
    }

    /* Thin wrapper styles â€“ OEC renders everything else */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }

    /* Back-to-hub bar */
    .back-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 9999;
      background: rgba(192, 57, 43, 0.95);
      padding: calc(6px + env(safe-area-inset-top, 0px)) 1rem 6px;
      display: flex;
      align-items: center;
      gap: 1rem;
      min-height: 36px;
      backdrop-filter: blur(2px);
    }
    .back-bar a {
      color: #fff;
      text-decoration: none;
      font-size: .86rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 4px;
      min-height: 34px;
    }
    .back-bar a:hover { text-decoration: underline; }
    .back-bar .sep { color: rgba(255,255,255,.5); }
    .back-bar .current-label {
      font-size: .82rem;
      color: rgba(255,255,255,.85);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .back-bar .spacer {
      flex: 1;
    }

    .language-switch {
      display: inline-flex;
      align-items: center;
      border: 1px solid rgba(255,255,255,.45);
      border-radius: 8px;
      overflow: hidden;
      min-height: 34px;
      background: rgba(255,255,255,.08);
    }

    .lang-btn {
      border: 0;
      background: transparent;
      color: rgba(255,255,255,.88);
      font-size: 0.75rem;
      font-weight: 700;
      padding: 0.32rem 0.5rem;
      min-height: 34px;
      min-width: 44px;
      cursor: pointer;
    }

    .lang-btn + .lang-btn {
      border-left: 1px solid rgba(255,255,255,.28);
    }

    .lang-btn.is-active {
      color: #fff;
      background: rgba(255,255,255,.22);
    }

    .feedback-trigger {
      border: 1px solid rgba(255,255,255,.45);
      background: rgba(255,255,255,.12);
      color: #fff;
      border-radius: 7px;
      padding: 0.35rem 0.6rem;
      font-size: 0.76rem;
      font-weight: 700;
      cursor: pointer;
      min-height: 34px;
    }

    .feedback-trigger:hover {
      background: rgba(255,255,255,.2);
    }

    /* Push OEC content below the back-bar */
    #open-election-compass {
      padding-top: calc(var(--back-bar-h, 36px) + 4px);
      min-height: 100vh;
    }

    /* Error state */
    .error-page {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 1rem;
      color: #374151;
      text-align: center;
      padding: 2rem;
    }
    .error-page h1 { font-size: 1.5rem; color: #c0392b; }
    .error-page p  { max-width: 480px; color: #6b7280; }
    .error-page a  { color: #c0392b; font-weight: 600; }

    /* Source citation shown inline inside compare explanation bubbles */
    .oec-source-link {
      display: inline-block;
      margin-top: 0.6rem;
      padding: 0.35rem 0.65rem;
      font-size: 0.76rem;
      font-weight: 600;
      color: #2563eb;
      border: 1px solid #bfdbfe;
      border-radius: 4px;
      text-decoration: none;
      background: #eff6ff;
    }
    .oec-source-link:hover {
      background: #dbeafe;
      text-decoration: underline;
    }

    .oec-source-inline {
      margin-top: 0.55rem;
      font-size: 0.78rem;
      line-height: 1.35;
      color: #475569;
      word-break: break-word;
    }

    .oec-live-party-details {
      margin-top: 0.42rem;
      padding-top: 0.34rem;
      border-top: 1px dashed #dbe4ee;
      font-size: 0.73rem;
      color: #475569;
      line-height: 1.3;
    }

    .oec-live-party-details__line {
      display: block;
      margin-top: 0.15rem;
      font-weight: 700;
      color: #334155;
    }

    .oec-live-party-details__excerpt {
      display: block;
      margin-top: 0.1rem;
      font-size: 0.71rem;
      font-style: italic;
      color: #64748b;
    }

    .oec-candidate-profile {
      margin-top: 0.45rem;
      font-size: 0.76rem;
      line-height: 1.3;
      display: block;
      position: relative;
      z-index: 2;
      pointer-events: auto;
    }

    .oec-party-symbol {
      display: inline-block;
      margin-right: 0.45rem;
      font-weight: 700;
      color: #334155;
    }

    .oec-candidate-links {
      display: inline-flex;
      gap: 0.55rem;
      flex-wrap: wrap;
      align-items: center;
    }

    .oec-profile-panel {
      position: fixed;
      right: 12px;
      top: calc(var(--back-bar-h, 56px) + 12px);
      width: min(336px, calc(100vw - 24px));
      max-height: calc(100vh - var(--back-bar-h, 56px) - 24px);
      overflow: auto;
      z-index: 11400;
      background: #ffffff;
      border: 1px solid #dbeafe;
      border-radius: 10px;
      box-shadow: 0 12px 26px rgba(15, 23, 42, 0.16);
      padding: 0.55rem 0.6rem;
    }

    .oec-profile-panel.is-collapsed {
      width: auto;
      max-height: none;
      overflow: visible;
      padding-bottom: 0.6rem;
    }

    .oec-profile-panel__header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
      margin-bottom: 0.42rem;
    }

    .oec-profile-toggle {
      border: 1px solid #bfdbfe;
      background: #eff6ff;
      color: #1d4ed8;
      border-radius: 6px;
      padding: 0.18rem 0.5rem;
      font-size: 0.72rem;
      font-weight: 700;
      cursor: pointer;
    }

    .oec-profile-toggle:hover {
      background: #dbeafe;
    }

    .oec-profile-link-btn {
      border: 1px solid #c7d2fe;
      background: #eef2ff;
      color: #3730a3;
      border-radius: 6px;
      padding: 0.18rem 0.5rem;
      font-size: 0.72rem;
      font-weight: 700;
      text-decoration: none;
      line-height: 1.2;
      display: inline-flex;
      align-items: center;
      min-height: 1.72rem;
    }

    .oec-profile-link-btn:hover {
      background: #e0e7ff;
      text-decoration: underline;
    }

    .oec-profile-panel__title {
      margin: 0;
      color: #0f172a;
      font-size: 0.92rem;
      font-weight: 800;
    }

    .oec-profile-panel__body {
      display: block;
    }

    .oec-profile-panel.is-collapsed .oec-profile-panel__body {
      display: none;
    }

    .oec-profile-panel__list {
      display: grid;
      gap: 0.45rem;
    }

    .oec-profile-panel__item {
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      background: #f8fafc;
      padding: 0.45rem 0.5rem;
      border-left: 4px solid #cbd5e1;
    }

    .oec-profile-panel__item[data-alliance="dmk"] {
      border-left-color: #dc2626;
    }

    .oec-profile-panel__item[data-alliance="aiadmk"] {
      border-left-color: #16a34a;
    }

    .oec-profile-panel__item[data-alliance="bjp"] {
      border-left-color: #ea580c;
    }

    .oec-profile-panel__item[data-alliance="ind"] {
      border-left-color: #475569;
    }

    .oec-profile-panel__group {
      --alliance-accent: #64748b;
      --alliance-bg: #f8fafc;
      margin-bottom: 0.45rem;
      border: 1px solid color-mix(in srgb, var(--alliance-accent) 24%, #e2e8f0);
      border-radius: 8px;
      background: var(--alliance-bg);
      padding: 0.35rem 0.4rem;
    }

    .oec-profile-panel__group[data-alliance="dmk"] {
      --alliance-accent: #dc2626;
      --alliance-bg: #fef2f2;
    }

    .oec-profile-panel__group[data-alliance="aiadmk"] {
      --alliance-accent: #16a34a;
      --alliance-bg: #f0fdf4;
    }

    .oec-profile-panel__group[data-alliance="bjp"] {
      --alliance-accent: #ea580c;
      --alliance-bg: #fff7ed;
    }

    .oec-profile-panel__group[data-alliance="ind"] {
      --alliance-accent: #475569;
      --alliance-bg: #f8fafc;
    }

    .oec-profile-panel__group-title {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.72rem;
      font-weight: 800;
      color: #334155;
      margin: 0;
      text-transform: uppercase;
      letter-spacing: 0.02em;
    }

    .oec-profile-panel__group-members {
      margin: 0 0 0.28rem;
      color: #475569;
      font-size: 0.64rem;
      line-height: 1.2;
      font-weight: 600;
    }

    .oec-profile-panel__group-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.4rem;
      margin-bottom: 0.2rem;
    }

    .oec-profile-panel__group-body.is-collapsed {
      display: none;
    }

    .oec-group-toggle {
      border: 1px solid color-mix(in srgb, var(--alliance-accent) 35%, #cbd5e1);
      background: color-mix(in srgb, var(--alliance-accent) 8%, #ffffff);
      color: color-mix(in srgb, var(--alliance-accent) 75%, #1f2937);
      border-radius: 6px;
      padding: 0.1rem 0.32rem;
      font-size: 0.64rem;
      font-weight: 700;
      cursor: pointer;
      line-height: 1.1;
    }

    .oec-alliance-seat-list {
      display: grid;
      gap: 0.22rem;
      margin: 0.18rem 0 0;
    }

    .oec-alliance-seat-row {
      border: 1px solid color-mix(in srgb, var(--alliance-accent) 18%, #e2e8f0);
      border-radius: 6px;
      background: color-mix(in srgb, var(--alliance-accent) 4%, #ffffff);
      padding: 0.26rem 0.34rem;
    }

    .oec-alliance-seat-row__top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.28rem;
      margin-bottom: 0.12rem;
    }

    .oec-alliance-seat-row__party {
      display: inline-flex;
      align-items: center;
      gap: 0.22rem;
      font-size: 0.66rem;
      font-weight: 700;
      color: #1f2937;
    }

    .oec-alliance-seat-row__party-symbol {
      font-size: 0.72rem;
      line-height: 1;
    }

    .oec-alliance-seat-row__links {
      display: inline-flex;
      gap: 0.28rem;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .oec-alliance-seat-link {
      color: color-mix(in srgb, var(--alliance-accent) 72%, #1d4ed8);
      text-decoration: none;
      font-size: 0.62rem;
      font-weight: 700;
      border-bottom: 1px dotted color-mix(in srgb, var(--alliance-accent) 45%, #93c5fd);
    }

    .oec-alliance-seat-link:hover {
      text-decoration: underline;
    }

    .oec-alliance-seat-row__bar {
      height: 0.3rem;
      background: #e2e8f0;
      border-radius: 999px;
      overflow: hidden;
    }

    .oec-alliance-seat-row__fill {
      display: block;
      height: 100%;
      background: linear-gradient(
        90deg,
        color-mix(in srgb, var(--alliance-accent) 70%, #ffffff),
        var(--alliance-accent)
      );
      border-radius: 999px;
      min-width: 2px;
    }

    .oec-alliance-seat-row__meta {
      margin-top: 0.1rem;
      color: #64748b;
      font-size: 0.6rem;
      line-height: 1.2;
    }

    .oec-alliance-dot {
      width: 0.6rem;
      height: 0.6rem;
      border-radius: 999px;
      display: inline-block;
      background: #cbd5e1;
    }

    .oec-alliance-header-symbol {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 0.9rem;
      height: 0.9rem;
      font-size: 0.82rem;
      line-height: 1;
    }

    .oec-alliance-dot[data-alliance="dmk"] {
      background: #dc2626;
    }

    .oec-alliance-dot[data-alliance="aiadmk"] {
      background: #16a34a;
    }

    .oec-alliance-dot[data-alliance="bjp"] {
      background: #ea580c;
    }

    .oec-alliance-dot[data-alliance="ind"] {
      background: #475569;
    }

    .oec-profile-panel__name {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      color: #1f2937;
      font-size: 0.8rem;
      font-weight: 700;
      line-height: 1.25;
      margin-bottom: 0.35rem;
    }

    .oec-incumbent-chair {
      display: inline-block;
      margin-right: 0.24rem;
      font-size: 0.86rem;
      line-height: 1;
      vertical-align: middle;
    }

    .oec-profile-panel__name a {
      color: #1d4ed8;
      text-decoration: none;
      border-bottom: 1px dotted #93c5fd;
    }

    .oec-profile-panel__name a:hover {
      text-decoration: underline;
    }

    .oec-profile-panel__party {
      margin: 0 0 0.35rem;
      color: #475569;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.01em;
      text-transform: uppercase;
    }

    .oec-profile-panel__party a {
      color: #0f766e;
      text-decoration: none;
      border-bottom: 1px dotted #5eead4;
    }

    .oec-profile-panel__party a:hover {
      text-decoration: underline;
    }

    .oec-profile-panel__actions {
      display: inline-flex;
      gap: 0.4rem;
      flex-wrap: wrap;
    }

    .oec-profile-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 1.72rem;
      padding: 0.2rem 0.52rem;
      border-radius: 6px;
      border: 1px solid #bfdbfe;
      background: #eff6ff;
      color: #1d4ed8;
      text-decoration: none;
      font-size: 0.74rem;
      font-weight: 700;
    }

    .oec-profile-btn:hover {
      background: #dbeafe;
      text-decoration: underline;
    }

    .oec-profile-btn.is-disabled {
      background: #f3f4f6;
      border-color: #d1d5db;
      color: #6b7280;
    }

    .oec-candidate-profile a {
      color: #0f766e;
      text-decoration: none;
      font-weight: 600;
      border-bottom: 1px dotted #0f766e;
    }

    .oec-candidate-profile a:hover {
      text-decoration: underline;
    }

    .feedback-modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.5);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 13000;
      padding: 1rem;
    }

    .feedback-modal.is-open {
      display: flex;
    }

    .feedback-card {
      width: min(560px, 96vw);
      background: #fff;
      border-radius: 12px;
      border: 1px solid #e5e7eb;
      box-shadow: 0 18px 60px rgba(0,0,0,.25);
      padding: 1rem;
    }

    .feedback-title {
      font-size: 1rem;
      font-weight: 800;
      color: #111827;
      margin-bottom: .3rem;
    }

    .feedback-note {
      font-size: .79rem;
      color: #4b5563;
      margin-bottom: .6rem;
    }

    .feedback-field {
      width: 100%;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      padding: .55rem .65rem;
      font-size: .85rem;
      font-family: inherit;
      margin-bottom: .45rem;
    }

    .feedback-field--textarea {
      min-height: 110px;
      resize: vertical;
    }

    .feedback-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: .5rem;
      font-size: .74rem;
      color: #6b7280;
      margin-bottom: .75rem;
    }

    .feedback-actions {
      display: flex;
      justify-content: flex-end;
      gap: .5rem;
    }

    .feedback-btn {
      border: 1px solid #d1d5db;
      background: #fff;
      color: #111827;
      border-radius: 7px;
      padding: .45rem .75rem;
      font-size: .8rem;
      font-weight: 700;
      cursor: pointer;
    }

    .feedback-btn--primary {
      border-color: #2563eb;
      background: #2563eb;
      color: #fff;
    }

    .feedback-btn--primary:disabled {
      background: #93c5fd;
      border-color: #93c5fd;
      cursor: not-allowed;
    }

    @media (max-width: 768px) {
      .back-bar {
        gap: 0.45rem;
        padding-left: 0.65rem;
        padding-right: 0.65rem;
      }

      .back-bar .sep {
        display: none;
      }

      .back-bar a {
        font-size: 0.78rem;
      }

      .back-bar .current-label {
        font-size: 0.75rem;
        max-width: 58vw;
      }

      .feedback-trigger {
        font-size: .72rem;
        padding: .3rem .55rem;
      }

      .lang-btn {
        font-size: 0.71rem;
        min-width: 42px;
        padding: 0.28rem 0.42rem;
      }

      .oec-source-inline {
        font-size: 0.76rem;
      }

      .oec-source-link {
        font-size: 0.72rem;
      }

      .oec-profile-panel {
        right: 8px;
        width: calc(100vw - 16px);
        max-height: 46vh;
      }

      .oec-profile-panel.is-collapsed {
        width: calc(100vw - 16px);
      }


    }

    @media (max-width: 480px) {
      .back-bar {
        align-items: flex-start;
        flex-direction: column;
        gap: 2px;
      }

      .back-bar .spacer {
        display: none;
      }

      .back-bar a,
      .back-bar .current-label {
        line-height: 1.2;
      }

      .back-bar .current-label {
        max-width: 94vw;
        white-space: normal;
      }

      .feedback-card {
        padding: .85rem;
      }

      .feedback-meta {
        flex-direction: column;
        align-items: flex-start;
      }

      .feedback-actions {
        width: 100%;
      }

      .feedback-btn {
        flex: 1;
      }
    }
  </style>

<body>

  <!-- Back navigation bar -->
  <div class="back-bar">
    <a href="index.html">â† All Elections</a>
    <span class="sep">|</span>
    <span class="current-label" id="back-label">Election Compass</span>
    <span class="spacer"></span>
    <div class="language-switch" role="group" aria-label="Language selector">
      <button type="button" class="lang-btn" data-lang="en" id="lang-en">EN</button>
      <button type="button" class="lang-btn" data-lang="ta" id="lang-ta">à®¤à®®à®¿à®´à¯</button>
    </div>
    <button type="button" class="feedback-trigger" id="feedback-open">Feedback</button>
  </div>

  <div class="feedback-modal" id="feedback-modal" aria-hidden="true">
    <div class="feedback-card" role="dialog" aria-modal="true" aria-labelledby="feedback-title">
      <div class="feedback-title" id="feedback-title">Send Feedback</div>
      <p class="feedback-note">Feedback will open as a public GitHub issue in this project. Please avoid personal or sensitive information.</p>
      <select class="feedback-field" id="feedback-type" aria-label="Feedback type">
        <option value="General">General</option>
        <option value="Source Correction">Source Correction</option>
        <option value="Bug">Bug</option>
        <option value="Mobile UX">Mobile UX</option>
      </select>
      <textarea class="feedback-field feedback-field--textarea" id="feedback-text" maxlength="300" placeholder="Write feedback (max 300 characters)..."></textarea>
      <div class="feedback-meta">
        <span>Max 300 chars</span>
        <span id="feedback-count">0 / 300</span>
      </div>
      <div class="feedback-actions">
        <button type="button" class="feedback-btn" id="feedback-cancel">Cancel</button>
        <button type="button" class="feedback-btn feedback-btn--primary" id="feedback-submit" disabled>Post to Repo</button>
      </div>
    </div>
  </div>

  <!--
    OEC mount point.
    Usage:  compass.html?config=elections/tn/2026-state/config.json

    Sequence (per OEC docs):
      1. Inline script (below) runs synchronously â†’ validates ?config= param,
         sets the load-url attribute on <open-election-compass> and updates page title.
      2. OEC library (defer) runs after HTML is fully parsed â†’ reads load-url,
         fetches the JSON and mounts the component.
  -->
  <div id="open-election-compass">
    <!-- Vue mounts here (el:"#open-election-compass"); OEC reads load-url from the component prop -->
    <open-election-compass id="oec-el"></open-election-compass>
  </div>

  <script>
    (function () {
      var SAFE_CONFIG_RE = /^elections\/[a-z]{2,}\/[a-z0-9._/-]+\/config\.json$/;

      function getParam(name) {
        if (window.URLSearchParams) {
          return new URLSearchParams(window.location.search).get(name) || '';
        }
        var match = new RegExp('[?&]' + name + '=([^&#]*)').exec(window.location.search);
        return match ? decodeURIComponent(match[1].replace(/\+/g, ' ')) : '';
      }

      function withNoCache(url, token) {
        var key = token || String(Date.now());
        try {
          var u = new URL(url, window.location.href);
          u.searchParams.set('_oecv', key);
          return u.toString();
        } catch (e) {
          return String(url) + (String(url).indexOf('?') >= 0 ? '&' : '?') + '_oecv=' + encodeURIComponent(key);
        }
      }

      var configPath = getParam('config');
      var oecEl      = document.getElementById('oec-el');
      var wrapper    = document.getElementById('open-election-compass');
      var backBar    = document.querySelector('.back-bar');
      var langButtons = Array.prototype.slice.call(document.querySelectorAll('.lang-btn'));

          '- Page: ' + pageContext,

          '- User Agent: ' + navigator.userAgent,
          '- Timestamp: ' + new Date().toISOString(),

          '_Submitted via in-app feedback form._'

        var issueUrl = 'https://github.com/' + owner + '/' + repo + '/issues/new';
        issueUrl += '?labels=' + encodeURIComponent('feedback,' + kind.toLowerCase().replace(/\s+/g, '-'));

        try {

      function stripQueryAndHash(url) {
        return String(url || '').split('#')[0].split('?')[0];

      function getConfigPathForQuery(url) {
        var raw = stripQueryAndHash(url);
        if (!raw) return '';

        var SAFE_CONFIG_RE = /^elections\/[a-z]{2,}\/[a-z0-9._/-]+\/config\.json$/;
        if (SAFE_CONFIG_RE.test(raw)) return raw;

        try {
          var u = new URL(raw, window.location.href);
          var p = String(u.pathname || '').replace(/\\/g, '/');
          var idx = p.toLowerCase().indexOf('/elections/');
          if (idx >= 0) {
            var rel = p.substring(idx + 1);
            if (SAFE_CONFIG_RE.test(rel)) return rel;
          }
        } catch (e) {}

        try {
          var q = new URLSearchParams(window.location.search).get('config') || '';
          q = stripQueryAndHash(q);
          if (SAFE_CONFIG_RE.test(q)) return q;
        } catch (e) {}

        return '';
      }

                  if (Object.keys(uniq).length > 1) {
                    detailHtml += '<span class="oec-live-party-details__excerpt">'
                      + escapeHtml(uiLang === 'ta' ? 'à®‡à®¨à¯à®¤ à®•à¯‚à®Ÿà¯à®Ÿà®£à®¿à®¯à®¿à®²à¯ à®•à®Ÿà¯à®šà®¿à®•à®³à¯ à®µà¯‡à®±à¯à®ªà®Ÿà¯à®Ÿ à®¨à®¿à®²à¯ˆà®ªà¯à®ªà®¾à®Ÿà¯à®•à®³à¯ˆ à®•à¯Šà®£à¯à®Ÿà¯à®³à¯à®³à®©.' : 'Parties in this alliance hold different positions on this issue.')
                      + '</span>';
                  }
                }

                subpartyPositions.forEach(function (item) {
                  var subLabel = getPositionLabel(item.position);
                  detailHtml += '<span class="oec-live-party-details__line">' + escapeHtml(item.party + ': ' + subLabel) + '</span>';
                  if (item.parsedExcerpt) {
                    detailHtml += '<span class="oec-live-party-details__excerpt">' + escapeHtml(uiLang === 'ta' ? ('à®•à¯‚à®Ÿà¯à®Ÿà®£à®¿ à®•à¯à®±à®¿à®ªà¯à®ªà®¿à®²à®¿à®°à¯à®¨à¯à®¤à¯: ' + item.parsedExcerpt) : ('From alliance note: ' + item.parsedExcerpt)) + '</span>';
                  }
                  if (item.excerpt) {
                    detailHtml += '<span class="oec-live-party-details__excerpt">"' + escapeHtml(item.excerpt) + '"</span>';
                  }
                  if (item.source) {
                    detailHtml += '<a class="oec-source-link" href="' + escapeHtml(item.source) + '" target="_blank" rel="noopener noreferrer">'
                      + escapeHtml(uiLang === 'ta' ? (item.party + ' à®†à®¤à®¾à®°à®®à¯') : (item.party + ' Source'))
                      + '</a>';
                  }
                });

                if (detailHtml) {
                  var details = existingDetails || document.createElement('div');
                  details.className = 'oec-live-party-details';
                  details.innerHTML = detailHtml;
                  if (!existingDetails) bubbleEl.appendChild(details);
                } else if (existingDetails && existingDetails.parentElement) {
                  existingDetails.parentElement.removeChild(existingDetails);
                }
              } else if (existingDetails && existingDetails.parentElement) {
                existingDetails.parentElement.removeChild(existingDetails);
              }

              debugLog('bubble processed: match=' + matchKind + ', text=' + bubbleText.substring(0, 64));
            });
          }

          function findProfileEntryForText(text) {
            var norm = normalizeText(text);
            if (!norm) return null;
            for (var i = 0; i < partyProfileEntries.length; i++) {
              var entry = partyProfileEntries[i];
              for (var j = 0; j < entry.keys.length; j++) {
                var key = entry.keys[j];
                if (!key) continue;
                if (norm.indexOf(key) >= 0 || key.indexOf(norm) >= 0) {
                  return entry;
                }
              }
            }
            return null;
          }

          function injectCandidateProfileLinks () {
            if (!partyProfileEntries.length) return;

            var candidates = container.querySelectorAll(
              'button, [role="button"], label, .party-item, [class*="party-item"], .base-button, [class*="party"]'
            );

            candidates.forEach(function (el) {
              if (!el || el.closest('.oec-candidate-profile')) return;
              var rawText = (el.textContent || '').replace(/\s+/g, ' ').trim();
              if (!rawText || rawText.length < 3) return;

              var entry = findProfileEntryForText(rawText);
              if (!entry) return;

              // Find a stable insertion anchor near the selectable control.
              var anchor = el;
              var partyBlock = el.closest('.party-item') || el.closest('[class*="party-item"]') || el.closest('[class*="party"]');
              if (partyBlock) anchor = partyBlock;

              var anchorKey = normalizeText((anchor.textContent || '').replace(/\s+/g, ' ').trim());
              if (!anchorKey) return;

              var existing = Array.prototype.slice.call(container.querySelectorAll('.oec-candidate-profile'))
                .some(function (n) { return n.getAttribute('data-profile-key') === anchorKey; });
              if (existing) return;

              var insertParent = anchor.parentElement;
              var insertAfter = anchor;
              if (!insertParent) return;

              // Keep link outside labels to avoid toggling checkboxes.
              if (insertAfter.tagName && insertAfter.tagName.toLowerCase() === 'label' && insertAfter.parentElement) {
                insertParent = insertAfter.parentElement;
              }

              var holder = document.createElement('div');
              holder.className = 'oec-candidate-profile';
              holder.setAttribute('data-profile-key', anchorKey);

              if (entry.symbol) {
                var symbol = document.createElement('span');
                symbol.className = 'oec-party-symbol';
                symbol.textContent = entry.symbol;
                holder.appendChild(symbol);
              }

              var links = document.createElement('span');
              links.className = 'oec-candidate-links';

              var link = document.createElement('a');
              link.textContent = uiLang === 'ta' ? 'à®šà¯à®¯à®µà®¿à®µà®°à®®à¯' : 'Profile';

              if (entry.url) {
                link.href = entry.url;
                link.target = '_blank';
                link.rel = 'noopener noreferrer';
              } else {
                link.href = '#';
              }

              // Prevent link interactions from toggling party selection.
              ['click', 'mousedown', 'mouseup', 'touchstart', 'touchend', 'pointerdown', 'pointerup'].forEach(function (evt) {
                link.addEventListener(evt, function (e) {
                  e.stopPropagation();
                });
              });

              if (!entry.url) {
                link.classList.add('is-disabled');
                link.addEventListener('click', function (e) {
                  e.preventDefault();
                  window.alert(getProfileUnavailableMessage());
                });
              }

              links.appendChild(link);

              if (entry.partyUrl) {
                var partyLink = document.createElement('a');
                partyLink.href = entry.partyUrl;
                partyLink.target = '_blank';
                partyLink.rel = 'noopener noreferrer';
                partyLink.textContent = uiLang === 'ta' ? 'à®•à®Ÿà¯à®šà®¿' : 'Party';
                ['click', 'mousedown', 'mouseup', 'touchstart', 'touchend', 'pointerdown', 'pointerup'].forEach(function (evt) {
                  partyLink.addEventListener(evt, function (e) {
                    e.stopPropagation();
                  });
                });
                links.appendChild(partyLink);
              }

              holder.appendChild(links);
              if (insertAfter.nextSibling) {
                insertParent.insertBefore(holder, insertAfter.nextSibling);
              } else {
                insertParent.appendChild(holder);
              }
            });
          }

          var observer = null;
          var injectScheduled = false;
          var isInjecting = false;

          function runInjectors() {
            if (isInjecting) return;
            isInjecting = true;
            if (observer) observer.disconnect();
            try {
              injectLinks();
              injectCandidateProfileLinks();
            } finally {
              if (observer) observer.observe(container, { childList: true, subtree: true });
              isInjecting = false;
            }
          }

          function scheduleInjectors() {
            if (injectScheduled) return;
            injectScheduled = true;
            window.requestAnimationFrame(function () {
              injectScheduled = false;
              runInjectors();
            });
          }

          observer = new MutationObserver(function () {
            scheduleInjectors();
          });
          observer.observe(container, { childList: true, subtree: true });

          container.addEventListener('click', function (e) {
            var target = e.target;
            if (!target || !target.closest) return;
            var control = target.closest('button, [role="button"], label, .party-item__button, input[type="radio"], input[type="checkbox"]');
            if (!control) return;

            var txt = getControlText(control);
            if (!isStanceText(txt)) return;

            var token = getUserResponseTokenFromText(txt);
            if (!token) return;

            var marker = getStepMarker(container);
            if (!marker) return;
            var key = normalizeText(marker);
            if (!key) return;

            userResponseByThesisKey[key] = token;
          }, true);

          runInjectors(); // catch anything already rendered

          legacyLoadPromise.then(function () {
            scheduleInjectors();
          });

          // OEC updates some UI states asynchronously; periodic refresh keeps source labels in sync.
          // Self-stopping: runs every 5 s for the first 150 s then clears itself.
          var _periodicCount = 0;
          var _periodicTimer = setInterval(function () {
            scheduleInjectors();
            if (++_periodicCount >= 30) clearInterval(_periodicTimer);
          }, 5000);
        })
        .catch(function () { /* silently ignore â€“ sources are optional */ });
    }());
  </script>
