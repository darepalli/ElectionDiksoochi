<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="India Election Compass" />
  <title>Election Compass</title>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />

  <style>
    /* Thin wrapper styles – OEC renders everything else */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; }

    /* Back-to-hub bar */
    .back-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 9999;
      background: rgba(192, 57, 43, 0.95);
      padding: 6px 1rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .back-bar a {
      color: #fff;
      text-decoration: none;
      font-size: .82rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .back-bar a:hover { text-decoration: underline; }
    .back-bar .sep { color: rgba(255,255,255,.5); }
    .back-bar .current-label {
      font-size: .82rem;
      color: rgba(255,255,255,.85);
    }

    /* Push OEC content below the back-bar */
    #open-election-compass { padding-top: 36px; }

    /* Error state */
    .error-page {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 1rem;
      color: #374151;
      text-align: center;
      padding: 2rem;
    }
    .error-page h1 { font-size: 1.5rem; color: #c0392b; }
    .error-page p  { max-width: 480px; color: #6b7280; }
    .error-page a  { color: #c0392b; font-weight: 600; }

    /* Source citation link and popup for compare-screen positions */
    .oec-source-link {
      display: inline-block;
      margin-top: 0.6rem;
      padding: 0.2rem 0.55rem;
      font-size: 0.72rem;
      font-weight: 600;
      color: #2563eb;
      border: 1px solid #bfdbfe;
      border-radius: 4px;
      text-decoration: none;
      background: #eff6ff;
    }
    .oec-source-link:hover {
      background: #dbeafe;
      text-decoration: underline;
    }

    .oec-source-modal {
      position: fixed;
      inset: 0;
      z-index: 10000;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      background: rgba(0, 0, 0, 0.45);
    }
    .oec-source-modal.is-open { display: flex; }
    .oec-source-modal__card {
      width: min(560px, 96vw);
      background: #fff;
      border-radius: 10px;
      border: 1px solid #e5e7eb;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
      padding: 1rem;
    }
    .oec-source-modal__title {
      font-size: 1rem;
      font-weight: 700;
      color: #111827;
      margin-bottom: 0.45rem;
    }
    .oec-source-modal__body {
      font-size: 0.86rem;
      color: #4b5563;
      margin-bottom: 0.85rem;
      word-break: break-word;
    }
    .oec-source-modal__actions {
      display: flex;
      justify-content: flex-end;
      gap: 0.45rem;
    }
    .oec-source-btn {
      border: 1px solid #d1d5db;
      border-radius: 6px;
      background: #fff;
      color: #111827;
      font-size: 0.8rem;
      font-weight: 600;
      padding: 0.42rem 0.7rem;
      cursor: pointer;
      text-decoration: none;
    }
    .oec-source-btn--primary {
      background: #2563eb;
      border-color: #2563eb;
      color: #fff;
    }
    .oec-source-btn--primary:hover { background: #1d4ed8; }
  </style>
</head>
<body>

  <!-- Back navigation bar -->
  <div class="back-bar">
    <a href="index.html">← All Elections</a>
    <span class="sep">|</span>
    <span class="current-label" id="back-label">Election Compass</span>
  </div>

  <!--
    OEC mount point.
    Usage:  compass.html?config=elections/tn/2026-state/config.json

    Sequence (per OEC docs):
      1. Inline script (below) runs synchronously → validates ?config= param,
         sets the load-url attribute on <open-election-compass> and updates page title.
      2. OEC library (defer) runs after HTML is fully parsed → reads load-url,
         fetches the JSON and mounts the component.
  -->
  <div id="open-election-compass">
    <!-- Vue mounts here (el:"#open-election-compass"); OEC reads load-url from the component prop -->
    <open-election-compass id="oec-el"></open-election-compass>
  </div>

  <script>
    (function () {
      var SAFE_CONFIG_RE = /^elections\/[a-z]{2,}\/[a-z0-9._/-]+\/config\.json$/;

      function getParam(name) {
        if (window.URLSearchParams) {
          return new URLSearchParams(window.location.search).get(name) || '';
        }
        var match = new RegExp('[?&]' + name + '=([^&#]*)').exec(window.location.search);
        return match ? decodeURIComponent(match[1].replace(/\+/g, ' ')) : '';
      }

      var configPath = getParam('config');
      var oecEl      = document.getElementById('oec-el');
      var wrapper    = document.getElementById('open-election-compass');

      if (!configPath || !SAFE_CONFIG_RE.test(configPath)) {
        wrapper.innerHTML =
          '<div class="error-page">'
          + '<h1>No Election Selected</h1>'
          + '<p>Please choose an election from the hub to launch the compass.</p>'
          + '<a href="index.html">\u2190 Back to India Election Compass</a>'
          + '</div>';
        return;
      }

      // Build back-bar label: "elections/tn/2026-state/config.json" → "TN · 2026 State"
      var parts = configPath.split('/');
      var state = (parts[1] || '').toUpperCase();
      var level = (parts[2] || '').replace(/-/g, ' ').replace(/\b\w/g, function(c){ return c.toUpperCase(); });
      var label = state + ' \u00b7 ' + level;
      document.getElementById('back-label').textContent = label;
      document.title = label + ' | India Election Compass';

      // Set load-url BEFORE the deferred OEC script executes.
      // The deferred script reads this attribute when it initialises.
      oecEl.setAttribute('load-url', configPath);
    }());
  </script>

  <!-- OEC library: defer ensures it runs AFTER the inline script above has set load-url -->
  <script src="assets/open-election-compass.umd.min.js" defer></script>

  <script>
    /*
     * Source popup injector
     * When a user clicks a party position in compare screen, OEC renders a
     * chat bubble with the party explanation. We map that explanation to the
     * source URL in config.json and show a popup with the source link.
     */
    (function () {
      var configPath = '';
      var oecEl = document.getElementById('oec-el');
      if (oecEl) configPath = oecEl.getAttribute('load-url') || '';
      if (!configPath) return;

      var srcMap = {}; // key: first 60 chars of explanation text, value: URL
      var pendingCompareClickAt = 0;

      function matchesSelector(el, selector) {
        var fn = el.matches || el.msMatchesSelector || el.webkitMatchesSelector;
        return fn ? fn.call(el, selector) : false;
      }

      function closestAny(el, selectors) {
        while (el && el.nodeType === 1) {
          for (var i = 0; i < selectors.length; i++) {
            if (matchesSelector(el, selectors[i])) return el;
          }
          el = el.parentElement;
        }
        return null;
      }

      function createModal () {
        var modal = document.createElement('div');
        modal.className = 'oec-source-modal';
        modal.innerHTML =
          '<div class="oec-source-modal__card" role="dialog" aria-modal="true" aria-label="Source link">'
          + '<div class="oec-source-modal__title">Source for this party position</div>'
          + '<div class="oec-source-modal__body" id="oec-source-modal-body"></div>'
          + '<div class="oec-source-modal__actions">'
          + '<button type="button" class="oec-source-btn" id="oec-source-close">Close</button>'
          + '<a class="oec-source-btn oec-source-btn--primary" id="oec-source-open" target="_blank" rel="noopener noreferrer">Open Source</a>'
          + '</div>'
          + '</div>';
        document.body.appendChild(modal);

        modal.addEventListener('click', function (ev) {
          if (ev.target === modal) modal.classList.remove('is-open');
        });
        modal.querySelector('#oec-source-close').addEventListener('click', function () {
          modal.classList.remove('is-open');
        });
        document.addEventListener('keydown', function (ev) {
          if (ev.key === 'Escape') modal.classList.remove('is-open');
        });
        return modal;
      }

      var modal = createModal();
      var modalBody = modal.querySelector('#oec-source-modal-body');
      var modalOpen = modal.querySelector('#oec-source-open');

      function showSourcePopup (src) {
        if (src) {
          modalBody.textContent = src;
          modalOpen.href = src;
          modalOpen.style.display = 'inline-flex';
        } else {
          modalBody.textContent = 'No source link has been added for this party position yet.';
          modalOpen.removeAttribute('href');
          modalOpen.style.display = 'none';
        }
        modal.classList.add('is-open');
      }

      document.addEventListener('click', function (ev) {
        var compareRoot = closestAny(ev.target, ['.compare-section']);
        if (!compareRoot) return;
        var trigger = closestAny(ev.target, ['button', '[role="button"]', '.chat-bubble__status', '.chat-bubble__party']);
        if (trigger) pendingCompareClickAt = Date.now();
      });

      fetch(configPath)
        .then(function (r) { return r.ok ? r.json() : Promise.reject(r.status); })
        .then(function (cfg) {
          var parties = cfg.parties || [];
          var theses  = cfg.theses  || [];
          var langs   = (cfg.languages || []).map(function (l) { return l.code; });

          theses.forEach(function (thesis) {
            parties.forEach(function (party) {
              var pos = thesis.positions && thesis.positions[party.alias];
              if (!pos || !pos.source) return;
              langs.forEach(function (code) {
                var text = pos.explanation && pos.explanation[code];
                if (text) srcMap[text.substring(0, 60)] = pos.source;
              });
            });
          });

          var container = document.getElementById('open-election-compass');
          if (!container || !Object.keys(srcMap).length) return;

          function injectLinks () {
            container.querySelectorAll('.chat-bubble:not([data-src-done])').forEach(function (bubble) {
              bubble.setAttribute('data-src-done', '1');
              var bubbleEl = bubble.querySelector('.chat-bubble__bubble');
              if (!bubbleEl) return;
              var key = bubbleEl.textContent.trim().substring(0, 60);
              var src = srcMap[key];
              if (!src) {
                if (Date.now() - pendingCompareClickAt < 2500) {
                  showSourcePopup('');
                  pendingCompareClickAt = 0;
                }
                return;
              }
              var a = document.createElement('a');
              a.href = src;
              a.setAttribute('role', 'button');
              a.className = 'oec-source-link';
              a.textContent = 'Source →';
              a.addEventListener('click', function (ev) {
                ev.preventDefault();
                showSourcePopup(src);
              });
              bubbleEl.appendChild(a);

              if (Date.now() - pendingCompareClickAt < 2500) {
                showSourcePopup(src);
                pendingCompareClickAt = 0;
              }
            });
          }

          var observer = new MutationObserver(injectLinks);
          observer.observe(container, { childList: true, subtree: true });
          injectLinks(); // catch anything already rendered
        })
        .catch(function () { /* silently ignore – sources are optional */ });
    }());
  </script>

</body>
</html>
