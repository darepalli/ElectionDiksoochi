<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="India Election Compass" />
  <title>Election Compass</title>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />

  <style>
    :root {
      --back-bar-h: 36px;
    }

    /* Thin wrapper styles – OEC renders everything else */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }

    /* Back-to-hub bar */
    .back-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 9999;
      background: rgba(192, 57, 43, 0.95);
      padding: calc(6px + env(safe-area-inset-top, 0px)) 1rem 6px;
      display: flex;
      align-items: center;
      gap: 1rem;
      min-height: 36px;
      backdrop-filter: blur(2px);
    }
    .back-bar a {
      color: #fff;
      text-decoration: none;
      font-size: .86rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 4px;
      min-height: 34px;
    }
    .back-bar a:hover { text-decoration: underline; }
    .back-bar .sep { color: rgba(255,255,255,.5); }
    .back-bar .current-label {
      font-size: .82rem;
      color: rgba(255,255,255,.85);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .back-bar .spacer {
      flex: 1;
    }

    .language-switch {
      display: inline-flex;
      align-items: center;
      border: 1px solid rgba(255,255,255,.45);
      border-radius: 8px;
      overflow: hidden;
      min-height: 34px;
      background: rgba(255,255,255,.08);
    }

    .lang-btn {
      border: 0;
      background: transparent;
      color: rgba(255,255,255,.88);
      font-size: 0.75rem;
      font-weight: 700;
      padding: 0.32rem 0.5rem;
      min-height: 34px;
      min-width: 44px;
      cursor: pointer;
    }

    .lang-btn + .lang-btn {
      border-left: 1px solid rgba(255,255,255,.28);
    }

    .lang-btn.is-active {
      color: #fff;
      background: rgba(255,255,255,.22);
    }

    .feedback-trigger {
      border: 1px solid rgba(255,255,255,.45);
      background: rgba(255,255,255,.12);
      color: #fff;
      border-radius: 7px;
      padding: 0.35rem 0.6rem;
      font-size: 0.76rem;
      font-weight: 700;
      cursor: pointer;
      min-height: 34px;
    }

    .feedback-trigger:hover {
      background: rgba(255,255,255,.2);
    }

    /* Push OEC content below the back-bar */
    #open-election-compass {
      padding-top: calc(var(--back-bar-h, 36px) + 4px);
      min-height: 100vh;
    }

    /* Error state */
    .error-page {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 1rem;
      color: #374151;
      text-align: center;
      padding: 2rem;
    }
    .error-page h1 { font-size: 1.5rem; color: #c0392b; }
    .error-page p  { max-width: 480px; color: #6b7280; }
    .error-page a  { color: #c0392b; font-weight: 600; }

    /* Source citation shown inline inside compare explanation bubbles */
    .oec-source-link {
      display: inline-block;
      margin-top: 0.6rem;
      padding: 0.35rem 0.65rem;
      font-size: 0.76rem;
      font-weight: 600;
      color: #2563eb;
      border: 1px solid #bfdbfe;
      border-radius: 4px;
      text-decoration: none;
      background: #eff6ff;
    }
    .oec-source-link:hover {
      background: #dbeafe;
      text-decoration: underline;
    }

    .oec-source-inline {
      margin-top: 0.55rem;
      font-size: 0.78rem;
      line-height: 1.35;
      color: #475569;
      word-break: break-word;
    }

    .oec-live-party-details {
      margin-top: 0.42rem;
      padding-top: 0.34rem;
      border-top: 1px dashed #dbe4ee;
      font-size: 0.73rem;
      color: #475569;
      line-height: 1.3;
    }

    .oec-live-party-details__line {
      display: block;
      margin-top: 0.15rem;
      font-weight: 700;
      color: #334155;
    }

    .oec-live-party-details__excerpt {
      display: block;
      margin-top: 0.1rem;
      font-size: 0.71rem;
      font-style: italic;
      color: #64748b;
    }

    .oec-candidate-profile {
      margin-top: 0.45rem;
      font-size: 0.76rem;
      line-height: 1.3;
      display: block;
      position: relative;
      z-index: 2;
      pointer-events: auto;
    }

    .oec-party-symbol {
      display: inline-block;
      margin-right: 0.45rem;
      font-weight: 700;
      color: #334155;
    }

    .oec-candidate-links {
      display: inline-flex;
      gap: 0.55rem;
      flex-wrap: wrap;
      align-items: center;
    }

    .oec-profile-panel {
      position: fixed;
      right: 12px;
      top: calc(var(--back-bar-h, 56px) + 12px);
      width: min(336px, calc(100vw - 24px));
      max-height: calc(100vh - var(--back-bar-h, 56px) - 24px);
      overflow: auto;
      z-index: 11400;
      background: #ffffff;
      border: 1px solid #dbeafe;
      border-radius: 10px;
      box-shadow: 0 12px 26px rgba(15, 23, 42, 0.16);
      padding: 0.55rem 0.6rem;
    }

    .oec-profile-panel.is-collapsed {
      width: auto;
      max-height: none;
      overflow: visible;
      padding-bottom: 0.6rem;
    }

    .oec-profile-panel__header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
      margin-bottom: 0.42rem;
    }

    .oec-profile-toggle {
      border: 1px solid #bfdbfe;
      background: #eff6ff;
      color: #1d4ed8;
      border-radius: 6px;
      padding: 0.18rem 0.5rem;
      font-size: 0.72rem;
      font-weight: 700;
      cursor: pointer;
    }

    .oec-profile-toggle:hover {
      background: #dbeafe;
    }

    .oec-profile-link-btn {
      border: 1px solid #c7d2fe;
      background: #eef2ff;
      color: #3730a3;
      border-radius: 6px;
      padding: 0.18rem 0.5rem;
      font-size: 0.72rem;
      font-weight: 700;
      text-decoration: none;
      line-height: 1.2;
      display: inline-flex;
      align-items: center;
      min-height: 1.72rem;
    }

    .oec-profile-link-btn:hover {
      background: #e0e7ff;
      text-decoration: underline;
    }

    .oec-profile-panel__title {
      margin: 0;
      color: #0f172a;
      font-size: 0.92rem;
      font-weight: 800;
    }

    .oec-profile-panel__body {
      display: block;
    }

    .oec-profile-panel.is-collapsed .oec-profile-panel__body {
      display: none;
    }

    .oec-profile-panel__list {
      display: grid;
      gap: 0.45rem;
    }

    .oec-profile-panel__item {
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      background: #f8fafc;
      padding: 0.45rem 0.5rem;
      border-left: 4px solid #cbd5e1;
    }

    .oec-profile-panel__item[data-alliance="dmk"] {
      border-left-color: #dc2626;
    }

    .oec-profile-panel__item[data-alliance="aiadmk"] {
      border-left-color: #16a34a;
    }

    .oec-profile-panel__item[data-alliance="bjp"] {
      border-left-color: #ea580c;
    }

    .oec-profile-panel__item[data-alliance="ind"] {
      border-left-color: #475569;
    }

    .oec-profile-panel__group {
      --alliance-accent: #64748b;
      --alliance-bg: #f8fafc;
      margin-bottom: 0.45rem;
      border: 1px solid color-mix(in srgb, var(--alliance-accent) 24%, #e2e8f0);
      border-radius: 8px;
      background: var(--alliance-bg);
      padding: 0.35rem 0.4rem;
    }

    .oec-profile-panel__group[data-alliance="dmk"] {
      --alliance-accent: #dc2626;
      --alliance-bg: #fef2f2;
    }

    .oec-profile-panel__group[data-alliance="aiadmk"] {
      --alliance-accent: #16a34a;
      --alliance-bg: #f0fdf4;
    }

    .oec-profile-panel__group[data-alliance="bjp"] {
      --alliance-accent: #ea580c;
      --alliance-bg: #fff7ed;
    }

    .oec-profile-panel__group[data-alliance="ind"] {
      --alliance-accent: #475569;
      --alliance-bg: #f8fafc;
    }

    .oec-profile-panel__group-title {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.72rem;
      font-weight: 800;
      color: #334155;
      margin: 0;
      text-transform: uppercase;
      letter-spacing: 0.02em;
    }

    .oec-profile-panel__group-members {
      margin: 0 0 0.28rem;
      color: #475569;
      font-size: 0.64rem;
      line-height: 1.2;
      font-weight: 600;
    }

    .oec-profile-panel__group-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.4rem;
      margin-bottom: 0.2rem;
    }

    .oec-profile-panel__group-body.is-collapsed {
      display: none;
    }

    .oec-group-toggle {
      border: 1px solid color-mix(in srgb, var(--alliance-accent) 35%, #cbd5e1);
      background: color-mix(in srgb, var(--alliance-accent) 8%, #ffffff);
      color: color-mix(in srgb, var(--alliance-accent) 75%, #1f2937);
      border-radius: 6px;
      padding: 0.1rem 0.32rem;
      font-size: 0.64rem;
      font-weight: 700;
      cursor: pointer;
      line-height: 1.1;
    }

    .oec-alliance-seat-list {
      display: grid;
      gap: 0.22rem;
      margin: 0.18rem 0 0;
    }

    .oec-alliance-seat-row {
      border: 1px solid color-mix(in srgb, var(--alliance-accent) 18%, #e2e8f0);
      border-radius: 6px;
      background: color-mix(in srgb, var(--alliance-accent) 4%, #ffffff);
      padding: 0.26rem 0.34rem;
    }

    .oec-alliance-seat-row__top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.28rem;
      margin-bottom: 0.12rem;
    }

    .oec-alliance-seat-row__party {
      display: inline-flex;
      align-items: center;
      gap: 0.22rem;
      font-size: 0.66rem;
      font-weight: 700;
      color: #1f2937;
    }

    .oec-alliance-seat-row__party-symbol {
      font-size: 0.72rem;
      line-height: 1;
    }

    .oec-alliance-seat-row__links {
      display: inline-flex;
      gap: 0.28rem;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .oec-alliance-seat-link {
      color: color-mix(in srgb, var(--alliance-accent) 72%, #1d4ed8);
      text-decoration: none;
      font-size: 0.62rem;
      font-weight: 700;
      border-bottom: 1px dotted color-mix(in srgb, var(--alliance-accent) 45%, #93c5fd);
    }

    .oec-alliance-seat-link:hover {
      text-decoration: underline;
    }

    .oec-alliance-seat-row__bar {
      height: 0.3rem;
      background: #e2e8f0;
      border-radius: 999px;
      overflow: hidden;
    }

    .oec-alliance-seat-row__fill {
      display: block;
      height: 100%;
      background: linear-gradient(
        90deg,
        color-mix(in srgb, var(--alliance-accent) 70%, #ffffff),
        var(--alliance-accent)
      );
      border-radius: 999px;
      min-width: 2px;
    }

    .oec-alliance-seat-row__meta {
      margin-top: 0.1rem;
      color: #64748b;
      font-size: 0.6rem;
      line-height: 1.2;
    }

    .oec-alliance-dot {
      width: 0.6rem;
      height: 0.6rem;
      border-radius: 999px;
      display: inline-block;
      background: #cbd5e1;
    }

    .oec-alliance-header-symbol {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 0.9rem;
      height: 0.9rem;
      font-size: 0.82rem;
      line-height: 1;
    }

    .oec-alliance-dot[data-alliance="dmk"] {
      background: #dc2626;
    }

    .oec-alliance-dot[data-alliance="aiadmk"] {
      background: #16a34a;
    }

    .oec-alliance-dot[data-alliance="bjp"] {
      background: #ea580c;
    }

    .oec-alliance-dot[data-alliance="ind"] {
      background: #475569;
    }

    .oec-profile-panel__name {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      color: #1f2937;
      font-size: 0.8rem;
      font-weight: 700;
      line-height: 1.25;
      margin-bottom: 0.35rem;
    }

    .oec-profile-panel__actions {
      display: inline-flex;
      gap: 0.4rem;
      flex-wrap: wrap;
    }

    .oec-profile-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 1.72rem;
      padding: 0.2rem 0.52rem;
      border-radius: 6px;
      border: 1px solid #bfdbfe;
      background: #eff6ff;
      color: #1d4ed8;
      text-decoration: none;
      font-size: 0.74rem;
      font-weight: 700;
    }

    .oec-profile-btn:hover {
      background: #dbeafe;
      text-decoration: underline;
    }

    .oec-profile-btn.is-disabled {
      background: #f3f4f6;
      border-color: #d1d5db;
      color: #6b7280;
    }

    .oec-candidate-profile a {
      color: #0f766e;
      text-decoration: none;
      font-weight: 600;
      border-bottom: 1px dotted #0f766e;
    }

    .oec-candidate-profile a:hover {
      text-decoration: underline;
    }

    .oec-debug-panel {
      position: fixed;
      right: 12px;
      bottom: 12px;
      z-index: 12000;
      width: min(420px, calc(100vw - 24px));
      max-height: 45vh;
      overflow: auto;
      background: rgba(17, 24, 39, 0.95);
      color: #d1fae5;
      border: 1px solid #065f46;
      border-radius: 8px;
      padding: 0.6rem 0.75rem;
      font-size: 0.72rem;
      line-height: 1.35;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      white-space: pre-wrap;
    }

    .oec-debug-controls {
      display: flex;
      gap: 0.45rem;
      margin-bottom: 0.55rem;
      flex-wrap: wrap;
    }

    .oec-debug-btn {
      border: 1px solid #10b981;
      background: #022c22;
      color: #a7f3d0;
      border-radius: 6px;
      padding: 0.2rem 0.45rem;
      cursor: pointer;
      font-size: 0.7rem;
      font-family: inherit;
    }

    .oec-debug-log {
      white-space: pre-wrap;
    }

    .oec-random-results {
      margin: 0 auto;
      max-width: 980px;
      padding: 1rem;
      display: grid;
      gap: 0.9rem;
    }

    .oec-random-results__header {
      background: #f8fafc;
      border: 1px solid #dbe4ee;
      border-radius: 12px;
      padding: 0.9rem 1rem;
    }

    .oec-random-results__title {
      margin: 0;
      font-size: 1.1rem;
      color: #0f172a;
    }

    .oec-random-results__meta {
      margin-top: 0.35rem;
      font-size: 0.82rem;
      color: #475569;
    }

    .oec-random-results__rerun {
      margin-top: 0.6rem;
      border: 1px solid #0f766e;
      background: #ecfeff;
      color: #0f766e;
      border-radius: 8px;
      padding: 0.42rem 0.7rem;
      font-size: 0.78rem;
      font-weight: 700;
      cursor: pointer;
    }

    .oec-random-results__grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 0.7rem;
    }

    .oec-random-card {
      border: 1px solid #dbe4ee;
      border-radius: 10px;
      background: #ffffff;
      padding: 0.7rem 0.8rem;
    }

    .oec-random-card__name {
      font-weight: 700;
      color: #111827;
      margin-bottom: 0.3rem;
    }

    .oec-random-card__score {
      font-size: 1.35rem;
      line-height: 1;
      font-weight: 800;
      color: #0f766e;
    }

    .oec-random-card__small {
      margin-top: 0.2rem;
      color: #64748b;
      font-size: 0.74rem;
    }

    .oec-random-results__responses {
      border: 1px solid #dbe4ee;
      border-radius: 10px;
      background: #ffffff;
      padding: 0.75rem 0.85rem;
    }

    .oec-random-results__responses h3 {
      margin: 0 0 0.45rem 0;
      font-size: 0.92rem;
      color: #0f172a;
    }

    .oec-random-results__responses ul {
      margin: 0;
      padding-left: 1.1rem;
      display: grid;
      gap: 0.3rem;
      color: #334155;
      font-size: 0.79rem;
    }

    .oec-random-results__details {
      border: 1px solid #dbe4ee;
      border-radius: 10px;
      background: #ffffff;
      padding: 0.75rem 0.85rem;
      overflow: auto;
    }

    .oec-random-results__details h3 {
      margin: 0 0 0.55rem 0;
      font-size: 0.92rem;
      color: #0f172a;
    }

    .oec-live-details__head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
      margin-bottom: 0.4rem;
    }

    .oec-live-details__head h3 {
      margin: 0;
    }

    .oec-live-details__toggle {
      border: 1px solid #cbd5e1;
      background: #f8fafc;
      color: #334155;
      border-radius: 6px;
      padding: 0.16rem 0.44rem;
      font-size: 0.68rem;
      font-weight: 700;
      cursor: pointer;
      line-height: 1.1;
    }

    .oec-live-details__toggle:hover {
      background: #eef2f7;
    }

    .oec-live-details__body.is-collapsed {
      display: none;
    }

    .oec-random-details-table {
      width: 100%;
      border-collapse: collapse;
      min-width: 720px;
      font-size: 0.76rem;
      color: #334155;
    }

    .oec-random-details-table th,
    .oec-random-details-table td {
      border: 1px solid #e2e8f0;
      padding: 0.45rem 0.5rem;
      vertical-align: top;
      text-align: left;
    }

    .oec-random-details-table th {
      background: #f8fafc;
      color: #0f172a;
      font-weight: 700;
    }

    .oec-random-stance {
      display: inline-block;
      font-weight: 700;
      color: #0f766e;
    }

    .oec-random-expl {
      display: block;
      margin-top: 0.2rem;
      color: #64748b;
      line-height: 1.35;
    }

    .oec-random-subparty {
      display: block;
      margin-top: 0.2rem;
      font-size: 0.73rem;
      color: #475569;
      line-height: 1.3;
    }

    .oec-random-subparty-excerpt {
      display: block;
      margin-top: 0.12rem;
      font-size: 0.71rem;
      color: #64748b;
      font-style: italic;
      line-height: 1.3;
    }

    .oec-random-source {
      display: inline-block;
      margin-top: 0.24rem;
      font-size: 0.7rem;
      color: #2563eb;
      text-decoration: none;
      border-bottom: 1px dotted #93c5fd;
    }

    .oec-random-source:hover {
      text-decoration: underline;
    }

    .feedback-modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.5);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 13000;
      padding: 1rem;
    }

    .feedback-modal.is-open {
      display: flex;
    }

    .feedback-card {
      width: min(560px, 96vw);
      background: #fff;
      border-radius: 12px;
      border: 1px solid #e5e7eb;
      box-shadow: 0 18px 60px rgba(0,0,0,.25);
      padding: 1rem;
    }

    .feedback-title {
      font-size: 1rem;
      font-weight: 800;
      color: #111827;
      margin-bottom: .3rem;
    }

    .feedback-note {
      font-size: .79rem;
      color: #4b5563;
      margin-bottom: .6rem;
    }

    .feedback-field {
      width: 100%;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      padding: .55rem .65rem;
      font-size: .85rem;
      font-family: inherit;
      margin-bottom: .45rem;
    }

    .feedback-field--textarea {
      min-height: 110px;
      resize: vertical;
    }

    .feedback-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: .5rem;
      font-size: .74rem;
      color: #6b7280;
      margin-bottom: .75rem;
    }

    .feedback-actions {
      display: flex;
      justify-content: flex-end;
      gap: .5rem;
    }

    .feedback-btn {
      border: 1px solid #d1d5db;
      background: #fff;
      color: #111827;
      border-radius: 7px;
      padding: .45rem .75rem;
      font-size: .8rem;
      font-weight: 700;
      cursor: pointer;
    }

    .feedback-btn--primary {
      border-color: #2563eb;
      background: #2563eb;
      color: #fff;
    }

    .feedback-btn--primary:disabled {
      background: #93c5fd;
      border-color: #93c5fd;
      cursor: not-allowed;
    }

    @media (max-width: 768px) {
      .back-bar {
        gap: 0.45rem;
        padding-left: 0.65rem;
        padding-right: 0.65rem;
      }

      .back-bar .sep {

      .back-bar a {

    @media (max-width: 480px) {

<body>

  <!-- Back navigation bar -->
  <div class="back-bar">
    <a href="index.html">← All Elections</a>
    <span class="sep">|</span>
    <span class="current-label" id="back-label">Election Compass</span>
    <span class="spacer"></span>
    <div class="language-switch" role="group" aria-label="Language selector">
      <button type="button" class="lang-btn" data-lang="en" id="lang-en">EN</button>
      <button type="button" class="lang-btn" data-lang="ta" id="lang-ta">தமிழ்</button>
    </div>
    <button type="button" class="feedback-trigger" id="feedback-open">Feedback</button>
  </div>

  <div class="feedback-modal" id="feedback-modal" aria-hidden="true">
    <div class="feedback-card" role="dialog" aria-modal="true" aria-labelledby="feedback-title">
      <div class="feedback-title" id="feedback-title">Send Feedback</div>
      <p class="feedback-note">Feedback will open as a public GitHub issue in this project. Please avoid personal or sensitive information.</p>
      <select class="feedback-field" id="feedback-type" aria-label="Feedback type">
        <option value="General">General</option>
        <option value="Source Correction">Source Correction</option>
        <option value="Bug">Bug</option>
        <option value="Mobile UX">Mobile UX</option>
      </select>
      <textarea class="feedback-field feedback-field--textarea" id="feedback-text" maxlength="300" placeholder="Write feedback (max 300 characters)..."></textarea>
      <div class="feedback-meta">
        <span>Max 300 chars</span>
        <span id="feedback-count">0 / 300</span>
      </div>
      <div class="feedback-actions">
        <button type="button" class="feedback-btn" id="feedback-cancel">Cancel</button>
        <button type="button" class="feedback-btn feedback-btn--primary" id="feedback-submit" disabled>Post to Repo</button>
      </div>
    </div>
  </div>

  <!--
    OEC mount point.
    Usage:  compass.html?config=elections/tn/2026-state/config.json

    Sequence (per OEC docs):
      1. Inline script (below) runs synchronously → validates ?config= param,
         sets the load-url attribute on <open-election-compass> and updates page title.
      2. OEC library (defer) runs after HTML is fully parsed → reads load-url,
         fetches the JSON and mounts the component.
  -->
  <div id="open-election-compass">
    <!-- Vue mounts here (el:"#open-election-compass"); OEC reads load-url from the component prop -->
    <open-election-compass id="oec-el"></open-election-compass>
  </div>

  <script>
    (function () {
      var SAFE_CONFIG_RE = /^elections\/[a-z]{2,}\/[a-z0-9._/-]+\/config\.json$/;

      function getParam(name) {
        if (window.URLSearchParams) {
          return new URLSearchParams(window.location.search).get(name) || '';
        }
        var match = new RegExp('[?&]' + name + '=([^&#]*)').exec(window.location.search);
        return match ? decodeURIComponent(match[1].replace(/\+/g, ' ')) : '';
      }

      function withNoCache(url, token) {
        var key = token || String(Date.now());
        try {
          var u = new URL(url, window.location.href);
          u.searchParams.set('_oecv', key);
          return u.toString();
        } catch (e) {
          return String(url) + (String(url).indexOf('?') >= 0 ? '&' : '?') + '_oecv=' + encodeURIComponent(key);
        }
      }

      var configPath = getParam('config');
      var oecEl      = document.getElementById('oec-el');
      var wrapper    = document.getElementById('open-election-compass');
      var backBar    = document.querySelector('.back-bar');
      var langButtons = Array.prototype.slice.call(document.querySelectorAll('.lang-btn'));
      var hostName = String(window.location.hostname || '').toLowerCase();
      var isLocalhost = hostName === 'localhost' || hostName === '127.0.0.1' || hostName === '::1' || hostName === '[::1]';
      var randomResultsQuery = getParam('randomresults') === '1';

      if ((!configPath || !SAFE_CONFIG_RE.test(configPath)) && isLocalhost && randomResultsQuery) {
        configPath = 'elections/tn/2026-state/config.json';
        try {
          var autoUrl = new URL(window.location.href);
          autoUrl.searchParams.set('config', configPath);
          window.history.replaceState({}, '', autoUrl.toString());
        } catch (e) {}
      }

      function normalizeLang(value) {
        var raw = String(value || '').toLowerCase();
        return raw.indexOf('ta') === 0 ? 'ta' : 'en';
      }

      function getSelectedLang() {
        var queryLangRaw = getParam('lang');
        if (queryLangRaw) return normalizeLang(queryLangRaw);
        try {
          var storedLang = window.localStorage.getItem('oec-lang');
          if (storedLang) return normalizeLang(storedLang);
        } catch (e) {}
        return 'en';
      }

      function setLangUi(lang) {
        langButtons.forEach(function (btn) {
          var active = btn.getAttribute('data-lang') === lang;
          btn.classList.toggle('is-active', active);
          btn.setAttribute('aria-pressed', active ? 'true' : 'false');
        });
      }

      function persistLang(lang) {
        try { window.localStorage.setItem('oec-lang', lang); } catch (e) {}
        try {
          var url = new URL(window.location.href);
          url.searchParams.set('lang', lang);
          window.history.replaceState({}, '', url.toString());
        } catch (e) {}
      }

      function setOecLanguage(lang) {
        if (!oecEl) return;
        // OEC supports a dedicated `language` prop; keep both attribute and property in sync.
        oecEl.setAttribute('language', lang);
        try { oecEl.language = lang; } catch (e) {}
      }

      function forceOecRemount(lang) {
        try {
          var url = new URL(window.location.href);
          url.searchParams.set('lang', lang);
          // Bust bfcache-style restores so OEC always re-initializes from scratch.
          url.searchParams.set('_oec_remount', String(Date.now()));
          window.location.assign(url.toString());
          return;
        } catch (e) {}
        // Fallback if URL API is unavailable.
        window.location.reload();
      }

      function deepMerge(target, source) {
        if (!source || typeof source !== 'object') return target;
        if (!target || typeof target !== 'object') target = {};
        Object.keys(source).forEach(function (key) {
          var srcVal = source[key];
          var tgtVal = target[key];
          if (srcVal && typeof srcVal === 'object' && !Array.isArray(srcVal)) {
            target[key] = deepMerge(tgtVal && typeof tgtVal === 'object' && !Array.isArray(tgtVal) ? tgtVal : {}, srcVal);
          } else {
            target[key] = srcVal;
          }
        });
        return target;
      }

      function getTamilOecOverwrites() {
        return {
          algorithm: {
            options: {
              'strongly-approve': {
                button: 'மிகவும் ஒப்புதல்',
                'button-aria': 'இந்த தீர்மானத்தை மிகவும் ஒப்புதல் அளிக்க இங்கே சொடுக்கவும்'
              },
              approve: {
                button: 'ஒப்புதல்',
                'button-aria': 'இந்த தீர்மானத்தை ஒப்புதல் அளிக்க இங்கே சொடுக்கவும்'
              },
              partly: {
                button: 'பகுதியாக ஒப்புதல்',
                'button-aria': 'இந்த தீர்மானத்துக்கு பகுதியாக ஒப்புதல் அளிக்க இங்கே சொடுக்கவும்'
              },
              neutral: {
                button: 'நடுநிலை',
                'button-aria': 'இந்த தீர்மானத்தில் நடுநிலையாக இருக்க இங்கே சொடுக்கவும்'
              },
              reject: {
                button: 'எதிர்ப்பு',
                'button-aria': 'இந்த தீர்மானத்தை நிராகரிக்க இங்கே சொடுக்கவும்'
              },
              'strongly-reject': {
                button: 'கடுமையான எதிர்ப்பு',
                'button-aria': 'இந்த தீர்மானத்தை கடுமையாக நிராகரிக்க இங்கே சொடுக்கவும்'
              }
            }
          },
          views: {
            home: {
              theses: {
                'important-button': {
                  important: 'எனக்கு முக்கியம்'
                },
                'skip-button': {
                  skip: 'தெரியாது'
                }
              }
            }
          }
        };
      }

      function injectTamilOverwrites(config) {
        if (!config || !Array.isArray(config.languages)) return config;
        for (var i = 0; i < config.languages.length; i++) {
          var lang = config.languages[i];
          if (lang && String(lang.code).toLowerCase() === 'ta') {
            lang.overwrites = deepMerge(lang.overwrites || {}, getTamilOecOverwrites());
          }
        }
        return config;
      }

      function ensureOecConfigTag(configObj) {
        var existing = document.getElementById('oec-config-data');
        if (existing && existing.parentNode) existing.parentNode.removeChild(existing);
        var script = document.createElement('script');
        script.id = 'oec-config-data';
        script.type = 'application/json';
        script.text = JSON.stringify(configObj);
        document.body.appendChild(script);
        oecEl.setAttribute('load-tag', '#oec-config-data');
      }

      function ensureOecScriptLoaded() {
        if (document.getElementById('oec-runtime-script')) return;
        var s = document.createElement('script');
        s.id = 'oec-runtime-script';
        s.src = withNoCache('assets/open-election-compass.umd.min.js', noCacheToken);
        s.defer = true;
        document.body.appendChild(s);
      }

      function isLangButtonTextMatch(text, lang) {
        var t = String(text || '').toLowerCase().replace(/\s+/g, ' ').trim();
        if (!t) return false;
        if (lang === 'ta') {
          return t.indexOf('தமிழ்') >= 0 || t === 'ta' || t === 'tam';
        }
        return t.indexOf('english') >= 0 || t === 'en';
      }

      function tryApplyLanguageInOec(lang) {
        var nodes = document.querySelectorAll('#open-election-compass button, #open-election-compass [role="button"], #open-election-compass [class*="lang"]');
        for (var i = 0; i < nodes.length; i++) {
          var node = nodes[i];
          var txt = (node.textContent || '').replace(/\s+/g, ' ').trim();
          if (!txt) continue;
          if (isLangButtonTextMatch(txt, lang)) {
            node.click();
            return true;
          }
        }
        return false;
      }

      var TA_UI_LABELS = [
        { re: /^strongly approve$/, ta: 'மிகவும் ஒப்புதல்' },
        { re: /^approve$/, ta: 'ஒப்புதல்' },
        { re: /^partly$/, ta: 'பகுதியாக ஒப்புதல்' },
        { re: /^neutral$/, ta: 'நடுநிலை' },
        { re: /^reject$/, ta: 'எதிர்ப்பு' },
        { re: /^strongly reject$/, ta: 'கடுமையான எதிர்ப்பு' },
        { re: /^strongly agree$/, ta: 'மிகவும் ஒப்புக்கொள்கிறேன்' },
        { re: /^agree$/, ta: 'ஒப்புக்கொள்கிறேன்' },
        { re: /^disagree$/, ta: 'ஏற்கவில்லை' },
        { re: /^strongly disagree$/, ta: 'மிகவும் ஏற்கவில்லை' },
        { re: /^important to me$/, ta: 'எனக்கு முக்கியம்' },
        { re: /^i don't know$/, ta: 'தெரியாது' },
        { re: /^skip$/, ta: 'தவிர்' },
        { re: /^proceed to the next thesis$/, ta: 'அடுத்த தீர்மானத்துக்கு செல்லவும்' },
        { re: /^start with the first thesis$/, ta: 'முதல் தீர்மானத்திலிருந்து தொடங்கவும்' },
        { re: /^select the parties$/, ta: 'கட்சிகளைத் தேர்ந்தெடுக்கவும்' },
        { re: /^see your result$/, ta: 'உங்கள் முடிவைப் பார்க்கவும்' },
        { re: /^read the statements$/, ta: 'நிலையுரைகளைப் படிக்கவும்' },
        { re: /^party selection$/, ta: 'கட்சி தேர்வு' },
        { re: /^evaluation$/, ta: 'மதிப்பீடு' },
        { re: /^introduction$/, ta: 'அறிமுகம்' },
        { re: /^theses$/, ta: 'தீர்மானங்கள்' },
        { re: /^result$/, ta: 'முடிவு' },
        { re: /^start$/, ta: 'தொடங்கு' },
        { re: /^next$/, ta: 'அடுத்து' },
        { re: /^back$/, ta: 'பின்செல்' },
        { re: /^show more$/, ta: 'மேலும் காண்பி' },
        { re: /^hide$/, ta: 'மறை' },
        { re: /^menu$/, ta: 'மெனு' },
        { re: /^languages$/, ta: 'மொழிகள்' },
        { re: /^change language$/, ta: 'மொழியை மாற்று' },
        { re: /^reset$/, ta: 'மீட்டமை' },
        { re: /click here to strongly approve this thesis/, ta: 'இந்த தீர்மானத்தை வலுவாக ஒப்புதல் அளிக்க இங்கே சொடுக்கவும்' },
        { re: /click here to approve this thesis/, ta: 'இந்த தீர்மானத்தை ஒப்புதல் அளிக்க இங்கே சொடுக்கவும்' },
        { re: /click here to agree partly with this thesis/, ta: 'இந்த தீர்மானத்துக்கு பகுதியாக ஒப்புதல் அளிக்க இங்கே சொடுக்கவும்' },
        { re: /click here to remain neutral regarding this thesis/, ta: 'இந்த தீர்மானத்தில் நடுநிலையாக இருக்க இங்கே சொடுக்கவும்' },
        { re: /click here to reject this thesis/, ta: 'இந்த தீர்மானத்தை நிராகரிக்க இங்கே சொடுக்கவும்' },
        { re: /click here to strongly reject this thesis/, ta: 'இந்த தீர்மானத்தை வலுவாக நிராகரிக்க இங்கே சொடுக்கவும்' }
      ];

      function normalizeUiLabel(s) {
        return String(s || '').replace(/\s+/g, ' ').trim().toLowerCase();
      }

      function getTamilUiLabel(s) {
        var normalized = normalizeUiLabel(s);
        for (var i = 0; i < TA_UI_LABELS.length; i++) {
          if (TA_UI_LABELS[i].re.test(normalized)) {
            return TA_UI_LABELS[i].ta;
          }
        }
        return '';
      }

      function applyTamilUiLabelTranslations(root) {
        if (selectedLang !== 'ta') return;
        var scope = root || document;
        var nodes = scope.querySelectorAll('#open-election-compass button, #open-election-compass [role="button"], #open-election-compass a, #open-election-compass [aria-label], #open-election-compass [title]');
        for (var i = 0; i < nodes.length; i++) {
          var node = nodes[i];

          var text = (node.textContent || '').replace(/\s+/g, ' ').trim();
          var translatedText = getTamilUiLabel(text);
          if (translatedText) {
            node.textContent = translatedText;
          }

          var ariaLabel = node.getAttribute('aria-label');
          if (ariaLabel) {
            var translatedAria = getTamilUiLabel(ariaLabel);
            if (translatedAria) node.setAttribute('aria-label', translatedAria);
          }

          var title = node.getAttribute('title');
          if (title) {
            var translatedTitle = getTamilUiLabel(title);
            if (translatedTitle) node.setAttribute('title', translatedTitle);
          }
        }
      }

      var selectedLang = getSelectedLang();

      function syncBackBarHeight () {
        if (!backBar) return;
        var h = Math.max(36, Math.ceil(backBar.getBoundingClientRect().height));
        document.documentElement.style.setProperty('--back-bar-h', h + 'px');
      }

      if (!configPath || !SAFE_CONFIG_RE.test(configPath)) {
        wrapper.innerHTML =
          '<div class="error-page">'
          + '<h1>No Election Selected</h1>'
          + '<p>Please choose an election from the hub to launch the compass.</p>'
          + '<a href="index.html">\u2190 Back to India Election Compass</a>'
          + '</div>';
        return;
      }

      // Build back-bar label: "elections/tn/2026-state/config.json" → "TN · 2026 State"
      var parts = configPath.split('/');
      var state = (parts[1] || '').toUpperCase();
      var level = (parts[2] || '').replace(/-/g, ' ').replace(/\b\w/g, function(c){ return c.toUpperCase(); });
      var label = state + ' \u00b7 ' + level;
      document.getElementById('back-label').textContent = label;
      document.title = label + ' | India Election Compass';

      setLangUi(selectedLang);
      persistLang(selectedLang);

      langButtons.forEach(function (btn) {
        btn.addEventListener('click', function () {
          selectedLang = normalizeLang(btn.getAttribute('data-lang'));
          setLangUi(selectedLang);
          persistLang(selectedLang);
          setOecLanguage(selectedLang);
          forceOecRemount(selectedLang);
        });
      });

      var langApplyAttempts = 0;
      var langTimer = window.setInterval(function () {
        langApplyAttempts++;
        if (tryApplyLanguageInOec(selectedLang) || langApplyAttempts > 30) {
          window.clearInterval(langTimer);
        }
      }, 350);

      applyTamilUiLabelTranslations(document);
      if (window.MutationObserver) {
        var oecRootNode = document.getElementById('open-election-compass');
        if (oecRootNode) {
          var uiLabelObserver = new MutationObserver(function () {
            applyTamilUiLabelTranslations(document);
          });
          uiLabelObserver.observe(oecRootNode, {
            subtree: true,
            childList: true,
            characterData: true,
            attributes: true,
            attributeFilter: ['aria-label', 'title']
          });
        }
      }

      syncBackBarHeight();
      window.addEventListener('resize', syncBackBarHeight);

      var noCacheToken = String(Date.now());
      var noCacheConfigUrl = withNoCache(configPath, noCacheToken);

      // Always set load-url for internal scripts that read this value.
      // Use a versioned URL so OEC runtime also fetches fresh JSON from server.
      oecEl.setAttribute('load-url', noCacheConfigUrl);
      setOecLanguage(selectedLang);

      // Load config first, inject Tamil UI overrides, then start OEC.
      fetch(noCacheConfigUrl, { cache: 'no-store' })
        .then(function (r) {
          if (!r.ok) throw new Error('Failed to load config: ' + r.status);
          return r.json();
        })
        .then(function (cfg) {
          ensureOecConfigTag(injectTamilOverwrites(cfg));
          ensureOecScriptLoaded();
        })
        .catch(function () {
          // Fallback to plain load-url mode if config fetch fails.
          ensureOecScriptLoaded();
        });
    }());
  </script>

  <script>
    (function () {
      var owner = 'darepalli';
      var repo = 'ElectionDiksoochi';
      var params = new URLSearchParams(window.location.search);
      var configPath = params.get('config') || '';
      var pageContext = configPath || window.location.pathname;

      var modal = document.getElementById('feedback-modal');
      var openBtn = document.getElementById('feedback-open');
      var cancelBtn = document.getElementById('feedback-cancel');
      var submitBtn = document.getElementById('feedback-submit');
      var textEl = document.getElementById('feedback-text');
      var typeEl = document.getElementById('feedback-type');
      var countEl = document.getElementById('feedback-count');

      if (!modal || !openBtn || !cancelBtn || !submitBtn || !textEl || !typeEl || !countEl) return;

      function openModal () {
        modal.classList.add('is-open');
        modal.setAttribute('aria-hidden', 'false');
        setTimeout(function () { textEl.focus(); }, 10);
      }

      function closeModal () {
        modal.classList.remove('is-open');
        modal.setAttribute('aria-hidden', 'true');
      }

      function refreshCount () {
        var len = textEl.value.length;
        countEl.textContent = len + ' / 300';
        submitBtn.disabled = len === 0;
      }

      function buildIssueUrl () {
        var kind = typeEl.value || 'General';
        var feedback = textEl.value.trim();
        var title = '[Feedback][' + kind + '] ' + pageContext;
        var body = [
          '### Feedback',
          feedback,
          '',
          '### Context',

          'தீர்மானம் ' + (idx + 1)
        ];
        values.forEach(function (v) {
          var k = normalizeText(v || '');
          if (k && out.indexOf(k) < 0) out.push(k);
        });
        return out;
      }

      function getCapturedUserResponseLabel(thesis, idx) {
        var keys = getThesisLookupKeys(thesis, idx);
        for (var i = 0; i < keys.length; i++) {
          var token = userResponseByThesisKey[keys[i]];
          if (token) return getPositionLabel(token);
        }
        return getPositionLabel('neutral');
      }

      function normalizePositionValue(position) {
        var p = String(position || '').toLowerCase().replace(/_/g, '-').trim();
        if (p === 'strongly-approve' || p === 'strongly agree') return 2;
        if (p === 'approve' || p === 'agree') return 1;
        if (p === 'partly') return 0.5;
        if (p === 'neutral') return 0;
        if (p === 'reject' || p === 'disagree') return -1;
        if (p === 'strongly-reject' || p === 'strongly disagree') return -2;
        return 0;
      }

      function getPositionLabel(position) {
        var p = String(position || '').toLowerCase().replace(/_/g, '-').trim();
        if (uiLang === 'ta') {
          if (p === 'strongly-approve' || p === 'strongly agree') return 'மிகவும் ஒப்புதல்';
          if (p === 'approve' || p === 'agree') return 'ஒப்புதல்';
          if (p === 'partly') return 'பகுதியாக ஒப்புதல்';
          if (p === 'neutral') return 'நடுநிலை';
          if (p === 'reject' || p === 'disagree') return 'எதிர்ப்பு';
          if (p === 'strongly-reject' || p === 'strongly disagree') return 'கடுமையான எதிர்ப்பு';
          return 'நடுநிலை';
        }
        if (p === 'strongly-approve' || p === 'strongly agree') return 'Strongly approve';
        if (p === 'approve' || p === 'agree') return 'Approve';
        if (p === 'partly') return 'Partly';
        if (p === 'neutral') return 'Neutral';
        if (p === 'reject' || p === 'disagree') return 'Reject';
        if (p === 'strongly-reject' || p === 'strongly disagree') return 'Strongly reject';
        return 'Neutral';
      }

      function getMajorAllianceMembers(alias) {
        if (alias === 'dmk-alliance') return ['DMK', 'INC'];
        if (alias === 'aiadmk-alliance') return ['AIADMK', 'BJP'];
        return [];
      }

      function extractPerPartyPositionsFromExplanation(expl) {
        var out = {};
        var raw = String(expl || '');
        if (!raw) return out;

        var re = /\b([A-Z][A-Z()\-]{1,15})\s*:\s*(strongly-approve|approve|partly|neutral|reject|strongly-reject|strongly agree|agree|disagree|strongly disagree)\b/gi;
        var m;
        while ((m = re.exec(raw)) !== null) {
          out[String(m[1]).toUpperCase()] = {
            position: String(m[2]).toLowerCase().replace(/\s+/g, '-'),
            excerpt: String(m[0])
          };
        }
        return out;
      }

      function getFallbackSubpartyExcerpt(party, alignedPosition) {
        var p = getPositionLabel(alignedPosition);
        if (uiLang === 'ta') return party + ' அதிகாரப்பூர்வ நிலை: ' + p;

      function getLegacyExcerptForParty(legacyExcerpts, thesisTitleEn, partyCode) {
        if (!legacyExcerpts || !legacyExcerpts.byTitle) return '';
        if (!thesisTitleEn || !partyCode) return '';
        var byTitle = legacyExcerpts.byTitle[thesisTitleEn];
        if (!byTitle || !byTitle[partyCode]) return '';
        var node = byTitle[partyCode];
        return String((uiLang === 'ta' ? (node.ta || node.en) : (node.en || node.ta)) || '');
      }

      function getAllianceSubpartyPositions(alias, alignedPosition, explanation, thesisTitleEn, legacyExcerpts) {
        var members = getMajorAllianceMembers(alias);
        if (!members.length) return [];

        var parsed = extractPerPartyPositionsFromExplanation(explanation);
        var aligned = String(alignedPosition || 'neutral').toLowerCase().replace(/\s+/g, '-');

        return members.map(function (name) {
          var parsedItem = parsed[name] || null;
          var memberPos = parsedItem ? parsedItem.position : aligned;
          var legacyExcerpt = getLegacyExcerptForParty(legacyExcerpts, thesisTitleEn, name);
          var memberExcerpt = legacyExcerpt || getFallbackSubpartyExcerpt(name, aligned);
          var parsedExcerpt = parsedItem && parsedItem.excerpt ? parsedItem.excerpt : '';
          return {
            party: name,
            position: memberPos,
            excerpt: memberExcerpt,
            parsedExcerpt: parsedExcerpt
          };
        });
      }

      function normalizeText (text) {
        return String(text || '')
          .toLowerCase()
          .replace(/[\u200B-\u200D\uFEFF]/g, '')
          .replace(/\s+/g, ' ')
          .replace(/[^0-9a-z\u00C0-\uFFFF\s]/g, '')
          .trim();
      }

      function addExplanationSource (text, src) {
        if (!text || !src) return;
        var full = normalizeText(text);
        if (!full) return;
        srcMap[full] = src;
        if (full.length > 80) srcMap[full.substring(0, 80)] = src;
      }

      function addExplanationMeta(text, meta) {
        if (!text || !meta) return;
        var full = normalizeText(text);
        if (!full) return;
        explanationMetaMap[full] = meta;
        if (full.length > 80) explanationMetaMap[full.substring(0, 80)] = meta;
      }

      function findExplanationMeta(bubbleTextNorm, partyAliasHint) {
        if (!bubbleTextNorm) return null;
        var direct = explanationMetaMap[bubbleTextNorm] || explanationMetaMap[bubbleTextNorm.substring(0, 80)] || null;
        if (direct && (!partyAliasHint || direct.partyAlias === partyAliasHint)) return direct;

        for (var k in explanationMetaMap) {
          if (!k || k.length < 24) continue;
          if (bubbleTextNorm.indexOf(k) === 0 || k.indexOf(bubbleTextNorm) === 0) {
            var m = explanationMetaMap[k];
            if (!partyAliasHint || (m && m.partyAlias === partyAliasHint)) return m;
          }
        }
        return null;
      }

      function getPartyAliasFromBubble(bubble) {
        if (!bubble) return '';
        var partyEl = bubble.querySelector('.chat-bubble__party');
        if (!partyEl) return '';
        var partyKey = normalizeText(partyEl.textContent);
        return partyAliasByDisplayKey[partyKey] || '';
      }

      function getSourceLabel (url) {
        var raw = String(url || '').toLowerCase();
        if (!raw) return 'Source Link';

        if (raw.indexOf('manifesto') >= 0 || raw.indexOf('nyay') >= 0) {
          return 'Party Manifesto';
        }
        if (raw.indexOf('/speech') >= 0 || raw.indexOf('/speeches') >= 0) {
          return 'Party Speech';
        }
        if (raw.indexOf('/ideology') >= 0 || raw.indexOf('/election-corner') >= 0 || raw.indexOf('/polic') >= 0) {
          return 'Party Policy Page';
        }

        try {
          var host = new URL(url).hostname.replace(/^www\./, '');
          if (host) return 'Party Website (' + host + ')';
        } catch (e) {}

        return 'Party Website';
      }

      function withNoCache(url, token) {
        var key = token || String(Date.now());
        try {
          var u = new URL(url, window.location.href);
          u.searchParams.set('_oecv', key);
          return u.toString();
        } catch (e) {
          return String(url) + (String(url).indexOf('?') >= 0 ? '&' : '?') + '_oecv=' + encodeURIComponent(key);
        }
      }

      function stripQueryAndHash(url) {
        return String(url || '').split('#')[0].split('?')[0];
      }

      function getConfigPathForQuery(url) {
        var raw = stripQueryAndHash(url);
        if (!raw) return '';

        var SAFE_CONFIG_RE = /^elections\/[a-z]{2,}\/[a-z0-9._/-]+\/config\.json$/;
        if (SAFE_CONFIG_RE.test(raw)) return raw;

        try {
          var u = new URL(raw, window.location.href);
          var p = String(u.pathname || '').replace(/\\/g, '/');
          var idx = p.toLowerCase().indexOf('/elections/');
          if (idx >= 0) {
            var rel = p.substring(idx + 1);
            if (SAFE_CONFIG_RE.test(rel)) return rel;
          }
        } catch (e) {}

        try {
          var q = new URLSearchParams(window.location.search).get('config') || '';
          q = stripQueryAndHash(q);
          if (SAFE_CONFIG_RE.test(q)) return q;
        } catch (e) {}

        return '';
      }

      function escapeHtml(text) {
        return String(text || '')
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function getProfileUnavailableMessage() {
        return uiLang === 'ta'
          ? 'இந்த வேட்பாளருக்கான பொதுப் சுயவிவர இணைப்பு இன்னும் கிடைக்கவில்லை.'
          : 'Public profile link is not available for this candidate yet.';
      }

      function escapeAttrValue(value) {
        return escapeHtml(value);
      }

      function getAllianceSeatRows(allianceAliasKey) {
        return ALLIANCE_PARTNER_SEATS[allianceAliasKey] || [];
      }

      function renderAllianceSeatRows(allianceAliasKey) {
        var rows = getAllianceSeatRows(allianceAliasKey);
        if (!rows.length) return '';

        var html = '<div class="oec-alliance-seat-list">';
        rows.forEach(function (row) {

          var pct = Math.max(1, Math.min(100, Math.round((seatCount / 234) * 100)));
          var rowName = row.name || row.code || 'Party';
          var rowSymbol = row.symbol || '';

          }
          html += '<span>' + escapeHtml(rowName) + ' (' + seatCount + ')</span>';
          html += '</span>';
          if (rowLinks.length) {
            html += '<span class="oec-alliance-seat-row__links">';
            rowLinks.forEach(function (link) {
              if (!link || !link.url) return;
              var label = link.label || 'Link';
              html += '<a class="oec-alliance-seat-link" href="' + escapeAttrValue(link.url) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(label) + '</a>';
            });
            html += '</span>';
          }
          html += '</div>';
          html += '<div class="oec-alliance-seat-row__bar"><span class="oec-alliance-seat-row__fill" style="width:' + pct + '%"></span></div>';
          html += '<div class="oec-alliance-seat-row__meta">' + seatCount + ' / 234 seats';
          if (row.source) {
            html += ' • <a class="oec-alliance-seat-link" href="' + escapeAttrValue(row.source) + '" target="_blank" rel="noopener noreferrer">Source</a>';
          }
          html += '</div>';
          html += '</div>';
        });
        html += '</div>';
        return html;
      }

      function readCollapsedGroupState() {
        if (!window.localStorage) return {};
        try {
          var raw = window.localStorage.getItem(GROUP_COLLAPSE_STORAGE_KEY);
          if (!raw) return {};
          var parsed = JSON.parse(raw);
          return parsed && typeof parsed === 'object' ? parsed : {};
        } catch (e) {
          return {};
        }
      }

      function persistCollapsedGroupState(state) {
        if (!window.localStorage) return;
        try {
          window.localStorage.setItem(GROUP_COLLAPSE_STORAGE_KEY, JSON.stringify(state || {}));
